<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHC Tools</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f5f7f6;
color:#17211b;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
font-size:42px;
margin-bottom:12px;
}

.subtitle{
color:#6a766e;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
border:1px solid #dce5de;
border-radius:18px;
padding:24px;
text-decoration:none;
color:inherit;
transition:.15s ease;
}

.card:hover{
transform:translateY(-2px);
border-color:#176846;
}

.icon{
font-size:32px;
margin-bottom:16px;
}

.title{
font-size:20px;
font-weight:700;
margin-bottom:10px;
}

.desc{
color:#6a766e;
line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<h1>🧰 Herramientas CHC</h1>

<div class="subtitle">
Herramientas cooperativas disponibles en el Notebook.
</div>

<div class="grid">

<a class="card" href="ley.html">

<div class="icon">📖</div>

<div class="title">
Ley de Cooperativas
</div>

<div class="desc">
Buscador y explorador de artículos.
</div>

</a>

<a class="card" href="delegados.html">

<div class="icon">🗳️</div>

<div class="title">
Calculadora de Delegados
</div>

<div class="desc">
Cálculo de representación y delegados.
</div>

</a>

<a class="card" href="excedentes.html">

<div class="icon">💰</div>

<div class="title">
Calculadora de Excedentes
</div>

<div class="desc">
Distribución y simulación de excedentes.
</div>

</a>

</div>

</div>

</body>
</html>
