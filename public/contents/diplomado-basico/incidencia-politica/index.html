<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incidencia política - CoopNotebook</title>
  <style>
    :root { --verde:#1c6b4a; --verde-bg:#e8f4ef; --blanco:#fff; --gris-borde:#e4e4e0; --texto:#1a1a18; --texto-sec:#3a3a36; --texto-ter:#6a6a64; --radio:10px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100vh; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--texto); line-height:1.65; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:1rem; padding:1rem 1.25rem; border-bottom:1px solid var(--gris-borde); background:var(--blanco); position:sticky; top:0; z-index:10; }
    .brand,.back { color:inherit; text-decoration:none; }
    .brand { font-size:18px; line-height:1; letter-spacing:-.02em; }
    .brand strong { color:var(--verde); }
    .back { font-size:12px; color:var(--texto-ter); }
    .back:hover { color:var(--verde); }
    .canvas { width:min(100%,760px); margin:0 auto; padding:4rem 1.25rem 5rem; }
    .page-header { margin-bottom:2.5rem; padding-bottom:1.75rem; border-bottom:1px solid var(--gris-borde); }
    .eyebrow { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--texto-ter); margin-bottom:.75rem; }
    .title { font-size:clamp(30px,5vw,44px); font-weight:600; line-height:1.1; margin-bottom:.75rem; }
    .title::after { content:""; display:block; width:2.75rem; height:3px; background:var(--verde); border-radius:2px; margin-top:.85rem; }
    .intro { max-width:620px; font-size:15px; color:var(--texto-sec); }
    .list { border:1px solid var(--gris-borde); border-radius:var(--radio); overflow:hidden; }
    .row { display:flex; align-items:center; justify-content:space-between; gap:1rem; min-height:64px; padding:1rem 1.2rem; color:inherit; text-decoration:none; position:relative; transition:background .15s; }
    .row::before { content:""; position:absolute; inset:0 auto 0 0; width:3px; background:var(--verde); opacity:0; transition:opacity .15s; }
    .row:hover { background:var(--verde-bg); }
    .row:hover::before { opacity:1; }
    .code { display:block; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--verde); margin-bottom:.15rem; }
    .name { display:block; font-size:15px; color:var(--texto); line-height:1.35; }
    .desc { display:block; font-size:13px; color:var(--texto-sec); line-height:1.45; margin-top:.15rem; }
    .arrow { color:var(--verde); flex-shrink:0; }
    .credit { margin-top:2rem; font-size:12px; color:#a8a8a0; text-align:center; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../../../index.html"><strong>Coop</strong>Notebook</a>
    <a class="back" href="../index.html">Diplomado Básico</a>
  </header>
  <main class="canvas">
    <section class="page-header">
      <p class="eyebrow">Diplomado Básico</p>
      <h1 class="title">Incidencia política.</h1>
      <p class="intro">Cápsulas disponibles sobre incidencia cooperativa y participación.</p>
    </section>
    <nav class="list" aria-label="Cápsulas de Incidencia política">
      <a class="row" href="incidencia-politica.html">
        <span><span class="code">DB-03</span><span class="name">Incidencia política</span><span class="desc">Contenido interactivo del módulo.</span></span>
        <span class="arrow">→</span>
      </a>
    </nav>
    <p class="credit">Creado por Oliver Ayala</p>
  </main>
</body>
</html>
