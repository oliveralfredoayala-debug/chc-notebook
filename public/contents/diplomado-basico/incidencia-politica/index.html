<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incidencia Política · Diplomado Básico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:       #1c6b4a;
      --verde-sec:   #2fa36b;
      --amarillo:    #f4c20d;
      --verde-claro: #e8f4ef;
      --verde-borde: #b8dccc;
      --gris-texto:  #1a1a1a;
      --gris-sec:    #4a4a4a;
      --gris-suave:  #8a8a8a;
      --gris-borde:  #d8d8d8;
      --blanco:      #ffffff;
      --font: 'Inter', system-ui, sans-serif;
    }

    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--blanco);
      color: var(--gris-texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 40px;
      border-bottom: 1px solid var(--gris-borde);
      background: var(--blanco);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .topbar-wordmark { display: flex; flex-direction: column; line-height: 1.2; }
    .wordmark-top { font-size: 11px; font-weight: 400; color: #999; letter-spacing: 0.04em; }
    .wordmark-bottom { font-size: 13px; font-weight: 500; color: var(--gris-texto); }

    .topbar-back {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 400;
      color: var(--gris-suave);
      text-decoration: none;
      transition: color 0.18s;
    }
    .topbar-back:hover { color: var(--verde); }
    .topbar-back svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── CANVAS ── */
    .canvas {
      flex: 1;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      padding: 60px 32px 96px;
    }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 52px; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--gris-suave);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .breadcrumb a { color: var(--gris-suave); text-decoration: none; transition: color 0.18s; }
    .breadcrumb a:hover { color: var(--verde); }
    .breadcrumb-sep { color: var(--gris-borde); }

    .page-title {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 300;
      color: var(--gris-texto);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .page-title strong { font-weight: 500; }

    /* ── DIVIDER ── */
    .rule { height: 1px; background: var(--gris-borde); margin-bottom: 8px; }

    /* ── MODULE LIST ── */
    .module-list { display: flex; flex-direction: column; }

    .module-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 17px 10px;
      border-bottom: 1px solid var(--gris-borde);
      text-decoration: none;
      color: inherit;
      border-radius: 4px;
      margin: 0 -10px;
      transition: background 0.15s;
      gap: 12px;
    }
    .module-row:last-child { border-bottom: none; }
    .module-row:hover { background: var(--verde-claro); }
    .module-row:hover .module-title { color: var(--verde); }
    .module-row:hover .module-arrow { opacity: 1; transform: translateX(0); }

    .module-title {
      font-size: 15px;
      font-weight: 400;
      color: var(--gris-texto);
      line-height: 1.3;
      transition: color 0.18s;
    }

    .module-arrow {
      flex-shrink: 0;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.18s, transform 0.18s;
    }
    .module-arrow svg {
      width: 14px; height: 14px;
      stroke: var(--verde); fill: none;
      stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── FOOTNOTE ── */
    .footnote { margin-top: 64px; }
    .footnote-text { font-size: 11px; font-weight: 300; color: #c8c8c0; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-header { animation: fadeUp 0.35s ease both; }
    .module-list { animation: fadeUp 0.35s ease 0.08s both; }
    .footnote    { animation: fadeUp 0.35s ease 0.15s both; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .topbar { padding: 12px 20px; }
      .canvas { padding: 36px 20px 64px; }
      .module-arrow { opacity: 1; transform: none; }
    }
  </style>
</head>
