<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CHC Notebook</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:#f3f4f6;
      font-family:system-ui;
    }

    .layout{
      display:flex;
      width:100%;
      height:100%;
    }

    .sidebar{
      width:260px;
      background:white;
      border-right:1px solid #ddd;
      padding:20px;
    }

    .sidebar h2{
      font-size:18px;
      margin-bottom:20px;
    }

    .nav-item{
      padding:10px 12px;
      border-radius:8px;
      background:#f5f5f5;
    }

    .workspace{
      flex:1;
      background:#e5e7eb;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:white;
    }
  </style>
</head>

<body>

  <div class="layout">

    <aside class="sidebar">
      <h2>CHC Notebook</h2>

      <div class="nav-item">
        📘 Buscador Legal
      </div>
    </aside>

    <main class="workspace">

      <iframe
        src="../artifacts/legal/index.html">
      </iframe>

    </main>

  </div>

</body>
</html>
