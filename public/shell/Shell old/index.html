<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>CHC Notebook</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {

      --domain-width: 240px;
      --domain-collapsed-width: 72px;

      --theory-width: 320px;
      --theory-collapsed-width: 58px;

      --bg-main: #0b0d12;
      --bg-domain: #0f131c;
      --bg-theory: #141923;

      --border: #232b39;

      --text-muted: #7f8ba0;
      --text-light: #ffffff;

      --blue: #2563eb;
      --blue-hover: #1d4ed8;

      --transition: 0.25s ease;
    }

    body {

      width: 100%;
      height: 100vh;

      overflow: hidden;

      display: flex;

      font-family: Inter, sans-serif;

      background: var(--bg-main);

      color: white;
    }

    /* =========================================
       SHARED SIDEBAR HEADER
    ========================================= */

    .sidebar-header {

      height: 62px;

      min-height: 62px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 16px;

      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {

      font-size: 11px;
      font-weight: 700;

      letter-spacing: 0.12em;

      text-transform: uppercase;

      color: var(--text-muted);

      white-space: nowrap;
    }

    .toggle-button {

      width: 34px;
      height: 34px;

      border: none;

      border-radius: 10px;

      background: #1a2230;

      color: white;

      cursor: pointer;

      transition: 0.2s ease;

      flex-shrink: 0;
    }

    .toggle-button:hover {
      background: #243047;
    }

    /* =========================================
       DOMAIN SIDEBAR
    ========================================= */

    #domain-sidebar {

      width: var(--domain-width);

      background: var(--bg-domain);

      border-right: 1px solid var(--border);

      display: flex;
      flex-direction: column;

      transition: all var(--transition);

      overflow: hidden;
    }

    #domain-sidebar.collapsed {

      width: var(--domain-collapsed-width);
    }

    .domain-buttons {

      width: 100%;

      display: flex;
      flex-direction: column;

      gap: 10px;

      padding: 14px 10px;
    }

    .domain-button {

      width: 100%;

      min-height: 56px;

      border: none;

      border-radius: 14px;

      background: transparent;

      color: var(--text-muted);

      cursor: pointer;

      transition: 0.2s ease;

      font-size: 14px;
      font-weight: 700;

      display: flex;
      align-items: center;

      text-align: left;

      padding: 0 16px;

      line-height: 1.3;
    }

    .domain-button:hover {

      background: #1b2230;

      color: white;
    }

    .domain-button.active {

      background: var(--blue);

      color: white;
    }

    /* DOMAIN LABELS */

    .domain-full {
      display: block;
    }

    .domain-short {

      display: none;

      font-size: 12px;
      font-weight: 800;

      letter-spacing: 0.08em;
    }

    /* COLLAPSED DOMAIN */

    #domain-sidebar.collapsed .sidebar-title {
      display: none;
    }

    #domain-sidebar.collapsed .domain-full {
      display: none;
    }

    #domain-sidebar.collapsed .domain-short {
      display: block;
    }

    #domain-sidebar.collapsed .domain-button {

      width: 44px;
      height: 44px;

      min-height: 44px;

      margin: 0 auto;

      border-radius: 12px;

      justify-content: center;
      align-items: center;

      text-align: center;

      padding: 0;
    }

    /* =========================================
       THEORY SIDEBAR
    ========================================= */

    #theory-sidebar {

      width: var(--theory-width);

      background: var(--bg-theory);

      border-right: 1px solid var(--border);

      display: flex;
      flex-direction: column;

      transition: all var(--transition);

      overflow: hidden;
    }

    #theory-sidebar.collapsed {

      width: var(--theory-collapsed-width);
    }

    #theory-sidebar.collapsed .sidebar-title {
      display: none;
    }

    #theory-sidebar.collapsed #theory-content {
      display: none;
    }

    .theory-content {

      flex: 1;

      overflow-y: auto;

      padding: 20px 16px 40px;
    }

    .theory-section-title {

      font-size: 11px;
      font-weight: 700;

      letter-spacing: 0.12em;

      text-transform: uppercase;

      color: #738198;

      margin-bottom: 14px;
      margin-top: 18px;
    }

    .theory-item {

      padding: 14px 16px;

      border-radius: 12px;

      cursor: pointer;

      transition: 0.2s ease;

      margin-bottom: 8px;

      border: 1px solid transparent;
    }

    .theory-item:hover {

      background: #1c2331;

      border-color: #2a3446;
    }

    .theory-item.active {

      background: var(--blue);

      border-color: var(--blue-hover);
    }

    .theory-title {

      font-size: 14px;
      font-weight: 600;

      line-height: 1.4;
    }

    /* =========================================
       WORKSPACE
    ========================================= */

    #workspace {

      flex: 1;

      background: #0b0d12;
    }

    #content-frame {

      width: 100%;
      height: 100%;

      border: none;

      background: white;
    }

    /* =========================================
       SCROLLBAR
    ========================================= */

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {

      background: #2b3343;

      border-radius: 999px;
    }

  </style>
</head>

<body>

  <!-- DOMAIN SIDEBAR -->

  <aside id="domain-sidebar">

    <div class="sidebar-header">

      <div class="sidebar-title">
        Domains
      </div>

      <button
        class="toggle-button"
        id="toggle-domains"
      >
        ☰
      </button>

    </div>

    <div
      class="domain-buttons"
      id="domain-buttons"
    ></div>

  </aside>

  <!-- THEORY SIDEBAR -->

  <aside id="theory-sidebar">

    <div class="sidebar-header">

      <div class="sidebar-title">
        Theory
      </div>

      <button
        class="toggle-button"
        id="toggle-theory"
      >
        ←
      </button>

    </div>

    <div
      class="theory-content"
      id="theory-content"
    ></div>

  </aside>

  <!-- WORKSPACE -->

  <main id="workspace">

    <iframe id="content-frame"></iframe>

  </main>

  <script>

    const domainSidebar =
      document.getElementById(
        "domain-sidebar"
      );

    const theorySidebar =
      document.getElementById(
        "theory-sidebar"
      );

    const domainButtonsContainer =
      document.getElementById(
        "domain-buttons"
      );

    const theoryContent =
      document.getElementById(
        "theory-content"
      );

    const contentFrame =
      document.getElementById(
        "content-frame"
      );

    let navigationData = null;

    /* =========================================
       INIT
    ========================================= */

    async function init() {

      const response =
        await fetch("/navigation.json");

      navigationData =
        await response.json();

      renderDomains();

      restoreSidebarState();

      const firstDomain =
        navigationData.domains[0];

      if (firstDomain) {

        loadDomain(firstDomain.id);

      }

    }

    /* =========================================
       RENDER DOMAINS
    ========================================= */

    function renderDomains() {

      domainButtonsContainer.innerHTML = "";

      navigationData.domains.forEach(domain => {

        const button =
          document.createElement("button");

        button.className =
          "domain-button";

        button.dataset.domain =
          domain.id;

        const initials =
          domain.title
            .split(" ")
            .map(word => word[0])
            .join("")
            .slice(0, 3)
            .toUpperCase();

        button.innerHTML = `
          <span class="domain-full">
            ${domain.title}
          </span>

          <span class="domain-short">
            ${initials}
          </span>
        `;

        button.onclick = () => {

          loadDomain(domain.id);

        };

        domainButtonsContainer.appendChild(
          button
        );

      });

    }

    /* =========================================
       LOAD DOMAIN
    ========================================= */

    function loadDomain(domainId) {

      const domain =
        navigationData.domains.find(
          d => d.id === domainId
        );

      if (!domain) return;

      document
        .querySelectorAll(".domain-button")
        .forEach(btn => {

          btn.classList.remove("active");

          if (
            btn.dataset.domain === domainId
          ) {
            btn.classList.add("active");
          }

        });

      renderTheory(domain);

      const firstCategory =
        domain.categories?.[0];

      const firstItem =
        firstCategory?.items?.[0];

      if (firstItem) {

        loadContent(firstItem.path);

        setActiveTheoryItem(
          firstItem.path
        );

      }

    }

    /* =========================================
       RENDER THEORY
    ========================================= */

    function renderTheory(domain) {

      theoryContent.innerHTML = "";

      domain.categories.forEach(category => {

        const title =
          document.createElement("div");

        title.className =
          "theory-section-title";

        title.innerText =
          category.title;

        theoryContent.appendChild(title);

        category.items.forEach(item => {

          const itemElement =
            document.createElement("div");

          itemElement.className =
            "theory-item";

          itemElement.dataset.path =
            item.path;

          itemElement.innerHTML = `
            <div class="theory-title">
              ${item.title}
            </div>
          `;

          itemElement.onclick = () => {

            loadContent(item.path);

            setActiveTheoryItem(
              item.path
            );

          };

          theoryContent.appendChild(
            itemElement
          );

        });

      });

    }

    /* =========================================
       LOAD CONTENT
    ========================================= */

    function loadContent(path) {

      contentFrame.src = path;

    }

    /* =========================================
       ACTIVE THEORY ITEM
    ========================================= */

    function setActiveTheoryItem(path) {

      document
        .querySelectorAll(".theory-item")
        .forEach(item => {

          item.classList.remove("active");

          if (
            item.dataset.path === path
          ) {
            item.classList.add("active");
          }

        });

    }

    /* =========================================
       TOGGLES
    ========================================= */

    function toggleDomains() {

      domainSidebar.classList.toggle(
        "collapsed"
      );

      localStorage.setItem(
        "domainsCollapsed",
        domainSidebar.classList.contains(
          "collapsed"
        )
      );

    }

    function toggleTheory() {

      theorySidebar.classList.toggle(
        "collapsed"
      );

      localStorage.setItem(
        "theoryCollapsed",
        theorySidebar.classList.contains(
          "collapsed"
        )
      );

    }

    /* =========================================
       RESTORE STATE
    ========================================= */

    function restoreSidebarState() {

      const domainsCollapsed =
        localStorage.getItem(
          "domainsCollapsed"
        ) === "true";

      const theoryCollapsed =
        localStorage.getItem(
          "theoryCollapsed"
        ) === "true";

      if (domainsCollapsed) {

        domainSidebar.classList.add(
          "collapsed"
        );

      }

      if (theoryCollapsed) {

        theorySidebar.classList.add(
          "collapsed"
        );

      }

    }

    /* =========================================
       EVENTS
    ========================================= */

    document
      .getElementById(
        "toggle-domains"
      )
      .onclick = toggleDomains;

    document
      .getElementById(
        "toggle-theory"
      )
      .onclick = toggleTheory;

    /* =========================================
       START
    ========================================= */

    init();

  </script>

</body>
</html>
