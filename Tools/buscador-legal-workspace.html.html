": "Artículo 232.- Inscripciones Contradictorias. Inscrito en el registro cualquier\nhecho o relación jurídica, no puede inscribirse otro u otras que sean contradictorias\nsin el consentimiento del titular registral a quien afecte o mandato judicial.\nNo puede ejecutarse ninguna acción contradictoria de hechos o relaciones\njurídicas inscritas, sin que previamente o a la vez, se entable demanda de\nnulidad y cancelación de la inscripción respectiva, contra el titular registral.\nEl demandante puede solicitar anotación previa del hecho o derecho que alegare\ncontradicción del registro. Verificada dicha anotación en virtud de la correspondiente\norden judicial, toda inscripción posterior es ineficaz en cuanto perjudique el\nderecho que ampare la anotación.", "resumen": "- Inscripciones Contradictorias. Inscrito en el registro cualquier hecho o relación jurídi"}, {"num": "Art. 233", "ley": "RLCH", "texto": "Artículo 233.- Registros de órdenes Judiciales. El registrador no objetará\nla legalidad de las órdenes judiciales o administrativas que manden una inscripción.\nNo obstante, si creyere que no debe practicarse, lo hará saber así a la autoridad\nrespectiva. Si a pesar de ello ésta insistiere en el registro, se hará el mismo\ninsertándose en la inscripción el oficio en que se hubiere ordenado, se archivará\nel original.", "resumen": "- Registros de órdenes Judiciales. El registrador no objetará la legalidad de las órdenes "}, {"num": "Art. 234", "ley": "RLCH", "texto": "Artículo 234.- Responsabilidad del Registrador. El registrador es responsable\ndirecto de la custodia de los libros y demás documentos del registro, así como de\nlas inscripciones que se practiquen en los mismos.", "resumen": "- Responsabilidad del Registrador. El registrador es responsable directo de la custodia de"}, {"num": "Art. 235", "ley": "RLCH", "texto": "Artículo 235.- Arancel y Normativa Registral. La Junta Directiva del\nCONSUCOOP debe emitir un arancel para los servicios registrales, así como las\nnormas necesarias para el mejor funcionamiento del Registro Nacional de\nCooperativas.\nTITULO III\nDISPOSICIONES FINALES Y TRANSITORIA", "resumen": "- Arancel y Normativa Registral. La Junta Directiva del CONSUCOOP debe emitir un arancel p"}, {"num": "Art. 236", "ley": "RLCH", "texto": "Artículo 236.- Adecuación para Otras Organizaciones Cooperativas. Las\norganizaciones Cooperativas cuya personería jurídica haya sido extendida por\notros entes del Estado, para gozar de los derechos y beneficios que otorga la\nLey y ser reconocidas como tal, deben adecuar su funcionalidad a la Ley y a\neste reglamento. Su funcionamiento al margen de la misma, incurren en\nresponsabilidades civil y penal de conformidad a lo establecido en el párrafo\nsegundo del artículo 62 de la Ley.", "resumen": "- Adecuación para Otras Organizaciones Cooperativas. Las organizaciones Cooperativas cuya "}, {"num": "Art. 237", "ley": "RLCH", "texto": "Artículo 237.- Cooperativas de Actividades Mixtas. Las Cooperativas\nmixtas, que al momento de vigencia de la ley, realicen actividades de\nintermediación financiera con sus afiliados, si están autorizadas para ello desde\nsu reconocimiento oficial, pueden continuar prestando dicho servicio previa\nevaluación del CONSUCOOP de su capacidad operativa, administrativa y\nfinanciera.", "resumen": "- Cooperativas de Actividades Mixtas. Las Cooperativas mixtas, que al momento de vigencia "}, {"num": "Art. 238", "ley": "RLCH", "texto": "Artículo 238.- Patrimonio Familiar. Constituyen patrimonio familiar los\nbienes inmuebles urbanos o rurales adquiridos por los Cooperativas para sus\nAfiliados(as), de los programas de interés social o de titulación de tierras que\nsean financiados directa o indirectamente por el Estado. Dichos bienes deben\nser inscritos en el Registro de la Propiedad a nombre de ambos cónyuges o de\nlas personas que convivan bajo el régimen de Unión de Hecho, inscrita en el\nRegistro Civil o aun cuando ésta no esté legalmente reconocida.\nEn caso de disolución del vínculo, se debe satisfacer en primer lugar el interés de\nlos hijos menores o dependientes; satisfecho el interés de estos dicho patrimonio\ncorresponde en partes iguales a los citados cónyuges, el cual se debe liquidar de\nconformidad con lo dispuesto en el Código de Familia.", "resumen": "- Patrimonio Familiar. Constituyen patrimonio familiar los bienes inmuebles urbanos o rura"}, {"num": "Art. 239", "ley": "RLCH", "texto": "Artículo 239.- Títulos Ejecutivos. El estado de cuenta certificado por el\ncontador de una Cooperativa inscrita en el CONSUCOOP hará fe en juicio, salvo\nprueba en contrario, para la determinación del saldo a cargo de los Afiliados(as)\ndeudores. El estado de cuenta certificado junto con los documentos de crédito,\ntiene el carácter de títulos ejecutivos.\nNo se extingue la obligación de pago de los Afiliados(as) deudores de una\nCooperativa, cuando sus créditos vencidos hayan sido castigados contra la\nreserva de cuentas incobrables.", "resumen": "- Títulos Ejecutivos. El estado de cuenta certificado por el contador de una Cooperativa i"}, {"num": "Art. 240", "ley": "RLCH", "texto": "Artículo 240.- Prescripción de las Hipotecas. La hipoteca registrada a favor\nde las Cooperativas reconocidas por la Ley, protege el derecho de ésta por el\ntérmino de treinta y cinco (35) años, no obstante lo establecido en el artículo\n2137 párrafo segundo del Código Civil, los plazos de extinción, prescripción,\nregistro y conservación del derecho del acreedor hipotecario a favor de las\ninstituciones mencionadas en dicho artículo, son también de treinta y cinco (35) años.", "resumen": "- Prescripción de las Hipotecas. La hipoteca registrada a favor de las Cooperativas recono"}, {"num": "Art. 241", "ley": "RLCH", "texto": "Artículo 241.- Derechos Políticos: Para la aplicación del artículo 115 de la\nley, se consideran derechos políticos, el conjunto de condiciones y opciones que\nposibilitan a un afiliado(a), de una cooperativa para expresar, ejercer y participar\nen el universo democrático de la misma, entre otros se señalan:\na) Derecho de convocar a una asamblea general;\nb) Derecho de modificación de Agenda;\nc) Derecho a elegir y ser electo;\nd) Derecho a solicitar nulidades de Asamblea General, cuando se ha violentado\nel debido proceso;\ne) Derecho a solicitar nulidades total o parcial, de la elección de miembros\ndirectivos de la cooperativa; y,\nf) Derecho de petición, relacionado al control democrático de la cooperativa.", "resumen": "- Derechos Políticos: Para la aplicación del artículo 115 de la ley, se consideran derecho"}, {"num": "Art. 242", "ley": "RLCH", "texto": "Artículo 242.- Diligencias de Proceso. Las diligencias que estuvieren\npendientes de resolver por el IHDECOOP al entrar en vigencia este Reglamento,\ndeben continuar tramitándose de conformidad a los procedimientos establecidos\nen éste y fallarse de acuerdo a la Ley.", "resumen": "- Diligencias de Proceso. Las diligencias que estuvieren pendientes de resolver por el IHD"}, {"num": "Art. 243", "ley": "RLCH", "texto": "Artículo 243.- El Catálogo de Cuentas Contables, ya emitido por El\nCONSUCOOP, puede reformarse, al que deben adecuar su contabilidad las\norganizaciones sometidas a su control.", "resumen": "- El Catálogo de Cuentas Contables, ya emitido por El CONSUCOOP, puede reformarse, al que "}, {"num": "Art. 244", "ley": "RLCH", "texto": "Artículo 244.- Liquidación de las cooperativas disueltas. Las cooperativas\nque se declaren disueltas de oficio, por no reescribirse en el término que señala\nel artículo 11 transitorio del Decreto No. 174-2013 reformado por el Decreto No.\n146-2019 y el Acuerdo de la Junta Directiva del CONSUCOOP, deben en su\nmomento realizar su liquidación, con conocimiento del CONSUCOOP, bajo el\nprocedimiento que establece el artículo 69 y 70 de la ley de Cooperativas.\nEl CONSUCOOP debe publicar la declaración de disolución de la Cooperativas,\ncon la advertencia que las mismas no están autorizadas para realizar actos\ncooperativos, así mismo, enviar dicha resolución treinta (30) días siguientes de\nsu publicación al Ministerio Público, para los efectos de ley.", "resumen": "- Liquidación de las cooperativas disueltas. Las cooperativas que se declaren disueltas de"}, {"num": "Art. 245", "ley": "RLCH", "texto": "Artículo 245.- Reelección a un Tercer Periodo. Los integrantes de Junta\nDirectiva o Junta de Vigilancia que han ejercido sus cargos en dos periodos\nconsecutivos a partir de la Reforma del Decreto Legislativo No. 174-2013 y que\naspiren a un tercer periodo deben someterse a la Asamblea General y de obtener\nlas 2/3 partes de los votos de los cooperativistas presentes, continuaran en el\nejercicio de sus funciones por un tercer periodo. De no obtener las 2/3 partes\nqueda fuera del proceso y se debe abrir nuevamente las propuestas con otros\ncandidatos.", "resumen": "- Reelección a un Tercer Periodo. Los integrantes de Junta Directiva o Junta de Vigilancia"}, {"num": "Art. 246", "ley": "RLCH", "texto": "Artículo 246.- Procesos Judiciales Pendientes. Los procesos judiciales en\nlos que sean parte procesal el IHDECOOP, que estuvieren siendo sustanciados\nante los juzgados y tribunales de la República, deben ser asumidos por el\nCONSUCOOP.", "resumen": "- Procesos Judiciales Pendientes. Los procesos judiciales en los que sean parte procesal e"}, {"num": "Art. 247", "ley": "RLCH", "texto": "Artículo 247.- Excepción de Requisitos para Directivos. Para efectos de\nlo dispuesto en el artículo 28 numeral 6 en relación a la prohibición de no ser\ncónyuge o pariente entre sí, se exceptúa aquellas cooperativas que estén ubicadas\nen zonas o comunidades compuestas por familiares y/o que la membresía de la\ncooperativa sea el mínimo requerido en la ley, procurando siempre que los lazos\nsanguíneos y de afinidad más cercanos no queden en los principales cargos.\n\nSuperintendencias, revisarán el destino de los fondos trasladados por las\nCooperativas a las fundaciones que estas organicen.", "resumen": "- Excepción de Requisitos para Directivos. Para efectos de lo dispuesto en el artículo 28 "}, {"num": "Art. 249", "ley": "RLCH", "texto": "Artículo 249.- La Junta Directiva del CONSUCOOP, debe emitir lineamientos\nespeciales mediante normativas en el tema de Lavado de Activos y Financiamiento\nal Terrorismo para las Cooperativas de Ahorro y Crédito y de Otros Subsectores,\nde acuerdo a lo emanado en el artículo 97 de la Ley de Cooperativas de Honduras\nreformado mediante el Decreto Legislativo No. 146-2019.\nAsimismo, definir las sanciones de acuerdo a los criterios de tamaño de la\norganización, estructura, recursos y complejidad de las operaciones de las\ncooperativas; considerando el rango establecido en el", "resumen": "- La Junta Directiva del CONSUCOOP, debe emitir lineamientos especiales mediante normativa"}, {"num": "Art. 97", "ley": "RLCH", "texto": "artículo 97-Ade la misma Ley.\n\na través de su Junta Directiva y en cumplimiento a los artículos 99 literal e) de la\nLey de Cooperativas de Honduras y articulo 6 del Decreto Legislativo No. 146-\n2019, debe establecer y normar todo lo referente a la creación de la Unidad de \nCumplimiento a la Ley Especial Contra el Lavado de Activo, dependencia,\nfuncionalidad, atribuciones, requerimientos y condiciones necesarias del personal\nque la integre, considerando la experiencia y conocimiento sobre el tema de\nLavado de Activos", "resumen": "Ade la misma Ley.  a través de su Junta Directiva y en cumplimiento a los artículos 99 lit"}, {"num": "Art. 251", "ley": "RLCH", "texto": "Artículo 251.- Derogaciones. Quedan derogados los Acuerdos Ejecutivos\nnúmero: 191-88 de fecha 30 de mayo de 1988, 10-2012 de fecha 8 de mayo de\n2012, 12-2013 de fecha 24 de Abril de 2013, sus reformas correspondientes y\ndemás disposiciones legales derivadas de los mismos, así como aquellas que se\nle opongan a lo establecido en este Reglamento.", "resumen": "- Derogaciones. Quedan derogados los Acuerdos Ejecutivos número: 191-88 de fecha 30 de may"}, {"num": "Art. 252", "ley": "RLCH", "texto": "Artículo 252.- Vigencia del Reglamento. El presente Reglamento es de\nejecución Inmediata y debe publicarse en el Diario Oficial La Gaceta.\nDado en la ciudad de Tegucigalpa, Municipio del Distrito Central, a los 23 del mes\nde abril del año dos mil catorce (2014).\nJUAN ORLANDO HERNANDEZ ALVARADO\nPRESIDENTE CONSTITUCIONAL DE LA REPÚBLICA\nALDEN RIVERA MONTES\nSECRETARIO DE ESTADO EN EL DESPACHO DE\nDESARROLLO ECONÓMICO Y COORDINADOR DEL\nGABINETE SECTORIAL DE DESARROLLO ECONÓMICO\n\nInvocación del Movimiento\nCooperativo Hondureño\nElevemos nuestro espíritu a Dios que es\nfuente de bondad y ejemplo de justicia, que él\nencienda en nuestros corazones, la sed de\nservir a nuestro prójimo, inspirados en los\nnobles principios del Cooperativismo, que\nilumine nuestro entendimiento y guíe nuestras\ndecisiones exentas de egoísmo y espíritu de\nlucro, a fin de alcanzar la resolución de los\nproblemas económicos-sociales y los de\nnuestros hermanos, para fomentar, conseguir\ny preservar la paz del mundo.\nAsí sea ...", "resumen": "- Vigencia del Reglamento. El presente Reglamento es de ejecución Inmediata y debe publica"}];

let filtro = 'all';
let query = '';
let debounceTimer = null;

function escapeRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function hl(text, terms){
  if(!terms.length) return text;
  const re = new RegExp('('+terms.map(escapeRe).join('|')+')','gi');
  return text.replace(re,'<mark>$1</mark>');
}

function render(){
  const q = query.trim().toLowerCase();
  const terms = q ? q.split(/\s+/).filter(Boolean) : [];
  const meta = document.getElementById('meta');
  const res = document.getElementById('results');

  if(!terms.length){
    meta.textContent = '';
    res.innerHTML = '<div class="hint"><strong>426 artículos indexados</strong>Escribe cualquier palabra para buscar en el texto literal de la ley y el reglamento.</div>';
    return;
  }

  let filtered = DB.filter(a => filtro==='all' || a.ley===filtro);
  filtered = filtered.filter(a => terms.every(t => a.texto.toLowerCase().includes(t)));

  if(!filtered.length){
    meta.textContent = '';
    res.innerHTML = '<div class="empty">No se encontraron artículos para <strong>"'+query+'"</strong><br><small style="display:block;margin-top:6px">Intenta con otra palabra o revisa la ortografía.</small></div>';
    return;
  }

  meta.textContent = filtered.length+' artículo'+(filtered.length!==1?'s':'')+' encontrado'+(filtered.length!==1?'s':'');

  res.innerHTML = filtered.map((art,i) => {
    const textoHl = hl(art.texto, terms);
    const resHl = hl(art.resumen, terms);
    return `<div class="card">
      <div class="card-head" onclick="toggle(${i})">
        <span class="art-badge ${art.ley==='LCH'?'lch':'rlch'}">${art.ley}</span>
        <span class="art-num">${art.num}</span>
        <span class="art-summary">${resHl}</span>
        <span class="chevron" id="chev-${i}">▾</span>
      </div>
      <div class="card-body" id="body-${i}">
        <div class="art-texto">${textoHl}</div>
      </div>
    </div>`;
  }).join('');
}

function toggle(i){
  const body=document.getElementById('body-'+i);
  const chev=document.getElementById('chev-'+i);
  const open=body.classList.toggle('open');
  chev.style.transform=open?'rotate(180deg)':'';
}

document.getElementById('q').addEventListener('input', function(){
  query = this.value;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 180);
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    filtro = this.dataset.f;
    render();
  });
});
</script>
