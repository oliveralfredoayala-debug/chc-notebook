onos de Participación. La emisión de\ncertificados de participación o bonos que emitan las Cooperativas debe ser\nautorizada por el CONSUCOOP y deben ser, para cualquiera de los destinos\nsiguientes:\na) Desarrollo de proyectos específicos;\nb) Ampliar la cobertura de servicios; y,\nc) Mejorar la liquidez de la Cooperativa.\nEn ningún caso el producto de los certificados de participación o bonos\npuede utilizarse para gasto corriente.", "resumen": "- Certificados o Bonos de Participación. La emisión de certificados de participación o bon"}, {"num": "Art. 119", "ley": "RLCH", "texto": "Artículo 119.- Derechos que Concede los Certificados o Bonos de\nParticipación. Los certificados de participación o bonos de certificados de\nparticipación solamente confieren el derecho de percibir la participación de los\nbeneficios que expresen y por el tiempo que indiquen no dan derecho de\nintervenir en la administración de la Cooperativa, convertirse en aportaciones ni\nrepresentan participación en el haber social. Los certificados y bonos, no son\nnegociables.\nLa emisión de certificados o bonos de participación debe ser acordado por la\nAsamblea General, autorizada por el CONSUCOOP e inscrito en el Registro\nNacional de Cooperativas.", "resumen": "- Derechos que Concede los Certificados o Bonos de Participación. Los certificados de part"}, {"num": "Art. 120", "ley": "RLCH", "texto": "Artículo 120.- Contenido de los Certificados o Bonos de Participación.\nLos certificados o bonos deben contener la información siguiente:\na) Denominación, domicilio y número de registro de la Cooperativa;\nb) Valor del certificado o bono;\nc) Monto y forma de pago del interés;\nd) Fecha de vencimiento;\ne) Fecha de resolución de aprobación de Asamblea General;\nf) Propósito de emisión;\ng) Número y fecha de resolución de autorización del CONSUCOOP;\nh) Nombre del que adquiere; y,\ni) Firma y sello del Presidente, Tesorero o Gerente de la Cooperativa.\n\n74", "resumen": "- Contenido de los Certificados o Bonos de Participación. Los certificados o bonos deben c"}, {"num": "Art. 121", "ley": "RLCH", "texto": "Artículo 121.- Tasa de Interés de los Certificados y Bonos de Participación. La\ntasa de interés fijada por la Junta Directiva para las aportaciones totalmente\npagadas y las tasas de interés para los Certificados o bonos de Participación que\nse emitan, no puede exceder las tasas de interés publicadas por el Banco Central\nde Honduras, para este tipo de operaciones en el mercado financiero.", "resumen": "- Tasa de Interés de los Certificados y Bonos de Participación. La tasa de interés fijada "}, {"num": "Art. 122", "ley": "RLCH", "texto": "Artículo 122.- Reservas y Fondos. Las reservas y los fondos creados de los\nexcedentes, son irrepartibles, la utilización de los mismos se debe ajustar\nestrictamente a la finalidad que las disposiciones legales, estatutarias o\nresoluciones asamblearias tuvieron al constituirlos.\nNo obstante, los fondos específicos creados por la Asamblea General pueden\ndesafectarse de la finalidad que les dio origen mediante resolución expresa\nadoptada en otra sesión de Asamblea General, la que debe disponer el destino\ndel saldo.", "resumen": "- Reservas y Fondos. Las reservas y los fondos creados de los excedentes, son irrepartible"}, {"num": "Art. 123", "ley": "RLCH", "texto": "Artículo 123.- Restricciones y Distribución de Excedentes. Las reservas y\nfondos que se establezcan no pueden ser mayores del cincuenta por ciento\n(50%) del total de excedentes que arroje el resultado del ejercicio social, salvo\ndisposición de la Asamblea General Ordinaria o del CONSUCOOP.\nLos excedentes restantes podrán distribuir entre los Cooperativistas de acuerdo\na su clase y lo que su Asamblea General ordinaria acuerde, en la forma siguiente:\na) En una Cooperativa de Consumo, de acuerdo al valor de las mercaderías\nque sus Afiliados(as) compren;\nb) En las Cooperativas de Ahorro y Crédito, podrá capitalizarse o distribuirse en\nrelación al monto de intereses pagados por los créditos recibidos;\nc) En las Cooperativas de Producción de acuerdo con el trabajo no remunerado\no el patrocinio, realizado por cada Afiliado(a);\nd) En las Cooperativas Mixtas por actividad realizada y uso de servicio; y,\ne) En otros tipos de Cooperativas de acuerdo al patrocinio.", "resumen": "- Restricciones y Distribución de Excedentes. Las reservas y fondos que se establezcan no "}, {"num": "Art. 124", "ley": "RLCH", "texto": "Artículo 124.- Constitución de Reservas. De acuerdo con la naturaleza de\nsus operaciones, las Cooperativas, deben establecer reservas especiales para\ncuentas de operaciones de riesgos, según la normativa que emita el\nCONSUCOOP. Así mismo con el fin de beneficiar a sus Afiliados(as), pueden\nconstituir fondos de protección para atender las necesidades de salud,\neducación, vivienda, jubilación y pensiones por vejez y muerte así como otras\nprevisiones que estimen convenientes.", "resumen": "- Constitución de Reservas. De acuerdo con la naturaleza de sus operaciones, las Cooperati"}, {"num": "Art. 125", "ley": "RLCH", "texto": "Artículo 125.- Constitución del Fondo de Educación Cooperativa. El\nFondo de Educación Cooperativo no puede ser inferior al tres por ciento (3%) del\ningreso neto anual del presupuesto, calculado del periodo fiscal anterior. Este\ndebe distribuirse de la forma siguiente:\na) Dos por ciento (2%) a Educación y Capacitación a Cooperativistas; y,\nb) Uno por ciento (1%) a Educación y Capacitación de la Juventud y Género;\nLos excedentes del fondo no ejecutados en un ejercicio económico, se\ndeben mantener en la dotación del ejercicio siguiente. En caso de no ser\nutilizados en dicho término, debe ser trasladado proporcionalmente al\nCONSUCOOP y a la CHC.", "resumen": "- Constitución del Fondo de Educación Cooperativa. El Fondo de Educación Cooperativo no pu"}, {"num": "Art. 126", "ley": "RLCH", "texto": "Artículo 126.- Reparto de Excedentes por Expulsión o Fallecimiento. En\ncaso de retiro o expulsión de un Cooperativista antes del reparto de excedentes\ndel período, al efectuarse el cálculo de los mismos, se debe pagar la suma que\ntuviere derecho en caso de muerte, dichas cantidades le deben ser entregadas a\nsus beneficiarios o herederos, según el caso.\n\n75", "resumen": "- Reparto de Excedentes por Expulsión o Fallecimiento. En caso de retiro o expulsión de un"}, {"num": "Art. 127", "ley": "RLCH", "texto": "Artículo 127.- Destino de los Excedentes por Operaciones con no\nAfiliados(as). Para los efectos del Artículo 45 de la Ley, se consideran\noperaciones con no Afiliados(as) las que realice la Cooperativa con personas que\nno tengan la calidad de Cooperativista en la propia Cooperativa y los excedentes\nprovenientes de dichas operaciones, se deben destinar a la formación de\nPrograma de Desarrollo Cooperativo.", "resumen": "- Destino de los Excedentes por Operaciones con no Afiliados(as). Para los efectos del Art"}, {"num": "Art. 128", "ley": "RLCH", "texto": "Artículo 128.- Programas de Desarrollo Cooperativo. Se consideran\nProgramas de Desarrollo Cooperativo:\na) Los que busquen el mejoramiento cuantitativo y cualitativo de los servicios\ncooperativos;\nb) Planes estratégicos y posicionamiento de la marca Cooperativa;\nc) Los orientados a capacitación, filosófica, tecnológica, investigación científica,\nde mercado y estudios técnicos, con propósito de incrementar la producción\ny productividad de la Cooperativa;\nd) Al sostenimiento de los organismos de integración nacional e internacional;\ne) Pago del aporte obligatorio al CONSUCOOP;\nf) Pago en concepto de prima al fondo de seguro de depósitos Cooperativo,\npara las cooperativas de ahorro y crédito;\ng) La atención de objetivos de incidencia social, cultural y ambiental en el área\nen que la Cooperativa desarrolle sus actividades;\nh) Investigación y ejecución de proyectos de impacto social o ambiental; y,\ni) Ejecución del sexto (6to) principio de cooperación entre Cooperativas.", "resumen": "- Programas de Desarrollo Cooperativo. Se consideran Programas de Desarrollo Cooperativo: "}, {"num": "Art. 129", "ley": "RLCH", "texto": "Artículo 129.- Manejo de la Pérdida. El excedente repartible no puede\ndistribuirse hasta que las pérdidas de ejercicios anteriores fueren totalmente\ncubiertas, en la forma que acuerde la Asamblea General Ordinaria. El Afiliado(a)\nque perdiere tal calidad debe cubrir parte de la pérdida acumulada, para lo cual\nse debe tomar en consideración la proporción del capital integrado respecto del\ntotal de la Cooperativa; el porcentaje que surja de dicha relación, se debe aplicar\nal saldo de la pérdida acumulada que no cubra las reservas patrimoniales con\nmiras a conocer el monto a debitar en la cuenta del cesante.", "resumen": "- Manejo de la Pérdida. El excedente repartible no puede distribuirse hasta que las pérdid"}, {"num": "Art. 130", "ley": "RLCH", "texto": "Artículo 130. Donaciones, Legados y Subsidios. Las donaciones, legados,\nsubsidios y demás recursos análogos que la Cooperativa recibiere, no pueden\ndistribuirse directa ni indirectamente entre los Afiliados(as). Las Cooperativas\ndeben contabilizarlo, con crédito a una cuenta del patrimonio neto.", "resumen": "Donaciones, Legados y Subsidios. Las donaciones, legados, subsidios y demás recursos análo"}, {"num": "Art. 131", "ley": "RLCH", "texto": "Artículo 131.- Revalorización de Activos. La Cooperativa puede revalorizar\nsus activos, una vez que hayan sido acordados por la Asamblea General de la\nCooperativa y previa autorización del CONSUCOOP, conforme a la normativa\nque éste emita.\nSECCIÓN V\nDERECHOS PATRIMONIALES", "resumen": "- Revalorización de Activos. La Cooperativa puede revalorizar sus activos, una vez que hay"}, {"num": "Art. 132", "ley": "RLCH", "texto": "Artículo 132.- Forma para Determinar el Derecho Patrimonial. Las\nCooperativas de Producción deben llevar un control de las horas de trabajo\ncolectivo no remuneradas de los Afiliados(as), para determinar proporcionalmente\nel derecho patrimonial que corresponde.\nSe considera Cooperativista con derecho patrimonial por plusvalía a los\nAfiliados(as) que reúnan los siguientes requisitos:\na) Estar al día con sus obligaciones económicas y sociales; y,\nb) Su ingreso o permanencia sea de por lo menos diez (10) años continuos,\nantes de la adquisición del bien.", "resumen": "- Forma para Determinar el Derecho Patrimonial. Las Cooperativas de Producción deben lleva"}, {"num": "Art. 133", "ley": "RLCH", "texto": "Artículo 133.- Liquidación de Derechos Patrimoniales en las Cooperativas\nde Producción. Solamente se puede liquidar derechos patrimoniales, en las\nCooperativas de Producción cuando:\na) Exista ganancia de capital por plusvalía en la venta de un activo fijo adquirido\npor la Cooperativa;\nb) Liquidación de la Cooperativa; y,\nc) Fallecimiento del Cooperativista.\nLa solicitud de liquidación del Derecho Patrimonial por Plusvalía debe ser\nresuelta por la Junta Directiva.", "resumen": "- Liquidación de Derechos Patrimoniales en las Cooperativas de Producción. Solamente se pu"}, {"num": "Art. 134", "ley": "RLCH", "texto": "Artículo 134.- Fallecimiento de un Cooperativista. En caso de fallecimiento\nde un cooperativista, su beneficiario o heredero tendrá derecho a formar parte\nde la cooperativa, siempre que satisfaga los requisitos estatutarios de ingreso,\nen caso de ser varios los beneficiarios o herederos, el derecho a formar parte\nde la cooperativa solo corresponderá a uno en sustitución del difunto y será\nla persona designada por escrito en el libro de Registro de cooperativista o\nen documento privado por el afiliado, caso contrario su selección se hará\nde conformidad con lo que establezcan los estatutos. En los casos que los\nmiembros fueren personas jurídicas, y la calidad de cooperativistas se perdiere\npor extinción de su personería, se procederá de conformidad el resultado de\nla liquidación.", "resumen": "- Fallecimiento de un Cooperativista. En caso de fallecimiento de un cooperativista, su be"}, {"num": "Art. 135", "ley": "RLCH", "texto": "Artículo 135.- Cancelación del Valor de Derecho Patrimonial por\nPlusvalía. Para la estabilidad económica y social de la Cooperativa ésta puede\ncancelar el valor de derecho patrimonial por plusvalía que le corresponde al\nCooperativista retirado, de una sola vez o en desembolsos parciales que disponga\nla Cooperativa, hasta por un máximo de diez (10) años.", "resumen": "- Cancelación del Valor de Derecho Patrimonial por Plusvalía. Para la estabilidad económic"}, {"num": "Art. 136", "ley": "RLCH", "texto": "Artículo 136. Daños a los Bienes. Si por cualquier eventualidad o fenómeno\nnatural, los bienes de la Cooperativa son dañados, las pérdidas deben ser aplicadas\na cada Cooperativista tomando en cuenta el avaluó realizado por un profesional\ncompetente y certificado por el CONSUCOOP.", "resumen": "Daños a los Bienes. Si por cualquier eventualidad o fenómeno natural, los bienes de la Coo"}, {"num": "Art. 137", "ley": "RLCH", "texto": "Artículo 137.- Provisión para el Pago de Derecho Patrimonial por\nPlusvalía. Para garantizar la estabilidad económica y financiera de la Cooperativa,\nésta debe estimar en cada presupuesto anual, la provisión para hacerle frente a\nla obligación de derecho patrimonial por plusvalía.", "resumen": "- Provisión para el Pago de Derecho Patrimonial por Plusvalía. Para garantizar la estabili"}, {"num": "Art. 138", "ley": "RLCH", "texto": "Artículo 138.- Reglamento de Derecho Patrimonial. Las Cooperativas de\nProducción deben emitir un Reglamento de Derecho Patrimonial por Plusvalía\naprobado por la Asamblea General Ordinaria y posteriormente por el\nCONSUCOOP, para su validez.\nSECCIÓN VI\nDISOLUCIÓN Y LIQUIDACIÓN DE LAS\nCOOPERATIVAS", "resumen": "- Reglamento de Derecho Patrimonial. Las Cooperativas de Producción deben emitir un Reglam"}, {"num": "Art. 139", "ley": "RLCH", "texto": "Artículo 139.- Causales de Disolución Forzosa de una Cooperativa. Son\ncausales para la disolución de una Cooperativa, las siguientes:\na) Disminución del número mínimo de susAfiliados(as), fijado por la Ley, durante\nel lapso de un (1) año;\nb) Imposibilidad de realizar el fin específico para el cual fue constituida durante\nel plazo de un (1) año o, por extinción del mismo;\nc) Pérdida de los recursos económicos o de una parte de éstos, que según\nprevisión del Estatuto o a juicio de la Asamblea General, haga imposible la\ncontinuación de las operaciones;\nd) Fusión con otra Cooperativa mediante incorporación total de una en la otra,\no por constitución de una nueva Cooperativa que asuma la totalidad de los\npatrimonios de las fusionadas en este último caso, la disolución afecta a ambas; y,\ne) Por resolución fundada del CONSUCOOP.", "resumen": "- Causales de Disolución Forzosa de una Cooperativa. Son causales para la disolución de un"}, {"num": "Art. 140", "ley": "RLCH", "texto": "Artículo 140.- Disolución Voluntaria. En caso de disolución voluntaria, la\nJunta Directiva debe convocar a una Asamblea General extraordinaria, debiendo\npresentar a la misma una exposición clara y objetiva de los motivos para proponer\nla disolución.\nPara que la disolución voluntaria produzca efecto, debe ser acordada por el\nmínimo de las dos terceras partes de los Afiliados(as) presentes que tengan\nderecho a voto. El Acuerdo de disolución que tome la Asamblea debe ser motivado.", "resumen": "- Disolución Voluntaria. En caso de disolución voluntaria, la Junta Directiva debe convoca"}, {"num": "Art. 141", "ley": "RLCH", "texto": "Artículo 141.- Disolución de Oficio. Cuando el CONSUCOOP comprobare\nque una Cooperativa se encuentra comprendida en los literales a), b) y c) del\nArtículo 139 precedente, debe advertir a la Junta Directiva de la misma que de no\nregularizar su situación, se declarará su disolución.", "resumen": "- Disolución de Oficio. Cuando el CONSUCOOP comprobare que una Cooperativa se encuentra co"}, {"num": "Art. 142", "ley": "RLCH", "texto": "Artículo 142. Disolución por Causas Establecidas en Otras Leyes. Es\nprocedente la disolución basada en causas establecidas en disposiciones\nlegales aplicables, en razón de la actividad que realice la Cooperativa.", "resumen": "Disolución por Causas Establecidas en Otras Leyes. Es procedente la disolución basada en c"}, {"num": "Art. 143", "ley": "RLCH", "texto": "Artículo 143.- Comisión Liquidadora. Acordada la disolución, la Asamblea\nGeneral extraordinaria debe nombrar una Comisión Liquidadora integrada por\ntres (3) miembros, de la manera siguiente: un representante del CONSUCOOP\nquién la debe presidir y dos (2) Cooperativistas. La cual entrará en funciones\ndentro de los quince (15) días siguientes a su nombramiento.", "resumen": "- Comisión Liquidadora. Acordada la disolución, la Asamblea General extraordinaria debe no"}, {"num": "Art. 144", "ley": "RLCH", "texto": "Artículo 144.- De los Liquidadores. Durante la liquidación, la Comisión\nLiquidadora administra y representa legalmente la Cooperativa en disolución,\nactuando conforme a las facultades que les otorgue el Estatuto y/o disposiciones\ndel CONSUCOOP en su caso, y si no se las determinara solamente pueden\nejecutar aquellos actos que tiendan directamente a la liquidación de las opera\u0002ciones de conformidad a lo ordenado en el Artículo 69 de la Ley.", "resumen": "- De los Liquidadores. Durante la liquidación, la Comisión Liquidadora administra y repres"}, {"num": "Art. 145", "ley": "RLCH", "texto": "Artículo 145.- Aviso de Liquidación. Constituida la Comisión Liquidadora\ndebe publicar un aviso de liquidación en el Diario Oficial La Gaceta o en un\nperiódico de circulación Nacional, en el que se haga saber el estado, disolución\ny liquidación de la Cooperativa y se inste a los acreedores para que se presenten\nante la comisión para verificar el monto de sus créditos, dentro de los quince (15)\ndías siguientes a la fecha de la última publicación.\nDentro de los treinta (30) días siguientes al vencimiento del plazo otorgado a los\nacreedores, para verificar el monto de sus créditos, la Comisión Liquidadora\ndebe presentar al CONSUCOOP, el balance de liquidación de la Cooperativa.\nEl acreedor cuyo crédito no haya sido reconocido o a quien no se le haya otorgado\nla preferencia que le corresponde conforme a la Ley, puede recurrir a los\ntribunales comunes en procura de sus pretensiones.", "resumen": "- Aviso de Liquidación. Constituida la Comisión Liquidadora debe publicar un aviso de liqu"}, {"num": "Art. 146", "ley": "RLCH", "texto": "Artículo 146.- Suspensión de la Liquidación. Presentada la demanda a la\nque se refiere el artículo precedente, se suspende la aplicación proporcional del\nactivo distribuible en el monto necesario para hacer el pago de la suma reclamada\no para respetar la preferencia alegada; salvo que los Afiliados(as) o los acreedores\nen su caso, afectados por la suspensión otorguen garantía suficiente a juicio del\njuez que conoce el asunto.\nEl CONSUCOOP debe vigilar que la liquidación se efectúe conforme a la Ley,\neste Reglamento y el Estatuto de la Cooperativa.", "resumen": "- Suspensión de la Liquidación. Presentada la demanda a la que se refiere el artículo prec"}, {"num": "Art. 147", "ley": "RLCH", "texto": "Artículo 147.- Cancelación de la Personalidad Jurídica. Agotado el proceso\nde liquidación con el informe circunstanciado de su actuación por parte de la\nComisión Liquidadora, los libros de contabilidad, de actas y los demás registros\ny archivos de la entidad Cooperativa, el CONSUCOOP cancelará la personalidad\njurídica de ésta.", "resumen": "- Cancelación de la Personalidad Jurídica. Agotado el proceso de liquidación con el inform"}, {"num": "Art. 148", "ley": "RLCH", "texto": "Artículo 148. Tramitación de la Quiebra.- Para los efectos del Artículo 67,\ninciso d) de la Ley, la quiebra de una cooperativa, se tramitará con las\nregulaciones ordenadas en el Código del Comercio, en los que sea aplicable a\nlas cooperativas, fungiendo el CONSUCOOP como sindico de la quiebra, por la\nnaturaleza del acto Cooperativo.\nCAPÍTULO III\nDE INTEGRACIÓN COOPERATIVO", "resumen": "Tramitación de la Quiebra.- Para los efectos del Artículo 67, inciso d) de la Ley, la quie"}, {"num": "Art. 149", "ley": "RLCH", "texto": "Artículo 149.- Clasificación de Cooperativas por Grado de Integración.\nLas Cooperativas de primer grado son asociaciones de personas naturales; las\nalianzas, asociaciones, uniones, centrales y federaciones, son asociaciones de\nCooperativas de segundo grado; y la confederación es una asociación de\nCooperativas de tercer grado.", "resumen": "- Clasificación de Cooperativas por Grado de Integración. Las Cooperativas de primer grado"}, {"num": "Art. 150", "ley": "RLCH", "texto": "Artículo 150.- Asociación de Cooperativas entre sí. Las Cooperativas\npueden asociarse entre sí para intercambiar servicios, celebrar contratos de\nparticipación, complementar actividades, cumplir en forma más adecuada el\nobjeto social y llevar a la práctica el principio de integración cooperativa.\nMediante la constitución de sociedades, asociaciones de cualquier clase, entre sí\no con otras personas físicas o jurídicas, siempre que ello no altere su objeto\nsocial, viole las disposiciones de la Ley, este Reglamento y que la misma asociación\nsea entre cooperativas o con sociedades constituidas por Cooperativas.\nLos excedentes recibidos por las Cooperativas de estos actos, será considerados\ncomo excedentes distribuibles a sus afiliados, por el origen de los fondos\ntransferidos. El CONSUCOOP calificará tal acto.", "resumen": "- Asociación de Cooperativas entre sí. Las Cooperativas pueden asociarse entre sí para int"}, {"num": "Art. 151", "ley": "RLCH", "texto": "Artículo 151.- Funciones de los Organismos de Segundo Grado. Los\norganismos de segundo grado, se deben constituir con el objeto de cumplir para\nsus afiliadas, fines sociales, económicos y de representación. Estas tendrán las\nsiguientes funciones:\na) Representar y defender los intereses de las Cooperativas afiliadas;\nb) Mediar en la solución de los conflictos que surjan entre las Cooperativas que\nla conforman;\nc) Ofrecer asesoramiento, asistencia técnica y capacitación a sus afiliadas,\nsegún su especialidad;\nd) Prestar servicios de provisión y abastecimiento de materia prima, herramientas,\ninsumos y respuestas;\ne) Asesorar a sus afiliadas en el cumplimiento de las recomendaciones de\nauditoría y del Organismo Regulador;\nf) Constituir unidades de auditoría externa para sus afiliadas, cumpliendo las\ncondiciones establecidas por el Ente Regulador;\ng) Fomentar y desarrollar programas de educación en economía social y\nsolidaria y en cooperativismo, a nivel nacional;\nh) Velar por la aplicación correcta de las disposiciones legales y estatutarias de\nsus afiliadas;\ni) Establecer relaciones nacionales e internacionales con organismos relacionados\ncon la economía social;\nj) Promover la constitución de Cooperativas de su respectiva clase;\nk) Crear centros de mediación para la solución de conflictos en las Cooperativas\no suscribir convenios para este fin con centros legalmente autorizados;\nl) Consolidar la información estadística sobre patrimonio, activos, Afiliados(as)\ny operaciones de sus afiliadas;\nm) Representar ante las autoridades gubernamentales y organismos internacionales;\nn) Colaborar con el Organismo Regulador, en actividades de interés del\nSistema Cooperativo;\no) Canalizar recursos financieros provenientes de instituciones públicas y\nprivadas, nacionales o extranjeras en beneficio de sus filiales; y,\np) Las demás que establezca la Ley, este Reglamento y su Estatuto Social.", "resumen": "- Funciones de los Organismos de Segundo Grado. Los organismos de segundo grado, se deben "}, {"num": "Art. 152", "ley": "RLCH", "texto": "Artículo 152.- Confederación. La Confederación es el máximo organismo de\nintegración representativa de las Cooperativas. Se debe constituir con las\nAlianzas, Asociaciones, Uniones, Centrales y Federaciones Nacionales de cada\nuna de las formas de Asociación, para cumplir los objetivos que le señala\nla Ley.", "resumen": "- Confederación. La Confederación es el máximo organismo de integración representativa de "}, {"num": "Art. 153", "ley": "RLCH", "texto": "Artículo 153.- Haber Social Inicial. Los organismos de segundo grado, se\ndeben constituir con un monto mínimo equivalente a diez (10) salarios\nmínimos.", "resumen": "- Haber Social Inicial. Los organismos de segundo grado, se deben constituir con un monto "}, {"num": "Art. 154", "ley": "RLCH", "texto": "Artículo 154.- Estructura y Organización Interna de los Organismos de\nIntegración. Los organismos de segundo grado, se rigen por las mismas normas\nde las Cooperativas, en cuanto les fuere aplicable, deben ajustarse a su misma\nestructura interna y pueden establecer las oficinas que sean necesarias para la\neficiente prestación de los servicios que proporcionen.", "resumen": "- Estructura y Organización Interna de los Organismos de Integración. Los organismos de se"}, {"num": "Art. 155", "ley": "RLCH", "texto": "Artículo 155.- Asambleas y Congresos de los Organismos de\nIntegración. Los organismos de segundo grado, deben efectuar sus Asambleas\nanualmente, con el objeto de conocer los informes económicos, administrativos\ny aprobar sus planes de desarrollo.", "resumen": "- Asambleas y Congresos de los Organismos de Integración. Los organismos de segundo grado,"}, {"num": "Art. 156", "ley": "RLCH", "texto": "Artículo 156.- Pérdida de Representación. Los miembros de la Junta\nDirectiva y Vigilancia de las entidades de integración mantienen esa calidad,\nmientras sean directivos de la afiliada, en cuya representación fueron electos.\nEn caso que termine el período en la organización afiliada a que pertenecen, es\nrequisito la ratificación escrita de la nueva directiva de dicha entidad. En\ncaso contrario debe asumir el suplente del organismo de integración que\ncorresponda.", "resumen": "- Pérdida de Representación. Los miembros de la Junta Directiva y Vigilancia de las entida"}, {"num": "Art. 157", "ley": "RLCH", "texto": "Artículo 157.- Integración de las Asambleas de los Organismos de\nSegundo Grado. Los organismos de segundo grado están formados por las\nCooperativas afiliadas. De conformidad con el Estatuto, cada delegación o\nCooperativa representada tiene derecho a un solo voto.", "resumen": "- Integración de las Asambleas de los Organismos de Segundo Grado. Los organismos de segun"}, {"num": "Art. 158", "ley": "RLCH", "texto": "Artículo 158.- Integrantes de la Confederación. La Confederación está\nintegrada por los organismos de segundo grado. Tiene carácter representativo\ndel movimiento cooperativo nacional, sus objetivos a nivel nacional son los de\nrepresentación, coordinación y defensa de los intereses sociales, económicos y\nde integración. Para ello es necesario que el acuerdo sea tomado por su\nrespectiva Asamblea General.", "resumen": "- Integrantes de la Confederación. La Confederación está integrada por los organismos de s"}, {"num": "Art. 158-A", "ley": "RLCH", "texto": "Artículo 158-A.- Con la finalidad de impulsar la creación del Banco Cooperativo,\nla Confederación Hondureña de Cooperativas realizara gestiones encaminadas\na la organización, autorización, constitución, capitalización y funcionamiento del\nmismo.", "resumen": "- Con la finalidad de impulsar la creación del Banco Cooperativo, la Confederación Hondure"}, {"num": "Art. 159", "ley": "RLCH", "texto": "Artículo 159.- Integración Internacional de los Organismos de Segundo\nGrado y la Confederación. Los organismos de segundo grado y la\nConfederación, pueden afiliarse a organizaciones internacionales de Cooperativas\ncon el objeto de coordinar actividades técnicas, educativas y de intercambio\ncultural y científico.", "resumen": "- Integración Internacional de los Organismos de Segundo Grado y la Confederación. Los org"}, {"num": "Art. 160", "ley": "RLCH", "texto": "Artículo 160.- Limitantes a la Integración. Ninguna Cooperativa de cualquier\nsubsector, puede pertenecer a más de un organismo de segundo grado a nivel\nnacional.", "resumen": "- Limitantes a la Integración. Ninguna Cooperativa de cualquier subsector, puede pertenece"}, {"num": "Art. 161", "ley": "RLCH", "texto": "Artículo 161.- Constitución de los Organismos de Segundo Grado. Los\norganismos de segundo grado, se deben constituir por medio de sesión de la\nAsamblea General celebrada para tal fin y por los delegados de las Cooperativas\ninteresadas.\nA tal Asamblea de Constitución, deben concurrir un delegado propietario y un\nsuplente por cada Cooperativa, nombrados por la Junta Directiva con derecho a\nun voto por Cooperativa.\nLos organismos de segundo grado, se deben constituir con veinte (20) o más\nCooperativas, debiendo afiliarse a la CHC de conformidad a los requisitos que el\nEstatuto de la misma exija.", "resumen": "- Constitución de los Organismos de Segundo Grado. Los organismos de segundo grado, se deb"}, {"num": "Art. 162", "ley": "RLCH", "texto": "Artículo 162.- Retiro de Afiliación a un Organismo de Integración. Toda\nCooperativa que integre un organismo de segundo grado, puede en cualquier\ntiempo retirarse de la entidad a que esté afiliada, siempre que el retiro haya sido\nacordado en Asamblea General Ordinaria y señalen a que organismo de segundo\ngrado se pretenden afiliar, tal acuerdo de asamblea debe comunicarse a la Junta\nDirectiva del organismo a cual se pretende desafiliar.", "resumen": "- Retiro de Afiliación a un Organismo de Integración. Toda Cooperativa que integre un orga"}, {"num": "Art. 163", "ley": "RLCH", "texto": "Artículo 163.- Constitución de Reserva Legal de los Organismos de\nSegundo Grado y la Confederación. Los organismos de segundo grado y la\nConfederación, sólo están obligadas a constituir el Fondo de Reserva Legal, con\nel objeto de cubrir las pérdidas que pudieren producirse en un ejercicio económico\ny responder de obligaciones para con terceros. A excepción, si realizan\nintermediación financiera autorizada por el CONSUCOOP con sus afiliadas.", "resumen": "- Constitución de Reserva Legal de los Organismos de Segundo Grado y la Confederación. Los"}, {"num": "Art. 164", "ley": "RLCH", "texto": "Artículo 164.- Auto de Liquidación de los Organismos de Segundo Grado.\nUna vez constituido un organismo de segundo grado, para su funcionamiento\ny el goce de sus derechos y privilegios, deben mantener el número mínimo\nde miembros que establece el párrafo tercero del Artículo 161 de este\nReglamento.\nEn caso contrario, goza del período de un (1) año prorrogable por una sola vez,\npara cumplir con dicho requisito. Transcurrido dicho término el CONSUCOOP\nprocederá a realizar la liquidación de oficio.\nDurante dicho período sus derechos políticos de elegir y ser electo ante los\norganismos de integración, queda en suspenso.", "resumen": "- Auto de Liquidación de los Organismos de Segundo Grado. Una vez constituido un organismo"}, {"num": "Art. 165", "ley": "RLCH", "texto": "Artículo 165.- Aplicación de las Disposiciones de la Ley, a los organismos\nde segundo grado y la Confederación. Para todos los efectos legales los\norganismos de segundo grado y la Confederación, son consideradas como\nCooperativas, por lo tanto son válidos para ellas las disposiciones de consti\u0002tución, administración y funcionamiento, así como los privilegios contenidos en la\nLey y este Reglamento.", "resumen": "- Aplicación de las Disposiciones de la Ley, a los organismos de segundo grado y la Confed"}, {"num": "Art. 166", "ley": "RLCH", "texto": "Artículo 166.- CONAMUCOOPH. El Consejo Nacional de la Mujer\nCooperativista de Honduras es un organismo auxiliar de la C.H.C., encargado de\nimpulsar y fortalecer el liderazgo, la igualdad de oportunidades para la mujer en\nel sector Cooperativista y tiene las atribuciones siguientes:\na) Conformar alianzas estratégicas con instituciones y/u organizaciones\npúblicas y privadas, con el objeto de promover programas en defensa de los\nderechos de la mujer;\nb) Coadyuvar con el Estado y sus instituciones en la promoción e incorporación\nen las Cooperativas, de lo establecido en el Plan de Igualdad y Equidad de\nGénero en Honduras;\nc) Velar por la equidad de género y el desarrollo de las mujeres y sus derechos\nen el sistema cooperativo nacional;\nd) Impulsar y promover la incidencia política social y económica, así como de\nla participación en la toma de decisiones;\ne) Fomentar el liderazgo y la participación política de las mujeres a través de la\nformación, capacitación, asistencia técnica y las alianzas estratégicas;\nf) Fomentar la educación Cooperativista mediante metodologías y contenidos\ncon equidad de género acordes a la realidad de las mujeres del área rural y\nurbana del país;\ng) Estimular el empoderamiento, autonomía económica, la iniciativa individual\ny colectiva de la mujer en la participación productiva desde la perspectiva del\ndesarrollo sostenible bajo el modelo de empresas de economía social;\nh) Velar por la creación de los Comités de Género a lo interno de las Cooperativas\nde cualquier grado y establecer para su funcionamiento las Políticas e\nInstrumentos para la Institucionalización y Transversalidad de equidad de\ngénero\ni) Promover la creación de los Comités de Género a lo interno de las Cooperativas\nde cualquier grado;\nj) Diseñar y ejecutar programas formativos con equidad de género que\nsensibilicen y concienticen la participación de la mujer y el hombre en\nigualdad y equidad; y,\nk) Diseñar e implementar programas educativos y otros que promuevan la\ntransformación de las prácticas patriarcales, masculinidad y la economía del\ncuidado.", "resumen": "- CONAMUCOOPH. El Consejo Nacional de la Mujer Cooperativista de Honduras es un organismo "}, {"num": "Art. 167", "ley": "RLCH", "texto": "Artículo 167.- Otras Funciones del CONAMUCOOPH. Sin perjuicio de las\natribuciones contenidas en el Artículo anterior, para el logro de los objetivos\nindicados, el CONAMUCOOPH puede realizar las funciones siguientes:\na) Gestionar recursos financieros para el otorgamiento de créditos blandos\npara incentivar a la iniciativa productiva empresarial que contribuya a la\nautonomía económica de la mujer;\nb) Promover con los organismos de segundo grado afines al movimiento\ncooperativo y estructuras gubernamentales la gestión de adquisición de\ntierras para las mujeres Cooperativistas de la zona rural;\nc) Crear a lo interno del Consejo secciones y servicios que beneficien a las\nafiliadas que tiendan a fortalecer el desarrollo y crecimiento del CONAMUCOOPH;\nd) Recibir aportaciones ordinarias y cuotas de sostenimiento ordinarias y\nextraordinarias de sus Cooperativas bases, organizaciones de 2do grado y\nConfederación Hondureña de Cooperativas;\ne) Gestionar ante organizaciones nacionales e internacionales la obtención de\nrecursos económicos y técnicos que permitan el fortalecimiento, desarrollo y\ncrecimiento del CONAMUCOOPH; y,\nf) Desarrollar Encuentros y Foros Regionales, nacionales e internacionales, para\nempoderar, promover, motivar la participación y generación de propuestas\nde desarrollo con incidencia desde lo local a lo nacional e internacional.\ng) Promover el uso lenguaje inclusivo e impulsar la elaboración de diagnósticos\nsobre la condición y posición de las mujeres en movimiento Cooperativo.", "resumen": "- Otras Funciones del CONAMUCOOPH. Sin perjuicio de las atribuciones contenidas en el Artí"}, {"num": "Art. 168", "ley": "RLCH", "texto": "Artículo 168.- Recursos Económicos del CONAMUCOOPH. Son recursos\neconómicos del CONAMUCOOPH:\na) Las aportaciones ordinarias y cuotas de sostenimiento de las Afiliadas;\nb) Las transferencias que reciba de la C.H.C.;\nc) Donaciones, herencias o legados por parte de la cooperación nacional e\ninternacional y organizaciones afiliadas;\nd) Los intereses devengados por tasas activas de fondos especiales de crédito\ny tasas pasivas por depósitos en instituciones financieras; y,\ne) El producto de actividades como eventos de capacitación, Encuentros,\nForos nacionales e internacionales que realice.", "resumen": "- Recursos Económicos del CONAMUCOOPH. Son recursos económicos del CONAMUCOOPH: a) Las apo"}, {"num": "Art. 169", "ley": "RLCH", "texto": "Artículo 169.- Dirección y Administración del CONAMUCOOPH. La\nDirección y Administración del CONAMUCOOPH está a cargo de la Asamblea\nGeneral, Junta Directiva, Dirección Ejecutiva y la fiscalización y vigilancia a cargo\nde la Junta de Vigilancia.\nEl CONAMUCOOPH, debe elaborar su estatuto para su funcionamiento interno.", "resumen": "- Dirección y Administración del CONAMUCOOPH. La Dirección y Administración del CONAMUCOOP"}, {"num": "Art. 170", "ley": "RLCH", "texto": "Artículo 170.- Funciones del Consejo Nacional de la Juventud Cooperativista:\nEl Consejo Nacional de la Juventud Cooperativista, es un organismo auxiliar de la\nC.H.C., encargado de impulsar, promover y fortalecer el liderazgo y la participación\nde los Jóvenes en el sector Cooperativista y tiene las funciones siguientes:\na) Fortalecer las cooperativas juveniles y/o escolares, ya existentes mediante\nla capacitación, nuevos proyectos y el seguimiento;\nb) Promover la formación de las cooperativas juveniles y/o escolares;\nc) Promover la participación de la Juventud, para lograr un desarrollo integrado\nen el plano de la educación, social, económico en su formación como futuros\ndirigentes cooperativistas;\nd) Promover jornadas de capacitación dirigidas a los jóvenes, para el\nfortalecimiento del liderazgo juvenil cooperativo;\ne) Divulgar los principios y valores cooperativistas;\nf) Promover la creación de los Comités de Juventud a lo interno de las Cooperativas\nde cualquier grado;\ng) Participar o promover campañas ecológicas, de limpieza, de reforestación y\npreservación;\nh) Coordinar convivios sociales, deportivos o culturales, a nivel nacional con\notras organizaciones juveniles de todo el país;\ni) Promover pasantías a diferentes cooperativas a nivel nacional para la\nintegración y convivencia con sus grupos juveniles;\nj) Gestionar ante organizaciones nacionales e internacionales la obtención de\nrecursos económicos y técnicos, a través de la CHC, que permitan la\nrealización de proyectos educativos, culturales y sociales;\nk) Desarrollar Encuentros y Foros Regionales, nacionales e internacionales,\npara empoderar, promover, motivar la participación de la juventud, para la\ngeneración de propuestas de desarrollo con incidencia local a lo nacional e\ninternacional; y, l) Otras que le designe la CHC.\n\n83", "resumen": "- Funciones del Consejo Nacional de la Juventud Cooperativista: El Consejo Nacional de la "}, {"num": "Art. 171", "ley": "RLCH", "texto": "Artículo 171.- Recursos Económicos del Consejo Nacional de la\nJuventud Cooperativista\na) Las aportaciones ordinarias y cuotas de sostenimiento de las Afiliadas;\nb) Las transferencias que reciba de la C.H.C.;\nc) Donaciones, herencias o legados por parte de la cooperación nacional e\ninternacional y organizaciones afiliadas; y,\nd) El producto de actividades como eventos de capacitación, Encuentros,\nForos nacionales e internacionales que realice.", "resumen": "- Recursos Económicos del Consejo Nacional de la Juventud Cooperativista a) Las aportacion"}, {"num": "Art. 172", "ley": "RLCH", "texto": "Artículo 172.- Dirección y Administración del Consejo Nacional de la\nJuventud Cooperativista. La Dirección y Administración del Consejo Nacional\nde la Juventud Cooperativista está a cargo de la Asamblea General,\nJunta Directiva y la fiscalización y vigilancia a cargo de la Junta de\nVigilancia.\nEl Consejo Nacional de la Juventud Cooperativista debe elaborar su estatuto\npara su funcionamiento interno.", "resumen": "- Dirección y Administración del Consejo Nacional de la Juventud Cooperativista. La Direcc"}, {"num": "Art. 173", "ley": "RLCH", "texto": "Artículo 173.- Funciones del IFC. Para cumplir con lo establecido en el\nArtículo 91 literal j) de la Ley, el IFC como departamento técnico de la CHC,\nrealizará las siguientes funciones:\na) Fomentar la organización y desarrollo de toda clase de Cooperativas;\nb) Constituir nuevas Cooperativas y mantener registro del mismo;\nc) Desarrollar auditorias sociales de las Cooperativas;\nd) Elaborar planes de gobernabilidad y estratégicos a las Cooperativas de\nprimer, segundo o tercer grado;\ne) Brindar la capacitación a las Cooperativas en temas de doctrina, fortalecimiento\nde los cuerpos directivos y mejoramiento personal;\nf) Certificar y acreditar los planes de capacitación y formación de las cooperativas,\nen lo relacionado a los afiliados que aspiran a ser directivos;\ng) Hacer investigaciones sociales sobre el modelo cooperativo hondureño u\notros temas relacionados;\nh) Elaborar currículos que respondan a las necesidades educativas por los\nsubsectores;\ni) Desarrollar acciones de asistencia técnica que fortalezcan la relación\nempresarial de las organizaciones Cooperativas;\nj) Establecer convenios formativos con universidades u otras instituciones\neducativas especializadas basados en el plan diseñado y certificado por la\nComisión Nacional de Educación Alternativa No Formal;\nk) Llevar las estadísticas del sistema cooperativo por subsector, género,\nactividad y otros que sea necesario para la toma de decisiones de la\nC.H.C.; y,\nl) Otras que le sean encomendadas por la administración de la C.H.C.\nCAPÍTULO IV\nDE LA PROTECCIÓN ESTATAL", "resumen": "- Funciones del IFC. Para cumplir con lo establecido en el Artículo 91 literal j) de la Le"}, {"num": "Art. 174", "ley": "RLCH", "texto": "Artículo 174.- Medidas de Integración del Sector. Los organismos del\nEstado ligados con la economía y desarrollo nacional deben dictar las medidas\npertinentes a efecto de ejecutar las acciones que se requieren para integrar la\nrepresentación del sector Cooperativista.\n\n84", "resumen": "- Medidas de Integración del Sector. Los organismos del Estado ligados con la economía y d"}, {"num": "Art. 175", "ley": "RLCH", "texto": "Artículo 175.- Enseñanza del Cooperativismo. El sector público y el sector\ncooperativo, deben coordinar sus esfuerzos en la elaboración de estudios\na nivel básico, medio y superior para desarrollar la educación y la práctica\ndel cooperativismo. En este sentido, deben propiciar que cada centro\neducacional tenga su propia Cooperativa escolar o juvenil, a fin que los educandos\naprendan el cooperativismo mediante la vivencia práctica directa.\nSus sistemas educativos y de aprendizaje deben estar centrados en la persona\nhumana.", "resumen": "- Enseñanza del Cooperativismo. El sector público y el sector cooperativo, deben coordinar"}, {"num": "Art. 176", "ley": "RLCH", "texto": "Artículo 176.- Beneficios para los organismos de segundo grado y la\nConfederación. Los organismos de segundo grado y la Confederación, gozan\nde los mismos privilegios concedidos a las cooperativas de primer grado,\npor la ley.", "resumen": "- Beneficios para los organismos de segundo grado y la Confederación. Los organismos de se"}, {"num": "Art. 177", "ley": "RLCH", "texto": "Artículo 177.- Concesiones para las Cooperativas. El Estado y los Municipios\ndeben otorgar en forma prioritaria concesiones a las Cooperativas, para la\nexplotación de los recursos naturales, así como para prestar servicios públicos,\ne instalar y operar otros de la misma naturaleza.", "resumen": "- Concesiones para las Cooperativas. El Estado y los Municipios deben otorgar en forma pri"}, {"num": "Art. 178", "ley": "RLCH", "texto": "Artículo 178.- Constancia de Cumplimiento de Obligaciones. Para acceder\na los beneficios que les otorgue la ley y este reglamento, las instituciones\npúblicas y privadas están obligadas a solicitar a las Cooperativas, constancia\nextendida por el CONSUCOOP, que acredite estar activas y en cumplimiento de\nsus obligaciones. La referida constancia de solvencia y registro, tendrá un (1)\naño de vigencia.\nLa inobservancia de esta disposición acarrea perjuicio a la institución que obvie\nla misma.", "resumen": "- Constancia de Cumplimiento de Obligaciones. Para acceder a los beneficios que les otorgu"}, {"num": "Art. 179", "ley": "RLCH", "texto": "Artículo 179.- Inclusión Social y Financiera. Las entidades del sector\npúblico que concedan financiamiento y cofinanciamiento a las\nCooperativas amparadas por la Ley, deben priorizar en su otorgamiento los\nprogramas y proyectos que promuevan la inclusión social y financiera en las que\nse debe privilegiar la generación de empleo, desarrollo del agro, la participación\nde migrantes, la participación de mujeres jefes de familia y otros\nprogramas tendientes a reducir la brecha de género.", "resumen": "- Inclusión Social y Financiera. Las entidades del sector público que concedan financiamie"}, {"num": "Art. 180", "ley": "RLCH", "texto": "Artículo 180.- Retención Obligatoria. Las dependencias, empresa del\nEstado, ya sean centralizadas, desconcentradas o descentralizadas, así\ncomo las empresas del sector privado, están obligadas a efectuar las\ndeducciones de los sueldos, salarios o jornales que sus empleados\no trabajadores autoricen por escrito, para aplicarse a pagos de\naportaciones, ahorros, préstamos, intereses o cualquier otra obligación\nque como deudor o fiador de una Cooperativa, en su caso, contraigan\nhasta la completa cancelación de la misma.\nLas referidas instituciones entregarán la suma deducida a la respectiva Cooperativa\ndentro de los cinco (5) días siguientes a haberla efectuado, caso contrario\nse sujetan a la responsabilidad que corresponde, como una apropiación\nindebida.\nLa autorización debe otorgarse en dos (2) ejemplares y concedida la misma es\nirrevocable en tanto subsista la obligación para con la Cooperativa y ésta no\ncomunique lo contrario.", "resumen": "- Retención Obligatoria. Las dependencias, empresa del Estado, ya sean centralizadas, desc"}, {"num": "Art. 181", "ley": "RLCH", "texto": "Artículo 181.- Inembargabilidad. Los acreedores personales de un Afiliado(a)\na una Cooperativa, no pueden embargar más que los intereses que les\ncorrespondan y a la parte de las aportaciones a que tengan derecho el\ncooperativista en caso de liquidación de la cooperativa y será efectiva hasta\ncuando ésta se efectúe.\nCAPITULO V\nDE LAS SANCIONES", "resumen": "- Inembargabilidad. Los acreedores personales de un Afiliado(a) a una Cooperativa, no pued"}, {"num": "Art. 182", "ley": "RLCH", "texto": "Artículo 182.- Régimen Sancionatorio. Al tenor de lo establecido en el", "resumen": "- Régimen Sancionatorio. Al tenor de lo establecido en el"}, {"num": "Art. 63", "ley": "RLCH", "texto": "Artículo\n63-A de la Ley, el CONSUCOOP, debe emitir un reglamento especial de\nsanciones, que regule el procedimiento para la aplicación de las mismas.\nLas multas provenientes de las sanciones que imponga el CONSUCOOP se\ndeben hacer efectivas por los medios que determine el CONSUCOOP.", "resumen": "A de la Ley, el CONSUCOOP, debe emitir un reglamento especial de sanciones, que regule el "}, {"num": "Art. 183", "ley": "RLCH", "texto": "Artículo 183.- Procedimiento Administrativo Sancionador. El ejercicio de\nla potestad sancionadora otorgada a la Superintendencia se rige por los principios\nsiguientes:\na) Legalidad. Las sanciones deben basarse en la Ley;\nb) Tipicidad. Las infracciones deben encontrarse expresamente tipificadas en\nla Ley;\nc) Proporcionalidad. En la imposición de sanciones se debe guardar la debida\nproporción y ponderación entre la gravedad de la infracción y la sanción\naplicada, considerándose los criterios de intencionalidad, perjuicio y\nreincidencia, en este último caso, cuando haya resolución en firme previa;\nd) Responsabilidad. La responsabilidad en la comisión de una infracción puede\ndarse por acción u omisión y puede ser individual, solidaria o subsidiaria; y,\ne) Irretroactividad. Sólo se puede imponer sanciones que estuvieren vigentes\nal momento de producirse los hechos que constituyan infracción administrativa.\nLas disposiciones sancionadoras solamente producen efecto retroactivo en\ncuanto favorezcan al presunto infractor.", "resumen": "- Procedimiento Administrativo Sancionador. El ejercicio de la potestad sancionadora otorg"}, {"num": "Art. 184", "ley": "RLCH", "texto": "Artículo 184.- Competencia. En el procedimiento administrativo sancionador\nlos expedientes se deben tramitar y resolver, en primera instancia, ante el\nSuperintendente que corresponda.\nLa segunda y definitiva instancia en vía administrativa ante el Director Ejecutivo,\ncon la excepción que establece la ley en su", "resumen": "- Competencia. En el procedimiento administrativo sancionador los expedientes se deben tra"}, {"num": "Art. 119", "ley": "RLCH", "texto": "Artículo 119-O literal g).", "resumen": "O literal g)."}, {"num": "Art. 185", "ley": "RLCH", "texto": "Artículo 185.- Garantía de Procedimiento. El ejercicio de la potestad\nsancionadora del CONSUCOOP se rige conforme a la aplicación del\nprocedimiento sancionador establecido en este título; en ningún caso se puede\nimponer una sanción sin que se hayan observado las garantías básicas del\ndebido proceso.", "resumen": "- Garantía de Procedimiento. El ejercicio de la potestad sancionadora del CONSUCOOP se rig"}, {"num": "Art. 186", "ley": "RLCH", "texto": "Artículo 186.- Actos de instrucción. La Superintendencia, de oficio, por\ndenuncia o por petición fundamentada de otro órgano de la Administración\nPública, puede disponer la práctica de los mecanismos de control previstos en el\npresente Reglamento, a fin de determinar la existencia o no de infracciones\ntipificadas en la Ley, que ameriten la apertura de un expediente administrativo y\nel inicio de un procedimiento sancionador.\nEl procedimiento sancionador se inicia mediante auto motivado, precisando la\nnorma que le atribuye la competencia; la supuesta infracción y él o los presuntos\nresponsables, la sanción que se impondría, las medidas provisionales de ser\nnecesarias y los actos de instrucción que deban efectuarse.", "resumen": "- Actos de instrucción. La Superintendencia, de oficio, por denuncia o por petición fundam"}, {"num": "Art. 187", "ley": "RLCH", "texto": "Artículo 187.- Requisitos de las Denuncias y Reclamos. Las denuncias\ny reclamos que se formulen ante el CONSUCOOP deben reunir lo siguiente\nrequisitos:\na) Suma que indique su contenido;\nb) La nominación de la autoridad a quien se dirige;\nc) Los nombres y apellidos y generales de Ley del o los denunciantes y si actúa\ntravés de apoderado o representante legal, documento que lo acredite;\nd) Acreditación de estar afiliado(a) a la Cooperativa denunciada, ser beneficiario\ny/o heredero del afiliado difunto;\ne) La relación del hecho que se funda la denuncia;\nf) El lugar para notificaciones al denunciado; ,\ng) La firma o huella digital del compareciente o de su representante o procurador.\nh) Acreditar que agotó la vía en primera instancia ante la cooperativa; y\ni) Otros que establezca la normativa emitida por el CONSUCOOP\nCAPÍTULO VI\nDEL CONSEJO SUPERVISOR DE COOPERATIVAS\nSECCION I\nDE LA SUPERVISION E INTERVENCION", "resumen": "- Requisitos de las Denuncias y Reclamos. Las denuncias y reclamos que se formulen ante el"}, {"num": "Art. 188", "ley": "RLCH", "texto": "Artículo 188.- Funciones de La Superintendencia de otros subsectores:\nLa Superintendencia de otros subsectores, es el órgano técnico especializado\ndel Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) en materia de\nsupervisión, para los subsectores de producción, servicio, de las cooperativas de\nahorro y crédito con activos menores a los establecidos en el Artículo 51 de la\nLey, organismos de integración, teniendo las funciones siguientes:\na) Dictar resoluciones de carácter general y particular, y establecer normas\nprudenciales con arreglo a la legislación vigente, con el fin de hacer más\nefectiva la supervisión y regulación que por subsector aplique, para su mejor\nadministración y control;\nb) Ejercer la fiscalización, control, supervisión administrativa, económico-financiera,\nsocial, legal y la gestión de riesgos, tan frecuentemente como lo crea\nnecesario y sin previo aviso;\nc) Dictar las normas que aseguren el cumplimiento y práctica de los principios\ndel buen Gobierno Cooperativo;\nd) Dictar las normas que regulen y limiten el buen funcionamiento de aquellas\nestructura administrativa, pero quienes si deben nombrar al menos a un\nTesorero, un Administrador o Gerente General o quien haga sus veces.\ne) Dictar las normas que aseguren una adecuada coordinación entre las\nlabores de supervisión, con las que realizan las auditorías internas y externas;\nOrdenar la adopción y ejecución de un plan de regularización, que contenga\nf) las acciones, procedimientos, responsabilidades, metas e indicadores de\nmedición, fechas de ejecución para solventar las deficiencias administrativas\no financieras determinadas;\ng) Informar trimestralmente al Director Ejecutivo del Consejo Nacional Supervisor\nde Cooperativas (CONSUCOOP), los resultados de su labor de supervisión; y,\nh) Realizar cualquier otro acto y operaciones compatibles con su naturaleza y\nfinalidad, que asegure cumplir y hacer cumplir las disposiciones de la\nLey, los reglamentos, las resoluciones emitidas por el Consejo Nacional\nSupervisor de Cooperativas (CONSUCOOP) y demás normas vigentes,\na través de normativas prudenciales de control administrativo.", "resumen": "- Funciones de La Superintendencia de otros subsectores: La Superintendencia de otros subs"}, {"num": "Art. 189", "ley": "RLCH", "texto": "Artículo 189.- Supervisión Pública. A los efectos del ejercicio de la\nSupervisión Pública, las Cooperativas están obligadas a proporcionar al\nfuncionario designado, bajo responsabilidad de sus directivos, todas las\nfacilidades que requieran para el cumplimiento de su cometido.\nLos funcionarios del CONSUCOOP están facultados para requerir por escrito, a\nlos directivos, auditor interno, funcionarios y empleados, los libros de contabilidad\ny todos los documentos justificativos de sus operaciones e informes de la Junta\nde Vigilancia y auditores internos y externos.\nEn caso de negativa, el CONSUCOOP puede solicitar el auxilio judicial pertinente.", "resumen": "- Supervisión Pública. A los efectos del ejercicio de la Supervisión Pública, las Cooperat"}, {"num": "Art. 190", "ley": "RLCH", "texto": "Artículo 190.- Informes de Supervisión. Las supervisiones que realice el\nCONSUCOOP, darán lugar a la elaboración de reportes escritos cuyo contenido\ndebe ser puesto en conocimiento de la Junta Directiva de la cooperativa, a fin de\nque se adopten las medidas correctivas pertinentes en el plazo que para el efecto\nse señale.", "resumen": "- Informes de Supervisión. Las supervisiones que realice el CONSUCOOP, darán lugar a la el"}, {"num": "Art. 191", "ley": "RLCH", "texto": "Artículo 191.- Requisitos a llenar por las Firmas auditoras externas.- Una\nfirma auditora externas contratada, debe cumplir con los requisitos siguientes:\na) Los accionistas, directores, administradores, representantes legales de la\nfirma y las personas habilitadas para dirigir auditorías o suscribir informes,\nno podrán ser miembros de Junta Directiva, Junta de Vigilancia y Gerencia\no empleados de la cooperativa, ni sus cónyuges y parientes dentro del\ncuarto grado de consanguinidad o segundo de afinidad;\nb) La sociedad, los socios, directores y demás profesionales de auditoría de la\nfirma no deberán tener obligaciones directas o indirectas en condiciones\npreferentes con la cooperativa; y,\nc) No se encuentren en alguna circunstancia que pudiera afectar su independencia\nsegún lo señalan las Normas Internacionales de Auditoría.", "resumen": "- Requisitos a llenar por las Firmas auditoras externas.- Una firma auditora externas cont"}, {"num": "Art. 192", "ley": "RLCH", "texto": "Artículo 192.- Responsabilidad de las Firmas Auditoras Externas.- Las\nfirmas auditoras externas, asumen plena responsabilidad por los informes que\nemitan y que no revelen apropiadamente las situaciones que demuestren la falta\nde solvencia, insuficiencia patrimonial y/o acentuada debilidad financiera\no económica de la cooperativa auditada, a la fecha del examen, así como\nincumplimientos del presente capítulo.\nLas firmas auditoras externas presentarán y discutirán el informe preliminar con\nla administración, Junta Directiva y Junta de Vigilancia de la Cooperativa auditada\nantes de emitir el informe definitivo.\nEn caso de que las firmas identifiquen problemas que no permitan la realización\nde los exámenes de manera adecuada, deberán comunicarlo de inmediato al\nCONSUCOOP y a la Junta Directiva y de Vigilancia de la cooperativa auditada.", "resumen": "- Responsabilidad de las Firmas Auditoras Externas.- Las firmas auditoras externas, asumen"}, {"num": "Art. 193", "ley": "RLCH", "texto": "Artículo 193.- De las Auditorías Realizadas. Las firmas auditoras externas,\ndeben facilitar al CONSUCOOP una copia del informe definitivo de cada\nauditoría que practiquen, en la cual debe constar: El período auditado,\nlos métodos de trabajo puesto en práctica, las anomalías encontradas, los\nfundamentos legales y las observaciones, recomendaciones y salvedades que\nlos informantes estimen pertinentes.", "resumen": "- De las Auditorías Realizadas. Las firmas auditoras externas, deben facilitar al CONSUCOO"}, {"num": "Art. 194", "ley": "RLCH", "texto": "Artículo 194.- Derecho de Defensa. Toda persona a quienes se le atribuyan\nresponsabilidades en un informe de Supervisión o de revisión tiene derecho a\npresentar sus descargos ante la Superintendencia que lo emita, dentro del\ntérmino que esta establezca. La resolución será impugnable para lo cual su\ntramitación se debe ajustar a la Ley de Procedimiento Administrativo.", "resumen": "- Derecho de Defensa. Toda persona a quienes se le atribuyan responsabilidades en un infor"}, {"num": "Art. 195", "ley": "RLCH", "texto": "Artículo 195.- Investigación Previa a una Intervención. Previo a la\nintervención de una Cooperativa, el CONSUCOOP debe realizar una\ninvestigación sobre la situación de la misma. El informe de la investigación se\ndebe hacer del conocimiento de la Junta Directiva del CONSUCOOP, quien debe\ndictar la resolución correspondiente.", "resumen": "- Investigación Previa a una Intervención. Previo a la intervención de una Cooperativa, el"}, {"num": "Art. 196", "ley": "RLCH", "texto": "Artículo 196.- Procedimiento de la Intervención. La intervención debe\nseguir el procedimiento siguiente:\na) Una vez conocidos los resultados de la revisión efectuada a la Cooperativa\nya sea por Supervisión y/o Investigación se someterá a Junta Directiva del\nCONSUCOOP para que determine si acuerda o no la intervención;\nb) La Junta Directiva del CONSUCOOP emitirá Acuerdo de intervención, el\ncual será de ejecución inmediata y este podrá ser recurrido en Amparo.\nc) Nombramiento de la comisión interventora por el CONSUCOOP. En esta\ncomisión puede participar un representante de la C.H.C., o del organismo\nde integración inmediato superior, si así lo solicitan. El Acuerdo de\nNombramiento debe contener las facultades y obligaciones de la comisión y\nel término previsto, el cual no puede exceder de un (1) año, salvo casos de\nextrema necesidad, calificados por el CONSUCOOP;\nd) Notificación de acuerdo de intervención a la Cooperativa intervenida y dar\nposesión de su cargo a la comisión interventora;\ne) La comisión interventora debe asumir todas las funciones de dirección,\nadministración y vigilancia de la Cooperativa intervenida, quedando los\ncuerpos directivos en suspenso de sus funciones mientras dure la\nintervención;\nf) La comisión interventora debe informar al Director Ejecutivo del\nCONSUCOOP sobre los resultados de sus operaciones con la frecuencia\nrequerida, quien debe calificar el proceso de normalización de la Cooperativa\ny en caso de haberse superado las causas que la motivaron, lo hará del\nconocimiento de la Junta Directiva quien debe decidir sobre el cese de la misma; y,\ng) El CONSUCOOP debe dar seguimiento a las recomendaciones que emanen\nde la comisión interventora una vez concluida la intervención.", "resumen": "- Procedimiento de la Intervención. La intervención debe seguir el procedimiento siguiente"}, {"num": "Art. 197", "ley": "RLCH", "texto": "Artículo 197.- Acuerdos Especiales de Administración. Sin perjuicio de lo\ndispuesto en los artículos que antecedan, las Cooperativas pueden celebrar con\norganismos de integración acuerdos especiales para la administración de las\nmismas en forma compartida, para efecto de cumplir los planes de regulación\nestablecidos por el CONSUCOOP.", "resumen": "- Acuerdos Especiales de Administración. Sin perjuicio de lo dispuesto en los artículos qu"}, {"num": "Art. 198", "ley": "RLCH", "texto": "Artículo 198.- Medidas Precautorias Judiciales. EL CONSUCOOP será el\ndepositario a nombrarse, en caso de medidas precautorias decretadas judicialmente\ncontra una Cooperativa.\nSECCION II\nADMINISTRACION", "resumen": "- Medidas Precautorias Judiciales. EL CONSUCOOP será el depositario a nombrarse, en caso d"}, {"num": "Art. 199", "ley": "RLCH", "texto": "Artículo 199.- Representantes en el CONSUCOOP. Para efectos de los\ndispuesto en los literales b), c), ch), d) y e) del Artículo 100 de la Ley, los\nrepresentantes de la Secretaría de Estado detallados, delegarán la representación\nen su respectivo sustituto legal y en caso de existir impedimento para que éste\npueda asistir a las sesiones, debe ser sustituto por un funcionario de alta jerarquía.\nLa representación del movimiento Cooperativista es rotativa por los organismos\nde segundo grado, los representantes propietarios de la Junta Directiva del\nCONSUCOOP deben de ser Afiliados(as) a una Cooperativa del sector que\nrepresenten. Cuando vaquen de su cargo no podrán ser nombrado como Director\nEjecutivo del CONSUCOOP o viceversa, hasta después de haber cesado en su\ncargo por un período de tres (3) años.\nNingún organismo de integración puede tener más de un representante en la\nJunta Directiva del CONSUCOOP.\n\n89", "resumen": "- Representantes en el CONSUCOOP. Para efectos de los dispuesto en los literales b), c), c"}, {"num": "Art. 200", "ley": "RLCH", "texto": "Artículo 200.- Causas de Inhabilitación de Oficio. Debe cesar en su cargo\nen la Junta Directiva del CONSUCOOP, el representante del organismo de\nsegundo grado, cuando sobrevengan algunas de las causales previstas en el\nArtículo 102 de la Ley.", "resumen": "- Causas de Inhabilitación de Oficio. Debe cesar en su cargo en la Junta Directiva del CON"}, {"num": "Art. 201", "ley": "RLCH", "texto": "Artículo 201.- Período de Administración de la Junta Directiva. Los miembros\nde la Junta Directiva duran tres (3) años en sus funciones y pueden ser reelectos\nen forma consecutiva por un período más. Alternadamente serán reelectos sin\nlimitaciones.", "resumen": "- Período de Administración de la Junta Directiva. Los miembros de la Junta Directiva dura"}, {"num": "Art. 202", "ley": "RLCH", "texto": "Artículo 202.- Acceso de Documentos. La Junta Directiva tiene acceso a\ninformación y documento que maneje el CONSUCOOP, a fin que pueda opinar y\ndictaminar sobre asuntos sometidos a su competencia o sobre lo que sea consultado.", "resumen": "- Acceso de Documentos. La Junta Directiva tiene acceso a información y documento que mane"}, {"num": "Art. 203", "ley": "RLCH", "texto": "Artículo 203.- Compensación de los Miembros de la Junta Directiva. Los\nmiembros de la Junta Directiva deben ser compensados con una dieta mensual,\nviáticos o gastos, que se debe establecer en el presupuesto del CONSUCOOP.\nEsta compensación no aplica a los representantes del Estado ante la Junta\nDirectiva.", "resumen": "- Compensación de los Miembros de la Junta Directiva. Los miembros de la Junta Directiva d"}, {"num": "Art. 204", "ley": "RLCH", "texto": "Artículo 204.- Funcionamiento de la Junta Directiva. Todo lo atinente al\nfuncionamiento de la Junta Directiva como órgano colegiado, debe estar previsto\nen un Reglamento Interno aprobado por la propia directiva.\nSECCION III\nPATRIMONIO DEL CONSUCOOP", "resumen": "- Funcionamiento de la Junta Directiva. Todo lo atinente al funcionamiento de la Junta Dir"}, {"num": "Art. 205", "ley": "RLCH", "texto": "Artículo 205.- Transferencia de Bienes. Las transferencias de los bienes a\nque se refieren los literales c) y d) del Artículo 105 de la Ley, deben de efectuarse\nde conformidad con la Ley aplicable en cada caso.", "resumen": "- Transferencia de Bienes. Las transferencias de los bienes a que se refieren los literale"}, {"num": "Art. 206", "ley": "RLCH", "texto": "Artículo 206.- Liquidación Presupuestaria del CONSUCOOP. En cuanto a\nlos recursos indicados en los literales a), b) y ch) del Artículo 105 de la Ley, su\nejecución y liquidación presupuestaria debe sujetarse a lo que disponga la Junta\nDirectiva del CONSUCOOP. En cuanto a lo indicado en el literal d) del mismo\nArtículo, se debe sujetar a las políticas presupuestarias que dicte la Secretaría de\nEstado en el Despacho de Finanzas.", "resumen": "- Liquidación Presupuestaria del CONSUCOOP. En cuanto a los recursos indicados en los lite"}, {"num": "Art. 207", "ley": "RLCH", "texto": "Artículo 207.- Emisión de Timbres Cooperativos. La emisión de timbres\ncooperativos debe ser acordada por la Junta Directiva del CONSUCOOP y su\nimpresión efectuada en la Empresa Nacional de Artes Gráficas (ENAG) bajo\ncontrol de representantes de la Secretaría de Estado en el Despacho de\nDesarrollo Económico del Tribunal Superior de Cuentas (TSC).\nSu valor se determina según su denominación. En su confección se debe utilizar\npapel especial, su tamaño no puede exceder los tres (3) centímetros en cuadro y\ndebe contener:\na) La frase “República de Honduras”;\nb) Su valor nominal;\nc) La abreviatura “CONSUCOOP”; y.\nd) El símbolo del Cooperativismo.", "resumen": "- Emisión de Timbres Cooperativos. La emisión de timbres cooperativos debe ser acordada po"}, {"num": "Art. 208", "ley": "RLCH", "texto": "Artículo 208.- Uso del Timbre Cooperativo. El uso del timbre Cooperativo\ndebe ajustarse a las disposiciones siguientes:\na) Por cada certificación que extienda el CONSUCOOP se debe agregar un\ntimbre con denominación de diez Lempiras (L.10.00);\nb) En solicitudes y documentos adjuntos, se debe agregar un timbre con\ndenominación de diez Lempiras (L. 10.00) por documento;\nc) En los Libros obligatorios que deben llevar las Cooperativas de conformidad\ncon lo establecido en el Artículo 37 de la Ley, debe agregarse un timbre en\nla primera y última página con denominación de cincuenta Lempiras\n(L.50.00) cada uno;\nd) En cada documento relativo a hechos y relaciones jurídicas sujetas a inscripción\nde conformidad a la Ley y a este Reglamento, se debe agregar un timbre en\nla primera y última página con denominación de cincuenta Lempiras\n(L.50.00) cada uno;\ne) En los contratos y documentos representativos de valor que excedan de diez\nmil Lempiras (L 10,000.00), en los cuales intervenga una Cooperativa, se\ndebe agregar timbres de conformidad con la tabla siguiente:\n1. De L.10,001.00 hasta L.20,000.00, un timbre con denominación de L. 10.00;\n2. De L.20,001.00 hasta L.50,000.00, un timbre con denominación de\nL.20.00. o su equivalente;\n3. De L.50,001.00 hasta L.100,000.00, un timbre con denominación de\nL. 50.00 o su equivalente; y,\n4. De L.100,001.00 en adelante, un timbre de L.50.00 por los primeros\n100,000.00 y un timbre de L.10.00 por cada L. 100,000.00 o fracción,\nhasta un máximo de L.140.00 en timbres.", "resumen": "- Uso del Timbre Cooperativo. El uso del timbre Cooperativo debe ajustarse a las disposici"}, {"num": "Art. 209", "ley": "RLCH", "texto": "Artículo 209.- Omisión del Timbre Cooperativo. Ningún funcionario puede\nadmitir ni dar curso a documento alguno en que se haya omitido la debida\nutilización del Timbre Cooperativo.\nEl funcionario que contravenga esta disposición incurre en responsabilidad y\ndebe aplicársele una multa equivalente al duplo del valor de los timbres omitidos,\nsin perjuicio de la reposición de los mismos que debe hacer la parte interesada.", "resumen": "- Omisión del Timbre Cooperativo. Ningún funcionario puede admitir ni dar curso a document"}, {"num": "Art. 210", "ley": "RLCH", "texto": "Artículo 210.- Efectos del Documento Omiso del Timbre. El documento o\nlibro que no lleve los timbres a que se refiere el Artículo anterior, carece de valor\nprobatorio tanto en juicio como en procedimientos administrativos y en actos de\ncomercio. No obstante puede subsanarse con el debido timbraje más una multa\nverificable por la persona u autoridad receptora del mismo, la cual debe ser\nequivalente a cinco (5) veces el valor del timbraje omitido.\nLas multas a que se refiere el presente Artículo y el que antecede deben ser\nenteradas conforme al procedimiento que establezca el CONSUCOOP.", "resumen": "- Efectos del Documento Omiso del Timbre. El documento o libro que no lleve los timbres a "}, {"num": "Art. 211", "ley": "RLCH", "texto": "Artículo 211.- Cancelación de los Timbres. La cancelación de los timbres\ndebe iniciar en parte del documento donde se adhieran, cubrir el o los timbres y\nfinalizar en el referido documento, anotándose sobre estos el día, mes y año de\nla cancelación, consignándose además, la firma de quien cancela.\nLos timbres deben ser cancelados por la o las personas que otorguen, expidan o\nfirmen los documentos, excepto aquellos que por disposición de la Ley están\nsujetos a registro, cuyos timbres deben ser cancelados por el registro respectivo.\nCAPÍTULO VII\nREGISTRO DE COOPERATIVAS", "resumen": "- Cancelación de los Timbres. La cancelación de los timbres debe iniciar en parte del docu"}, {"num": "Art. 212", "ley": "RLCH", "texto": "Artículo 212.- Registro de Cooperativas. El Registro de Cooperativas es\npúblico y además de los libros que establece el Artículo 109 de la Ley, lo integran:\na) Libro de inscripción de cuerpos directivos, vigilancia y de gerente general o\nquien haga sus veces;\nb) Libro de inscripción de bonos y obligaciones;\nc) Libro de inscripción de transformación, incorporación y fusión de Cooperativas;\nd) Libro de disolución y liquidación de Cooperativas;\ne) Libro de integración por niveles;\nf) Libro Informativo de Registro de las Fundaciones de Cooperativas; y;\ng) Índice y libros auxiliares para las demás inscripciones que requieran las\nnecesidades del servicio.", "resumen": "- Registro de Cooperativas. El Registro de Cooperativas es público y además de los libros "}, {"num": "Art. 213", "ley": "RLCH", "texto": "Artículo 213.- Libro Diario de Presentaciones. En el libro Diario de\nPresentación de documentos se debe anotar de manera suscinta, todos los\ndocumentos que se presenten en el registro, consignado la hora y fecha de\npresentación y el nombre de quien la gestiona. Cada asiento de presentación de\ndocumentos debe llevar su propio número. Las anotaciones de este libro deben\nser correlativas hasta el final, dejando entre cada uno un espacio de cinco (5)\nlíneas para la firma del registrador y las anotaciones pertinentes.", "resumen": "- Libro Diario de Presentaciones. En el libro Diario de Presentación de documentos se debe"}, {"num": "Art. 214", "ley": "RLCH", "texto": "Artículo 214.- Libro de Inscripción de Cooperativas. En el Libro de Inscripción\nde Cooperativas se debe inscribir las actas de constitución, los estatutos y\nreformas. En este libro se debe inscribir además las Cooperativas no hondureñas\nautorizadas por el CONSUCOOP.", "resumen": "- Libro de Inscripción de Cooperativas. En el Libro de Inscripción de Cooperativas se debe"}, {"num": "Art. 215", "ley": "RLCH", "texto": "Artículo 215- Libro de Inscripción de Documentos. En el Libro de Inscripción\nde Documentos se debe inscribir los contratos o convenios que suscriban las\nCooperativas entre sí o con terceros y las resoluciones emitidas por el\nCONSUCOOP que afecten a Cooperativas y a Cooperativistas.", "resumen": "Libro de Inscripción de Documentos. En el Libro de Inscripción de Documentos se debe inscr"}, {"num": "Art. 216", "ley": "RLCH", "texto": "Artículo 216.- Libro de Inscripción de Cuerpos Directivos. En el Libro de\nInscripción de Cuerpos Directivos, de Vigilancia y de Gerente General o quienes\nhagan sus veces, se debe consignar los nombres de las personas que ostenten\nlos cargos electos o nombrados según su caso.", "resumen": "- Libro de Inscripción de Cuerpos Directivos. En el Libro de Inscripción de Cuerpos Direct"}, {"num": "Art. 217", "ley": "RLCH", "texto": "Artículo 217.- Libro de Inscripción de Emisión de Bonos y Obligaciones.\nEn el Libro de Inscripción de Emisión de Bonos y Obligaciones se debe anotar:\na) El importe total de la emisión;\nb) Su valor nominal;\nc) El interés que devenguen los bonos y certificados;\nd) La forma de pago;\ne) La fecha de vencimiento;\nf) La fecha del acuerdo de la Asamblea General, de la Cooperativa y de la\nresolución de CONSUCOOP, respectivas y,\ng) El propósito de la emisión.", "resumen": "- Libro de Inscripción de Emisión de Bonos y Obligaciones. En el Libro de Inscripción de E"}, {"num": "Art. 218", "ley": "RLCH", "texto": "Artículo 218.- Libro de Transformación, Incorporación y Fusión de\nCooperativas. En el Libro de Transformación, Incorporación y Fusión de\nCooperativas, se debe inscribir los Acuerdos de la Asamblea General relativos a\ntales actos y las resoluciones emitidas por el CONSUCOOP sobre los mismos.", "resumen": "- Libro de Transformación, Incorporación y Fusión de Cooperativas. En el Libro de Transfor"}, {"num": "Art. 219", "ley": "RLCH", "texto": "Artículo 219.- Libro de Disolución y Liquidación. En el Libro de Disolución\ny Liquidación se debe inscribir el Acuerdo de disolución voluntaria adoptada por\nla Cooperativa, la resolución de CONSUCOOP que ordena la disolución forzosa,\nlas comisiones liquidadoras y los resultados finales de las liquidaciones ejecutadas.", "resumen": "- Libro de Disolución y Liquidación. En el Libro de Disolución y Liquidación se debe inscr"}, {"num": "Art. 220", "ley": "RLCH", "texto": "Artículo 220.- Libro de Integración por Niveles. En el Libro de Integración\npor Niveles se debe inscribir anualmente los ingresos y retiros de Afiliados(as)\nque tengan las Cooperativas de segundo grado y la C.H.C.", "resumen": "- Libro de Integración por Niveles. En el Libro de Integración por Niveles se debe inscrib"}, {"num": "Art. 221", "ley": "RLCH", "texto": "Artículo 221.- Libro Informativo de Registro de las Fundaciones de\nCooperativas. En el Libro de Registro de las fundaciones de las cooperativas, se\ndebe registrar el nombre de la Fundación, la Cooperativa a la que pertenece, su\nRepresentante Legal y sus generales y el asiento de la inscripción del Registro\ncorrespondiente.", "resumen": "- Libro Informativo de Registro de las Fundaciones de Cooperativas. En el Libro de Registr"}, {"num": "Art. 222", "ley": "RLCH", "texto": "Artículo 222.- Libro de Presentación de Documentos. El Libro dePresentación\nde Documentos debe estar debidamente foliado y cada una de las hojas de que\nse compone, firmadas y señalando la nota respectiva.", "resumen": "- Libro de Presentación de Documentos. El Libro dePresentación de Documentos debe estar de"}, {"num": "Art. 223", "ley": "RLCH", "texto": "Artículo 223.- Características Generales de los Libros. Los Libros Indicados\nen el literal b) y c) del Artículo 109 de la Ley y los demás relacionados en este\nReglamento, se deben llevar en hojas sueltas con los documentos inscribibles.\nLos libros pueden dividirse en tomos, según la especialidad, tipo de inscripción y\nantigüedad, numerados en orden sucesivo. Cada tomo debe llevar un índice de\nlas inscripciones en el contenidas. Una vez inscrito el documento, el registrador\ndebe extender certificaciones o fotocopia del documento inscrito, indicando el\nnúmero y tomo que le corresponda en el libro respectivo.", "resumen": "- Características Generales de los Libros. Los Libros Indicados en el literal b) y c) del "}, {"num": "Art. 224", "ley": "RLCH", "texto": "Artículo 224.- Asientos. La inscripción se debe practicar mediante un asiento\nen el que se debe consignar lo siguiente:\na) Fecha de inscripción;\nb) Descripción suscinta de los documentos que se inscriban; y,\nc) Los datos que específicamente deben consignarse en cada libro, según los\nartículos precedentes junto a la hoja que se efectúe el asiento se deben\narchivar los originales de los documentos inscritos.\nEl registrador debe autorizar con su firma entera toda inscripción que se\nhaga en los libros del registro.", "resumen": "- Asientos. La inscripción se debe practicar mediante un asiento en el que se debe consign"}, {"num": "Art. 225", "ley": "RLCH", "texto": "Artículo 225.- Notas. Al final de cada documento archivado en los libros de\ninscripción, se debe añadir tantas hojas de papel como sea necesario, en las\ncuales se debe insertar todas las notas correspondientes a las inscripciones,\nanotaciones preventivas y cancelaciones.", "resumen": "- Notas. Al final de cada documento archivado en los libros de inscripción, se debe añadir"}, {"num": "Art. 226", "ley": "RLCH", "texto": "Artículo 226.- Calificación Registral. El registro debe calificar la procedencia\nde la inscripción de los documentos presentados, tanto en la forma como en el\nfondo de los actos cooperativos sujetos a inscripción.", "resumen": "- Calificación Registral. El registro debe calificar la procedencia de la inscripción de l"}, {"num": "Art. 227", "ley": "RLCH", "texto": "Artículo 227.- Subsanación de Oficio. El Registrador podrá subsanar de\noficio los errores materiales o de hecho de los documentos sujetos a registro\nsiempre que esto no implique la alteración o modificación de la intención de las\npartes.", "resumen": "- Subsanación de Oficio. El Registrador podrá subsanar de oficio los errores materiales o "}, {"num": "Art. 228", "ley": "RLCH", "texto": "Artículo 228.- Término de Inscripción. El registrador debe efectuar la\ninscripción de documentos dentro de un término no mayor de treinta (30) días\nsiguientes a su presentación, salvo que su calificación emita observaciones.\nSi los documentos no se subsanan en el término de diez (10) días, después de\nnotificadas de oficio las observaciones a la parte interesada, se debe denegar\ndefinitivamente la inscripción y se debe archivar.", "resumen": "- Término de Inscripción. El registrador debe efectuar la inscripción de documentos dentro"}, {"num": "Art. 229", "ley": "RLCH", "texto": "Artículo 229.- Errores Materiales en los Libros del Registro. Las enmiendas,\nentre renglones y cualesquiera otros errores materiales que puedan cometerse\nen los libros de registro, deben salvarse íntegramente antes de la firma del\nregistrador, prohibiéndose borrones y tachas.", "resumen": "- Errores Materiales en los Libros del Registro. Las enmiendas, entre renglones y cualesqu"}, {"num": "Art. 230", "ley": "RLCH", "texto": "Artículo 230.- Afectación entre inscripciones. Siempre que se haga una\ninscripción que de alguna manera afecte a otra, se debe insertar en las hojas\nmarginales de aquella la referencia correspondiente.\n\n93", "resumen": "- Afectación entre inscripciones. Siempre que se haga una inscripción que de alguna manera"}, {"num": "Art. 231", "ley": "RLCH", "texto": "Artículo 231.- Forma de las inscripciones. Todas las anotaciones e\ninscripciones que se efectúen en el registro, deben ser manuscritas con tinta\nnegra o maquina con cinta negra, a excepción cuando el registro se lleve en\nforma electrónica.", "resumen": "- Forma de las inscripciones. Todas las anotaciones e inscripciones que se efectúen en el "}, {"num": "Art. 232", "ley": "RLCH", "texto
