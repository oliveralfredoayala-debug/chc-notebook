nto;\ni) Conocer los informes de auditoría interna y externa del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP);\nj) Autorizar la apertura de oficinas del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) en cualquier lugar del territorio nacional;\nk) Aprobar las políticas, reglamentos y normativas que se emitan;\nl) Autorizar la constitución de gravámenes sobre bienes del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), así como la enajenación de los mismos; y,\nm) Resolver los recursos contra las resoluciones emitidas por el Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), a excepción de los relacionados con la Superintendencia de Ahorro y Crédito.” “", "resumen": "- El órgano de dirección del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) es la"}, {"num": "Art. 100", "ley": "LCH", "texto": "ARTÍCULO 100.- La Junta Directiva del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), está integrada por: a) El Presidente de la Confederación Hondureña de Cooperativas (C.H.C.) o su representante, quien la presidirá;\nb) El Secretario de Estado en los Despachos de Industria y Comercio, o su\nrepresentante;\nc) El Secretario de Estado en el Despacho de Finanzas, o su representante;\n\nde fecha 11 de enero del 2020\nch) El Secretario de Estado en el Despacho de Educación, o su representante;\nd) El Secretario de Estado en los Despachos de Agricultura y Ganadería, o su representante;\ne) El Secretario Técnico y de Cooperación Internacional (SEPLAN); y,\nf) Seis (6) representantes del Movimiento Cooperativista de los diferentes sectores, electos por tres (3) años por la Asamblea General de la Confederación Hondureña de Cooperativas (C.H.C.).” “", "resumen": "- La Junta Directiva del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), está int"}, {"num": "Art. 101", "ley": "LCH", "texto": "ARTÍCULO 101.- Las decisiones de la Junta Directiva del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), se deben tomar por simple mayoría de votos. En caso de empate se debe repetir la votación y de subsistir éste, la decisión se debe adoptar por el voto de calidad del Presidente.” “", "resumen": "- Las decisiones de la Junta Directiva del Consejo Nacional Supervisor de Cooperativas (CO"}, {"num": "Art. 102", "ley": "LCH", "texto": "ARTÍCULO 102.- No pueden ser miembros de la Junta Directiva del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), en representación del Movimiento Cooperativo:\na) Los no afiliados (as) a ninguna cooperativa;\nb) Los que sean parientes dentro del cuarto grado de consanguinidad o segundo de afinidad entre sí o con el Director Ejecutivo del Consejo Nacional Supervisor de Cooperativas(CONSUCOOP);\nc) Dos (2) miembros de una misma Federación;\nch) Los fallidos y quebrados, no rehabilitados así como los que tengan pendientes procedimientos de quiebra;\nd) Los legalmente incapaces;\ne) Los deudores morosos para con el Estado y Organizaciones Cooperativas; y,\nf) Los Directivos de Cooperativas, cuando éstas estuvieren en proceso de quiebra o disolución.”", "resumen": "- No pueden ser miembros de la Junta Directiva del Consejo Nacional Supervisor de Cooperat"}, {"num": "Art. 103", "ley": "LCH", "texto": "ARTÍCULO 103.- La representación legal del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), está a cargo del Director Ejecutivo, quien tiene, entre otras, las atribuciones siguientes: 1. Presentar a la Junta Directiva el Plan Estratégico, Plan Operativo Anual y Presupuesto para su aprobación y su cumplimiento;\n2. Velar por el cumplimiento del Código de Conducta y Ética de los empleados;\n3. Informar trimestralmente a la Junta Directiva, sobre los avances y\ncumplimiento del Plan Operativo Anual y Presupuesto;\n4. Informar trimestralmente a la Junta Directiva sobre la situación del sector\nsupervisado y las medidas adoptadas en el ejercicio de su labor;\n5. Hacer que se cumplan las normas y resoluciones sean emitidas para las\ncooperativas;\n6. Dar respuesta a los requerimientos de información de la Junta Directiva y\nentes del Estado;\n7. Conocer y comprender los principales riesgos a los que está expuesto el\nsector cooperativo, para su debida gestión y control;\n8. Aprobar las políticas y lineamientos internos, de la operación de las\nsuperintendencias a su cargo, en términos de apoyar y gestionar\nadecuadamente su gestión;\n9. Presentar propuestas de firmas de auditoría externa a la Junta Directiva;\n10. Exigir la presentación de los informes por parte de los Superintendentes\nsobre el estado de las cooperativas conforme el cumplimiento de las normas\ny mejores prácticas internacionales; así como adoptar las medidas correctivas\ncorrespondientes;\n11. Dirigir la gestión administrativa, operativa y financiera de la entidad,\nmanteniéndola en observancia de todas las regulaciones que le son aplicables;\n12. Adoptar medidas para la identificación, medición, vigilancia y control de los\nriesgos a que están expuestas las cooperativas;\n13. Cumplir y hacer cumplir las políticas y resoluciones aprobadas por la Junta\nDirectiva; y,\n14. Cumplir las demás atribuciones establecidas en el marco legal vigente.”\n“", "resumen": "- La representación legal del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), est"}, {"num": "Art. 104", "ley": "LCH", "texto": "ARTÍCULO 104.- Para ser nombrado Director(a) Ejecutivo(a) del Consejo\nNacional Supervisor de Cooperativas (CONSUCOOP), se requiere:\na) Ser hondureño y mayor de treinta (30) años;\nb) Estar en el ejercicio de sus derechos civiles y no tener antecedentes sobre acciones dolosas en ejercicio de cargos anteriores;\nc) Tener cinco (5) años de experiencia en materia de cooperativismo;\nch) Poseer título universitario, con competencia y notoria experiencia en asuntos financieros, administrativos, legales y cooperativos; y,\nd) Reconocida honorabilidad.” “", "resumen": "- Para ser nombrado Director(a) Ejecutivo(a) del Consejo Nacional Supervisor de Cooperativ"}, {"num": "Art. 104-A", "ley": "LCH", "texto": "ARTÍCULO 104-A. Son Inhabilidades para ser nombrado Director Ejecutivo del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP):\na) Ser directa o indirectamente contratista o concesionario del Estado;\nb) Ser miembro de Juntas Directivas de los partidos políticos o desempeñar cargos o empleos públicos remunerados o de elección popular, excepto de carácter docente, cultural y los relacionados a la asistencia social;\nc) Ser cónyuge o pariente dentro del cuarto grado de consanguinidad o segundo de afinidad del Presidente de la República, designados, Secretarios de Estado, Presidentes o Gerentes de las instituciones descentralizadas o desconcentradas del Estado o del Jefe del Estado Mayor Conjunto de las Fuerzas Armadas de Honduras;\nch) Ser miembro de la Junta Directiva o de Vigilancia de una Cooperativa;\nd) Formar parte de empresas dedicadas a la realización de auditorías externas en las cooperativas supervisadas o que les proporcionen otros servicios;\ne) Haber sido declarado fallido o quebrado aunque haya sido rehabilitado o esté sujeto a procedimiento de quiebra;\nf) Ser deudor moroso directo o indirecto o cuyas obligaciones hubiesen sido absorbidas como pérdidas por cualquier institución supervisada por la Comisión Nacional deBancos ySeguros (CNBS) oSistema Cooperativo Nacional;\ng) No haber sido condenado por delitos que impliquen falta de probidad;\nh) Haber sido director o administrador, asesor, gerente o funcionario de Instituciones supervisadas por la Comisión Nacional de Bancos y Seguros (CNBS) o por el Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) a la cual se hubiere declarado en liquidación forzosa o sometida al mecanismo extraordinario de capitalización;\ni) Habérsele comprobado judicialmente participación en el delito de lavado de activos u otras actividades ilícitas; y,\nj) Haber sido sancionado administrativa o judicialmente por su participación en faltas graves a las leyes y normas aplicables a instituciones supervisadas.” 29 CAPITULO III PATRIMONIO", "resumen": "Son Inhabilidades para ser nombrado Director Ejecutivo del Consejo Nacional Supervisor de "}, {"num": "Art. 105", "ley": "LCH", "texto": "ARTÍCULO 105.- El patrimonio del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) está constituido por los elementos siguientes: 1. El producto de los aportes anuales obligatorios de las Cooperativas se debe hacer de la forma siguiente: Cero punto treinta por ciento (0.30%) de la cartera neta de préstamos, para el Subsector Ahorro y Crédito y un 1.00 por millar de los activos totales para los otros Subsectores cooperativos. En ambos casos se establece un monto máximo de TRES MILLONES DE LEMPIRAS (L.3,000,000.00), este aporte será revisable cada cinco (5) años debiendo ser aprobado por la Junta Directiva. Quedan exentas de este aporte las cooperativas de segundo y tercer grado;\n2. El producto del timbre cooperativo;\n3. Por los bienes que transfiera el Estado y otras personas naturales o\njurídicas, nacionales o internacionales;\n4. Producto del cobro por servicios registrales y multas pecuniarias que imponga\nel Consejo Nacional Supervisor de Cooperativas (CONSUCOOP); y,\n5. El Estado establecerá en el Presupuesto General de Ingresos y Egresos de\nla a partir de la publicación de las reformas de esta ley, para el funcionamiento\ndel Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), una\nasignación anual equivalente al cincuenta (50%) de los aportes anuales\nobligatorios de las cooperativas establecido en el literal a) de este artículo.\nDicho aporte se debe calcular sobre los ingresos registrados por el Consejo\nNacional Supervisor de Cooperativas (CONSUCOOP) en el ejercicio inmediato\nanterior y la transferencia de éstos se debe realizar de forma trimestral.\nEl aporte señalado en el literal a), lo calculará el Consejo Nacional Supervisor\nde Cooperativas (CONSUCOOP), tomando como base las cifras del período\nanual anterior; debiendo realizar los pagos diez (10) días después del cierre\nde cada trimestre, es decir: Marzo, Junio, Septiembre y Diciembre; los que\ndeben ser depositados o transferidos a la cuenta que indique el referido\nConsejo.\nEl Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) debe\ntransferir a la Confederación Hondureña de Cooperativas (C.H.C.) el veinte\npor ciento (20%) del aporte establecido en el literal a) y el veinticinco por\nciento (25%) de lo establecido en el literal b). Dichos fondos deben ser\nutilizados para la promoción y fomento del sistema cooperativo.\nLas Cooperativas que no cumplan con lo establecido en el presente Artículo,\nserán sancionadas conforme lo establecido en el Reglamento Especial que\npara tal efecto emita el Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP).”\nARTICULO 106.- Derogado\n“", "resumen": "- El patrimonio del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) está constitui"}, {"num": "Art. 107", "ley": "LCH", "texto": "ARTÍCULO 107.- Se autoriza la emisión del Timbre Cooperativo. La emisión\nse hará bajo la responsabilidad y control del Consejo Nacional Supervisor de\nCooperativas (CONSUCOOP); el valor del timbre se hará con denominaciones\nde Diez Lempiras (L10.00), Veinte Lempiras (L. 20.00) y Cincuenta Lempiras\n(L.50.00), su aplicación se sujetará a las disposiciones establecidas en la\nnormativa que al efecto emita dicho Consejo”.\n\npublicado en el Diario Oficial LA GACETA número 35,495 del 23 de enero del 2021\nCAPITULO IV\nREGISTRO NACIONAL DE COOPERTAVAS\n“", "resumen": "- Se autoriza la emisión del Timbre Cooperativo. La emisión se hará bajo la responsabilida"}, {"num": "Art. 108", "ley": "LCH", "texto": "ARTÍCULO 108.- El Registro Nacional de Cooperativas, depende del Consejo\nNacional Supervisor de Cooperativas (CONSUCOOP), está a cargo de un\nprofesional del derecho, debidamente colegiado y con conocimientos en materia\ndel Cooperativismo y Registral, quien tendrá, entre otras funciones mantener\nactualizadas las estadísticas del Sistema Cooperativo Nacional.”", "resumen": "- El Registro Nacional de Cooperativas, depende del Consejo Nacional Supervisor de Coopera"}, {"num": "Art. 109", "ley": "LCH", "texto": "ARTÍCULO 109.- En el Registro Nacional de Cooperativas se llevarán los\nlibros siguientes:\na) Libro Diario de presentación de documentos;\nb) Libro de Inscripción de Cooperativas;\nc) Libros de Inscripción de documentos; y,\nch) Los demás que establezca el Reglamento.", "resumen": "- En el Registro Nacional de Cooperativas se llevarán los libros siguientes: a) Libro Diar"}, {"num": "Art. 110", "ley": "LCH", "texto": "ARTÍCULO 110.- En el Registro Nacional de Cooperativas se inscribirán entre\notros hechos y relaciones jurídicas las siguientes:\na) El nombramiento de Junta Directiva, Gerentes y órganos de vigilancia o fiscalización;\nb) La emisión de bonos u otras obligaciones;\nc) Las actas de Constitución y Estatutos de Cooperativas y sus Reformas;\nch) La transformación incorporación, fusión, disolución y liquidación de cooperativas; y,\nd) Otros hechos o relaciones jurídicas que disponga el Reglamento respectivo.", "resumen": "- En el Registro Nacional de Cooperativas se inscribirán entre otros hechos y relaciones j"}, {"num": "Art. 111", "ley": "LCH", "texto": "ARTÍCULO 111.- Los documentos provenientes del extranjero se legalizarán\npreviamente para su inscripción.", "resumen": "- Los documentos provenientes del extranjero se legalizarán previamente para su inscripció"}, {"num": "Art. 112", "ley": "LCH", "texto": "ARTÍCULO 112.- El Registro Nacional de Cooperativas es público.- El registrador\ncertificará a quien lo solicite, los datos que aparezcan en la inscripción\ncorrespondiente.", "resumen": "- El Registro Nacional de Cooperativas es público.- El registrador certificará a quien lo "}, {"num": "Art. 113", "ley": "LCH", "texto": "ARTÍCULO 113.- Podrá solicitarse anotación preventiva del hecho o del\nderecho que se alegare como contradictorio en el Registro.- Toda inscripción\nposterior será ineficaz en cuanto perjudique el derecho que ampare la anotación.", "resumen": "- Podrá solicitarse anotación preventiva del hecho o del derecho que se alegare como contr"}, {"num": "Art. 114", "ley": "LCH", "texto": "ARTÍCULO 114.- Los asientos del Registro solo podrán cancelarse:\na) Por consentimiento expreso de los interesados;\nb) Cuando la cancelación sea consecuencia natural del acto jurídico que se\ninscriba; y\nc) Por decisión judicial.\nTITULO V\nRECURSOS CONTRA PROVIDENCIAS Y RESOLUCIONES\n“", "resumen": "- Los asientos del Registro solo podrán cancelarse: a) Por consentimiento expreso de los i"}, {"num": "Art. 115", "ley": "LCH", "texto": "ARTÍCULO 115.- Las resoluciones pronunciadas por la Asamblea General\nde una Cooperativa relativas a los derechos políticos de los afiliados, serán\nrecurribles en apelación ante el Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP). La sustanciación de los recursos se ajustará a lo dispuesto en la\nLey de Procedimiento Administrativo.”", "resumen": "- Las resoluciones pronunciadas por la Asamblea General de una Cooperativa relativas a los"}, {"num": "Art. 116", "ley": "LCH", "texto": "ARTÍCULO 116.- Derogado", "resumen": "- Derogado"}, {"num": "Art. 117", "ley": "LCH", "texto": "ARTÍCULO 117.- Derogado\n“", "resumen": "- Derogado “"}, {"num": "Art. 118", "ley": "LCH", "texto": "ARTÍCULO 118.- Contra las resoluciones definitivas pronunciadas por el\nConsejo Nacional Supervisor de Cooperativas (CONSUCOOP) pueden interponerse\nlos recursos y acciones legales correspondientes.”", "resumen": "- Contra las resoluciones definitivas pronunciadas por el Consejo Nacional Supervisor de C"}, {"num": "Art. 119", "ley": "LCH", "texto": "ARTÍCULO 119.- Derogado\n“TÍTULO VI\nDE LAS COOPERATIVAS DE AHORRO Y CREDITO”\n“", "resumen": "- Derogado “TÍTULO VI DE LAS COOPERATIVAS DE AHORRO Y CREDITO” “"}, {"num": "Art. 119-A", "ley": "LCH", "texto": "ARTÍCULO 119-A.- Las cooperativas de ahorro y crédito son empresas\ncooperativas que brindan servicios financieros de carácter solidario, constituidas\nen forma libre y voluntaria para satisfacer necesidades comunes de sus afiliados\ny de responsabilidad social con su comunidad. Su funcionalidad se desarrolla\ndentro de los principios y valores cooperativos mundialmente aceptados,\ncumpliendo las disposiciones legales vigentes que regulan la actividad financiera\nen el país.”\n“", "resumen": "- Las cooperativas de ahorro y crédito son empresas cooperativas que brindan servicios fin"}, {"num": "Art. 119-B", "ley": "LCH", "texto": "ARTÍCULO 119-B.- La intermediación financiera cooperativa es la realización\nde cualquier acto de captación de dinero de sus propios afiliados con el propósito\nde destinar esos recursos al otorgamiento de crédito a sus afiliados o de\ninversión en el mercado financiero, cualquiera que sea el documento en que se\nformalice la operación.\nAquellas cooperativas y otras organizaciones que realicen operaciones de\nintermediación, sin contar con la debida autorización, cometen delito de captación\nirregular de fondos y deben ser sancionados conforme al marco legal vigente.”\n“", "resumen": "- La intermediación financiera cooperativa es la realización de cualquier acto de captació"}, {"num": "Art. 119-C", "ley": "LCH", "texto": "ARTÍCULO 119-C.- Las cooperativas de ahorro y crédito se rigen\nexclusivamente por los preceptos de la presente Ley y su Reglamento, así como\nlas regulaciones y normativas que se emitan sobre la materia de ahorro y\ncrédito.”\n“", "resumen": "- Las cooperativas de ahorro y crédito se rigen exclusivamente por los preceptos de la pre"}, {"num": "Art. 119-D", "ley": "LCH", "texto": "ARTÍCULO 119-D.- Las cooperativas de ahorro y crédito están obligadas a\npublicar dentro de los cuatro (4) meses siguientes al cierre de cada ejercicio\nanual, en la página web de la cooperativa, los balances y estados de excedentes\no pérdidas al cierre de cada ejercicio con sus respectivas notas complementarias\ny dictamen del auditor externo. Las cooperativas que no cuenten con página web\npropia lo deberán hacer en la página web del Consejo Nacional Supervisor de\nCooperativas (CONSUCOOP).\nAdicionalmente deben elaborar su memoria anual la cual debe incluir la\ninformación establecida en el párrafo precedente y asegurar su disponibilidad\npara los afiliados(as).”\n“", "resumen": "- Las cooperativas de ahorro y crédito están obligadas a publicar dentro de los cuatro (4)"}, {"num": "Art. 119-E", "ley": "LCH", "texto": "ARTÍCULO 119-E.- Las cooperativas que tengan más de tres mil (3,000)\nafiliados, realizarán la Asamblea General mediante la designación de delegados,\ncada delegado electo representará un número no menor de Diez (10) ni mayor\nde Cincuenta (50) afiliados presentes en la Asamblea, debiendo observar que\ntanto la oficina principal, como sus oficinas regionales, filiales yventanillas, estén\nrepresentadas en función del número de afiliados con el que cuenten cada una\nde ellas.”", "resumen": "- Las cooperativas que tengan más de tres mil (3,000) afiliados, realizarán la Asamblea Ge"}, {"num": "Art. 119-F", "ley": "LCH", "texto": "ARTÍCULO 119-F.- En adición a lo dispuesto en el Artículo 28 de la presente\nLey, para ser miembros de la Junta Directiva de cooperativas de ahorro y crédito,\nes aplicable lo siguiente:\na) Para aquellas con activos mayores a Quinientos Millones de Lempiras\n(L500,000,000.00) por lo menos tres (3) de sus miembros deben acreditar\n\nde fecha 11 de enero del 2020\nante el Consejo Nacional Supervisor de Cooperativas (CONSUCOOP),\nconocimiento y experiencia en el negocio financiero y/o cooperativo;\nb) Para aquellas con activos entre Cien Millones de Lempiras\n(L100,000,000.00) y Quinientos Millones de Lempiras (L500,000,000.00) por\nlo menos dos (2) de sus miembros deben acreditar ante el Consejo Nacional\nSupervisor de Cooperativas (CONSUCOOP), conocimiento y experiencia en\nel negocio financiero y/o cooperativo; y,\nc) Para aquellas con activos menores a Cien Millones de Lempiras\n(L.100,000,000.00) por lo menos uno (1) de sus miembros debe acreditar\nante el Consejo Nacional Supervisor de Cooperativas (CONSUCOOP),\nconocimiento y experiencia en el negocio financiero y/o cooperativo.”\n“", "resumen": "- En adición a lo dispuesto en el Artículo 28 de la presente Ley, para ser miembros de la "}, {"num": "Art. 119-G", "ley": "LCH", "texto": "ARTÍCULO 119-G.- La Junta de Vigilancia de las cooperativas de ahorro y\ncrédito es la responsable de realizar las labores de auditoría interna mediante\nuna Unidad de Auditoría Interna o un Auditor Interno propio o tercerizado, en los\ncasos siguientes:\na) Las que registren activos netos iguales o superiores a Cien Millones de\nLempiras (L100,000,000.00) deben contar con una Unidad de Auditoría\nInterna a cargo de un contador público a nivel universitario a tiempo completo\ncuya función principal es la evaluación permanente de la gestión del riesgo\ny funcionamiento del sistema de control interno; y,\nb) Las que registren un activo neto inferior a Cien Millones de Lempiras\n(L.100,000,000.00) las funciones de auditoría interna deben ser\ndesempeñadas por un perito mercantil y contador público o en su caso a\ntravés de la tercerización a un organismo certificado por el Consejo Nacional\nSupervisor de Cooperativas (CONSUCOOP).\nAl menos uno (1) de los miembros de la Junta de Vigilancia debe acreditar\nexperiencia en el área de fiscalización.”\n“", "resumen": "- La Junta de Vigilancia de las cooperativas de ahorro y crédito es la responsable de real"}, {"num": "Art. 119-H", "ley": "LCH", "texto": "ARTÍCULO 119-H.- Las cooperativas de ahorro y crédito deben contratar los\nservicios de una firma de auditoría externa para revisar sus Estados Financieros\nanuales, de conformidad a la normativa que emita la Comisión Nacional de\nBancos y Seguros (CNBS) en consenso y con la debida socialización del Conse\u0002jo Nacional Supervisor de Cooperativas (CONSUCOOP), quien debe considerar\nlos requisitos para inscribirla y calificación de firma a requerirse según el nivel de\nactivo manejado por cada cooperativa.”", "resumen": "- Las cooperativas de ahorro y crédito deben contratar los servicios de una firma de audit"}, {"num": "Art. 119-I", "ley": "LCH", "texto": "ARTÍCULO 119-I.- Las Cooperativas de Ahorro y Crédito deben mantener\ncomo fondo de estabilización cooperativa, un monto igual al encaje legal establecido\nen el Banco Central de Honduras (BCH) a la Institución del Sistema Financiero\nrebajado en un veinticinco por ciento (25%).\nDicho porcentaje debe estar invertido en títulos valores de fácil convertibilidad,\nasí como en depósitos en instituciones supervisadas por la Comisión Nacional de\nBancos y Seguros y en Cooperativas de Ahorro y Crédito calificadas por el\nConsejo Nacional Supervisor de Cooperativas (CONSUCOOP)”.\n“", "resumen": "- Las Cooperativas de Ahorro y Crédito deben mantener como fondo de estabilización coopera"}, {"num": "Art. 119-J", "ley": "LCH", "texto": "ARTÍCULO 119-J.- Créase el Fondo de Seguro de Depósitos Cooperativos,\ncomo un sistema de protección y ahorro para garantizar la restitución de los\ndepósitos en dinero efectuados por los afiliados(as) en una cooperativa que haya\nsido declarada en liquidación forzosa, hasta el monto máximo establecido en la\nnormativa emitida sobre la materia”\n“", "resumen": "- Créase el Fondo de Seguro de Depósitos Cooperativos, como un sistema de protección y aho"}, {"num": "Art. 119-K", "ley": "LCH", "texto": "ARTÍCULO 119-K.- El Fondo de Seguro de Depósitos Cooperativos se\nconstituirá mediante un fideicomiso que será administrado por el Fondo de\nSeguro de Depósito (FOSEDE) mediante un Comité Técnico.\nSu patrimonio estará constituido por:\na) Las primas que de conformidad con el reglamento y sus modificaciones\npaguen las Cooperativas de Ahorro y Crédito y que cuenten con la\nautorización de operar por parte del CONSUCOOP;\nb) Las aportaciones que le haga el Estado;\nc) Las aportaciones que le hagan Instituciones Privadas;\nd) El rendimiento de sus activos; y,\ne) Otros recursos que obtenga por cualquier concepto.\nEl Comité Técnico del Fideicomiso está integrado por las Federaciones de\nAhorro y Crédito, un representante del Consejo Nacional Supervisor de\nCooperativas (CONSUCOOP), un representante de la Secretaría de Estado\nen el Despacho de finanzas y un representante de la Secretaria de Estado\nen los Despachos de Industria y Comercio. El Comité Técnico del Fideicomiso\ndebe emitir un Reglamento Especial para la determinación de las primas, su\nfuncionamiento, dirección, coberturas y procedimientos de restitución.”", "resumen": "- El Fondo de Seguro de Depósitos Cooperativos se constituirá mediante un fideicomiso que "}, {"num": "Art. 119-L", "ley": "LCH", "texto": "ARTÍCULO 119-L.- Las cooperativas de ahorro y crédito supervisadas por la\nSuperintendencia de Cooperativas de Ahorro y Crédito del Consejo Nacional\nSupervisor de Cooperativas (CONSUCOOP) pueden realizar las operaciones y\nservicios siguientes:\na) Recibir depósitos de ahorro y a plazo en moneda nacional;\nb) Otorgar préstamos en moneda nacional, de conformidad a los lineamientos establecidos en el marco normativo que se emita al efecto;\nc) Brindar servicios de caja de seguridad;\nch) Recibir préstamos de instituciones financieras y no financieras del país y del exterior;\nd) Efectuar operaciones de crédito con otras cooperativas o instituciones del Sistema Financiero;\ne) Adquirir los bienes muebles o inmuebles necesarios para el desarrollo de sus actividades, dentro de los límites que se establezca en el marco normativo que se emita al efecto;\nf) Efectuar depósitos en instituciones financieras o en otras cooperativas en las que actúe como afiliada;\ng) Adquirir participaciones en sociedades que tengan por objeto brindar servicios a la cooperativa o que tengan compatibilidad con su objeto social,\nh) dentro de los límites establecidos en el marco normativo que se emita al efecto;\ni) Adquirir valores inscritos en el Registro Público del Mercado de Valores, que cuenten con una calificación BBB- (hnd) emitidos por sociedades anónimas establecidas en el país;\nj) Adquirir valores emitidos por el Banco Central de Honduras, la Secretaría de Estado en el Despacho de Finanzas o cualquier otro valor que cuente con la garantía del Estado de Honduras;\nk) Celebrar contratos de intermediación de recursos con instituciones especializadas para cumplir con los objetivos de la cooperativa;\nRecaudar pagos de servicios públicos y otros, a través de la tercerización de\nservicios;\n\nde fecha 11 de enero del 2020\nl) Suscribir y pagar aportaciones en organismos de segundo y tercer grado,\nasí como en otros auxiliares del sector cooperativo; y,\nm) Constituir convenios de cobranza de recursos con personas jurídicas con\nfines de lucro y que provengan de operaciones principalmente con\nafiliados(as); tal operación es permitida solamente en caso que donde esté\nubicada la cooperativa no exista ninguna otra institución financiera que esté\nautorizada para la captación de fondos a través de cuentas de ahorro y de\ncheques.”", "resumen": "- Las cooperativas de ahorro y crédito supervisadas por la Superintendencia de Cooperativa"}, {"num": "Art. 119-M", "ley": "LCH", "texto": "ARTÍCULO 119-M.- La Superintendencia de Cooperativas de Ahorro y\nCrédito dependiente del Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP), dará la no objeción a las cooperativas de ahorro y crédito que\ndemuestren contar con capacidad financiera, estructura tecnológica y operativa,\ncumpliendo con el marco legal vigente, para la prestación las operaciones\nsiguientes:\n1. Recibir depósitos de ahorro y a plazo en moneda extranjera;\n2. Otorgar préstamos en moneda extranjera, de conformidad a los lineamientos\nestablecidos en el marco normativo que se emita al efecto;\n3. Emitir, co-emitir y/o comercializar tarjetas de crédito y tarjetas de débito\nconforme a lo dispuesto en el marco legal vigente;\n4. Recaudar pagos de servicios públicos y otros de forma directa;\n5. Realizar operaciones de transferencias de fondos y remesas;\n6. Actuar como agente de pago de las transferencias condicionadas del Estado\nde Honduras;\n7. Comprar y vender cartera de crédito de otras cooperativas de ahorro y\ncrédito e instituciones del Sistema Financiero;\n8. Comercialización de productos de micro-seguros y micro-pensiones con\ninstituciones autorizadas por el marco legal vigente para prestar dichos\nservicios; y,\n9. Cualquier otra actividad financiera que no le esté expresamente autorizada\nen la presente Ley.”\n“", "resumen": "- La Superintendencia de Cooperativas de Ahorro y Crédito dependiente del Consejo Nacional"}, {"num": "Art. 119-N", "ley": "LCH", "texto": "ARTÍCULO 119-N.- Para la aplicación del Artículo 72 de la presente Ley, las\ncooperativas de ahorro y crédito supervisadas por la Superintendencia de\nCooperativas de Ahorro y Crédito del Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP) pueden ser cooperativistas las micro pequeña y mediana\nempresa (MIPYME), a las cuales se les puede otorgar préstamos en moneda\nnacional o extranjera hasta por el monto de Veinticinco Mil Dólares de los\nEstados Unidos de América (US$25,000.00).”\n“", "resumen": "- Para la aplicación del Artículo 72 de la presente Ley, las cooperativas de ahorro y créd"}, {"num": "Art. 119-O", "ley": "LCH", "texto": "ARTÍCULO 119-O.- La Superintendencia de Cooperativas de Ahorro y Crédito,\nes el órgano técnico especializado del Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP) en materia de supervisión, para las cooperativas de ahorro y\ncrédito con activos establecidos en el Artículo 51 de la presente Ley, conforme a\nlas normativas emitidas, teniendo las funciones siguientes:\na) Ejercer la fiscalización, control, supervisión administrativa, económico-financiera,\nsocial, legal y la gestión de riesgos, tan frecuentemente como lo crea\nnecesario y sin previo aviso;\nb) Dictar las normas que aseguren el cumplimiento y práctica de los principios\ndel buen Gobierno Cooperativo;\nc) Dictar resoluciones de carácter general y particular, y establecer normas prudenciales con arreglo a la legislación vigente, con el fin de hacer más efectiva la fiscalización y supervisión basada en riesgos;\nch) Dictar las normas que aseguren una adecuada coordinación entre las labores de supervisión, con las que realizan las auditorías internas y externas de las cooperativas de ahorro y crédito;\nd) Establecer los criterios que deben seguirse para una adecuada administración de los riesgos, para la valoración de los activos y pasivos y para la constitución de provisiones por riesgos con el objeto de preservar y reflejar razonablemente la situación de liquidez, solvencia y estructura financiera;\ne) Ordenar la adopción y ejecución de un plan de regularización, que contenga las acciones, procedimientos, responsabilidades, metas e indicadores de medición, fechas de ejecución para solventar las deficiencias administrativas o financieras determinadas;\nf) Informar trimestralmente al Director Ejecutivo del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) y a la Comisión Nacional de Bancos y Seguros (CNBS), los resultados de su labor de supervisión, los que al menos debe contener; nivel de solvencia, administración de la liquidez,\ng) suficiencia de reservas, resultados financieros del ejercicio y evaluación de riesgos;\nh) Conocer y resolver los recursos de reposición, dando por agotada la vía administrativa; y,\nRealizar cualquier otro acto y operaciones compatibles con su naturaleza y\nfinalidad, que asegure cumplir y hacer cumplir las disposiciones de esta Ley,\nlos reglamentos, las resoluciones emitidas por el Consejo Nacional Supervisor\nde Cooperativas (CONSUCOOP) y demás normas vigentes, a través de\nnormativas prudenciales de control administrativo.”", "resumen": "- La Superintendencia de Cooperativas de Ahorro y Crédito, es el órgano técnico especializ"}, {"num": "Art. 119-P", "ley": "LCH", "texto": "ARTÍCULO 119-P.- El Superintendente de Cooperativas de Ahorro y Crédito\nserá seleccionado por concurso y será nombrado y contratado por el Consejo\nNacional Supervisor de Cooperativas (CONSUCOOP), quien debe llenar, entre\notros, los requisitos siguientes:\n1. Ser hondureño y cooperativista;\n2. Mayor de treinta (30) años;\n3. Estar en el libre ejercicio de sus derechos civiles;\n4. Ostentar título profesional de nivel universitario, de reconocida honorabilidad,\ncompetencia y notoria experiencia en asuntos financieros, de auditoria y\nlegales; y,\n5. No estar comprendido dentro de las inhabilidades establecidas para ser\nDirector Ejecutivo del Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP).\n“", "resumen": "- El Superintendente de Cooperativas de Ahorro y Crédito será seleccionado por concurso y "}, {"num": "Art. 119-Q", "ley": "LCH", "texto": "ARTÍCULO 119-Q.- El Superintendente de Cooperativas de Ahorro y Crédito\ndura cinco (5) años en sus funciones y puede ser reelecto; sólo puede ser\nremovido o suspendido por causas justificadas y por mayoría de votos de\nla Junta Directiva del Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP), debiendo respetar el procedimiento establecido en la normativa\nlaboral.”\n\nde fecha 11 de enero del 2020\n“", "resumen": "- El Superintendente de Cooperativas de Ahorro y Crédito dura cinco (5) años en sus funcio"}, {"num": "Art. 119-R", "ley": "LCH", "texto": "ARTÍCULO 119-R.- El personal de la Superintendencia de Cooperativas de\nAhorro y Crédito será nombrado por el Director Ejecutivo del Consejo Nacional\nSupervisor de Cooperativas (CONSUCOOP), previo cumplimiento del\nprocedimiento de selección realizado por el Superintendente de Cooperativas de\nAhorro y Crédito. Dicho personal debe contar con la formación académica,\ntécnica y experiencia, para el cargo que habrá de desempeñar.”\n“", "resumen": "- El personal de la Superintendencia de Cooperativas de Ahorro y Crédito será nombrado por"}, {"num": "Art. 119-S", "ley": "LCH", "texto": "ARTÍCULO 119-S- El Superintendente de Cooperativas de Ahorro y Crédito\ny los empleados de esta, deben ejercer sus funciones con la mayor diligencia y\naltos valores éticos, en forma exclusiva para el Consejo Nacional Supervisor de\nCooperativas (CONSUCOOP).\nNo pueden igualmente, salvo autorización previa del Consejo Nacional Supervisor\nde Cooperativas (CONSUCOOP), solicitar créditos ni adquirir bienes de las\ncooperativas de ahorro y crédito.”\n“", "resumen": "El Superintendente de Cooperativas de Ahorro y Crédito y los empleados de esta, deben ejer"}, {"num": "Art. 119-T", "ley": "LCH", "texto": "ARTÍCULO 119-T.- En los casos que la Superintendencia de Cooperativas\nde Ahorro y Crédito, estime que un acto es constitutivo de delito, lo hará del\nconocimiento del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP)\ny éste a su vez, de la autoridad competente.”\n“", "resumen": "- En los casos que la Superintendencia de Cooperativas de Ahorro y Crédito, estime que un "}, {"num": "Art. 119-U", "ley": "LCH", "texto": "ARTÍCULO 119-U.- La Comisión Nacional de Bancos y Seguros (CNBS)\ntiene la responsabilidad únicamente de supervisar a la Superintendencia de\nCooperativas de Ahorro y Crédito, para lo cual está investida de las mismas\nfacultades de supervisión y sanción que se establecen en el marco de su propia\nLey y demás legislación vigente aplicable al Sistema Financiero.\nEl Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) debe aportar\nal presupuesto de la Comisión Nacional de Bancos y Seguros (CNBS) según lo\nque se pacte entre las partes en concepto de supervisión de la Superintendencia\nde Ahorro y Crédito.”\n“TÍTULO VII\nDISPOSICIONES GENERALES”\n“", "resumen": "- La Comisión Nacional de Bancos y Seguros (CNBS) tiene la responsabilidad únicamente de s"}, {"num": "Art. 119-V", "ley": "LCH", "texto": "ARTÍCULO 119-V.- Al Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP) como Organismo Rector del Sistema Cooperativo le compete\nexclusivamente el otorgamiento de personería jurídica a las organizaciones\ncooperativas.”\n“", "resumen": "- Al Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) como Organismo Rector del Sis"}, {"num": "Art. 119-W", "ley": "LCH", "texto": "ARTÍCULO 119-W.- Las cooperativas deben llevar su contabilidad de\nconformidad con las disposiciones y políticas contables que establezca el Consejo\nNacional Supervisor de Cooperativas (CONSUCOOP), como Organismo Supervisor\ndel Sector Cooperativo.”\n“", "resumen": "- Las cooperativas deben llevar su contabilidad de conformidad con las disposiciones y pol"}, {"num": "Art. 119-X", "ley": "LCH", "texto": "ARTÍCULO 119-X.- Para el cobro compulsivo de alguna obligación que las\ncooperativas tuvieren con el Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP), es suficiente título ejecutivo el certificado de deuda emitido por\nel Contador, debidamente notificado a la entidad deudora. Si la obligación\nconsistiere en el aporte anual y en el supuesto de que la Asamblea no pudiere\nllevarse a cabo por algún motivo, la liquidación se debe practicar sobre la base\ndel último balance aprobado. Este mismo criterio debe adoptarse para los casos\nimprevistos.”\n“", "resumen": "- Para el cobro compulsivo de alguna obligación que las cooperativas tuvieren con el Conse"}, {"num": "Art. 119-Y", "ley": "LCH", "texto": "ARTÍCULO 119-Y.- Son aplicables para el funcionamiento de la Superintendencia\nde Otros Subsectores de Cooperativas los artículos 119-P, 119-Q, 119-R, 119-S\ny 119-T, establecidos en la presente Ley.”\n“", "resumen": "- Son aplicables para el funcionamiento de la Superintendencia de Otros Subsectores de Coo"}, {"num": "Art. 119-Z", "ley": "LCH", "texto": "ARTÍCULO 119-Z.- La Confederación Hondureña de Cooperativas (C.H.C.)\npor medio del Instituto de Investigación y Formación Cooperativa (IFC), como\nórgano técnico especializado, cumple en lo pertinente a sus funciones de\ninvestigación, educación, formación, y complementación profesional de asesoría\ntécnico- administrativa contable. Sin perjuicio de las mismas funciones que por\nsu actividad especializada realicen los organismos de integración.”\nTITULO VIII\nDISPOSICIONES FINALES Y TRANSITORIAS", "resumen": "- La Confederación Hondureña de Cooperativas (C.H.C.) por medio del Instituto de Investiga"}, {"num": "Art. 120", "ley": "LCH", "texto": "ARTÍCULO 120.- La cooperativa puede aumentar o disminuir su haber social;\nel aumento por revalorización del patrimonio es lícito, pero su importe constituirá\nuna reserva de la que no podrá disponer la cooperativa, sino cuando se\nenajenen los bienes revalorados y se perciba en efectivo el importe de la\nplusvalía.", "resumen": "- La cooperativa puede aumentar o disminuir su haber social; el aumento por revalorización"}, {"num": "Art. 121", "ley": "LCH", "texto": "ARTÍCULO 121.- El embargo practicado por acreedores particulares de los\ncooperativistas sobre las aportaciones de estos, afectará únicamente los\nexcedentes y el importe que resulte cuando sea liquidada la cooperativa, o\ncuando se liquiden las aportaciones por exclusión o retiro del cooperativista\nembargado.\n“", "resumen": "- El embargo practicado por acreedores particulares de los cooperativistas sobre las aport"}, {"num": "Art. 122", "ley": "LCH", "texto": "ARTÍCULO 122.- Los Tribunales no pueden decretar embargo o cualquier\notro tipo de medida precautoria contra los bienes, derechos o acciones de una\ncooperativa de cualquier grado, si no mediare sentencia definitiva y firme; sin\nembargo, la sentencia que se pronuncie contra la cooperativa condenándola\nal cumplimiento de obligaciones respecto de terceros, tendrá fuerza de cosa\njuzgada. Debiendo los cooperativistas responder hasta el límite de sus\naportaciones.”", "resumen": "- Los Tribunales no pueden decretar embargo o cualquier otro tipo de medida precautoria co"}, {"num": "Art. 123", "ley": "LCH", "texto": "ARTÍCULO 123.- Los Títulos valores que se originen en actos cooperativos\ndeberán reunir los requisitos mencionados en el Código de Comercio.", "resumen": "- Los Títulos valores que se originen en actos cooperativos deberán reunir los requisitos "}, {"num": "Art. 124", "ley": "LCH", "texto": "ARTÍCULO 124.- Las cooperativas con conocimiento del afiliado podrán\nretener aportaciones, depósitos y cualesquiera otros valores de los\ncooperativistas y con los valores retenidos cubrir obligaciones del afiliado con la\ncooperativa.", "resumen": "- Las cooperativas con conocimiento del afiliado podrán retener aportaciones, depósitos y "}, {"num": "Art. 125", "ley": "LCH", "texto": "ARTÍCULO 125.- Las aportaciones, depósitos, participantes y derechos de\ncualquier clase que correspondan a las cooperativas, quedan sujetos\npreferentemente a favor de las cooperativas por las obligaciones que aquellos\nhayan contraído con estas.", "resumen": "- Las aportaciones, depósitos, participantes y derechos de cualquier clase que corresponda"}, {"num": "Art. 126", "ley": "LCH", "texto": "ARTÍCULO 126.- Los casos no previstos en esta Ley, en su Reglamento o en\nlos Estatutos de la correspondiente cooperativa se resolverán de acuerdo con los\nprincipios cooperativistas derivados de la misma Ley; en su defecto, de acuerdo\ncon los principios del derecho cooperativo generalmente admitidos y finalmente\npor las regulaciones del Código de Comercio en primer lugar y del Código\nCivil en segundo, que por su naturaleza y similitud, puedan ser aplicadas a las\ncooperativas.\nARTICULO 127.- Los derechos y acciones de los cooperativistas contenidos\nen esta Ley o sus Reglamentos prescribirán en el término de seis meses, contados\ndesde la fecha en que pudieran hacerse efectivos, a menos que tuvieran señalados\notro plazo especial de prescripción en forma expresa.\nARTICULO 128.- Derogado.\n“", "resumen": "- Los casos no previstos en esta Ley, en su Reglamento o en los Estatutos de la correspond"}, {"num": "Art. 129", "ley": "LCH", "texto": "ARTÍCULO 129.- El Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP) está exento del pago de impuestos nacionales y municipales\nsobre bienes, operaciones y rentas, así como del uso del Papel Especial Notarial,\nTimbres de Contratación y derechos registrales, y goza del libre registro de\nderechos aduanales, consulares y otros que graven las importaciones\nARTICULO 130.- Queda derogada la Ley de Asociaciones Cooperativas\ncontenida en el Decreto No. 158 emitido por el Congreso Nacional el 13 de marzo\nde 1954 y todas las leyes, reglamentos y disposiciones del cualquier orden\nrelativo a la organización, funcionamiento, fiscalización y asistencia de Cooperativas\nde cualquier tipo y de sus organismos auxiliares.", "resumen": "- El Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) está exento del pago de impue"}, {"num": "Art. 131", "ley": "LCH", "texto": "ARTÍCULO 131.- Las normas administrativas sobre cooperativas dictadas\nhasta la fecha de promulgación de esta Ley subsistirán en tanto no se dicten los\nrespectivos reglamentos y no se opongan a esta Ley.\nARTICULO 132.- Derogado", "resumen": "- Las normas administrativas sobre cooperativas dictadas hasta la fecha de promulgación de"}, {"num": "Art. 133", "ley": "LCH", "texto": "ARTÍCULO 133.- Derogado\nARTICULO 134.- Derogado\nARTICULO 135.- Derogado\nARTICULO 136.-\nARTICULO 137.- Derogado", "resumen": "- Derogado ARTICULO 134.- Derogado ARTICULO 135.- Derogado ARTICULO 136.- ARTICULO 137.- D"}, {"num": "Art. 138", "ley": "LCH", "texto": "ARTÍCULO 138.- Derogado\nARTICULO 139.-\nARTICULO 140.-", "resumen": "- Derogado ARTICULO 139.- ARTICULO 140.-"}, {"num": "Art. 141", "ley": "LCH", "texto": "ARTÍCULO 141.-\nARTICULO 142.-.\nDecreto 174-2013 publicado en el diario oficial La Gaceta número 33,334 de\nfecha 01 de febrero de 2019", "resumen": "- ARTICULO 142.-. Decreto 174-2013 publicado en el diario oficial La Gaceta número 33,334 "}, {"num": "Art. 2", "ley": "LCH", "texto": "ARTÍCULO 2.- Reformar las siguientes denominaciones: “Titulo IV Instituto\nHondureño de Cooperativas”, el cual en adelante se denominará “TITULO IV\nCONSEJO NACIONAL SUPERVISOR DE COOPERATIVAS”; y la numeración\ndel “TITULO VI DISPOSICIONES FINALES Y TRANSITORIAS que pasará a ser\nla de “TITULO VIII”, con su misma denominación y ubicación, ambas del Decreto\nNo.65-87 de fecha 30 de Abril de 1987, que contiene la LEY DE COOPERATIVAS\nDE HONDURAS.", "resumen": "- Reformar las siguientes denominaciones: “Titulo IV Instituto Hondureño de Cooperativas”,"}, {"num": "Art. 3", "ley": "LCH", "texto": "ARTÍCULO 3.- Reformar por adición los Artículos: 8-A, 8-B, 24-A- 29-A, 63-A.\n80-A, 81-A, 91-A, 91B, 93-A, 93-B, 93-C, 93-D y 104-A al Decreto No.65-87 de\nfecha 30 de Abril de 1987, que contiene la LEY DE COOPERATIVAS DE\nHONDURAS, los que se leerán así:", "resumen": "- Reformar por adición los Artículos: 8-A, 8-B, 24-A- 29-A, 63-A. 80-A, 81-A, 91-A, 91B, 9"}, {"num": "Art. 4", "ley": "LCH", "texto": "ARTÍCULO 4.- Reformar por adición el Decreto No.65-87 de fecha 30 de Abril\nde 1987, que contiene la LEY DE COOPERATIVAS DE HONDURAS, agregándole\nlas siguientes denominaciones y artículos: TITULO VI. DE LAS COOPERATIVAS\nDE AHORRO Y CREDITO, el cual irá ubicado inmediatamente después del 119\ny, sus correspondientes artículos del 119-A al 119-U; así como el “TITULO VII\nDISPOSICIONES GENERALES, con sus correspondientes artículos que inician\ndesde el 119-V al 119-Z, disposiciones que se leerán así:", "resumen": "- Reformar por adición el Decreto No.65-87 de fecha 30 de Abril de 1987, que contiene la L"}, {"num": "Art. 5", "ley": "LCH", "texto": "ARTÍCULO 5.- TRANSITORIO- Las cooperativas al entrar en vigencia el\npresente Decreto, deben ajustarse a las normativas para regular sus\noperaciones en el plazo que establezca la Junta Directiva del Consejo Nacional\nde Cooperativas (CONSUCOOP).", "resumen": "- TRANSITORIO- Las cooperativas al entrar en vigencia el presente Decreto, deben ajustarse"}, {"num": "Art. 6", "ley": "LCH", "texto": "ARTÍCULO 6.- TRANSITORIO- La adecuación a lo establecido en el", "resumen": "- TRANSITORIO- La adecuación a lo establecido en el"}, {"num": "Art. 119", "ley": "LCH", "texto": "Artículo\n119-I debe estar cumplida en el plazo de dos (2) años a partir de la entrada en\nvigencia del presente Decreto.", "resumen": "I debe estar cumplida en el plazo de dos (2) años a partir de la entrada en vigencia del p"}, {"num": "Art. 7", "ley": "LCH", "texto": "ARTÍCULO 7.- TRANSITORIO- Las Cooperativas de reciente creación tienen\nun periodo de adecuación de hasta cinco (5) años para cumplir lo establecido en\nel presente Decreto, debiendo para ello contar con el acompañamiento técnico\ndel organismo de segundo grado del subsector al que pertenezcan, quien debe\ndeterminar la viabilidad de su funcionamiento y a partir de ello cumplir con los\naportes al Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) que se\nestablecen en la Ley de Cooperativas de Honduras, contenida en el Decreto\nNo.65-87 del 30 de abril del año 1987.", "resumen": "- TRANSITORIO- Las Cooperativas de reciente creación tienen un periodo de adecuación de ha"}, {"num": "Art. 8", "ley": "LCH", "texto": "ARTÍCULO 8.- TRANSITORIO- Los activos y pasivos y en general los\nderechos y obligaciones del Instituto Hondureño de Cooperativas (IHDECOOP)\npasan a formar parte de pleno derecho del patrimonio del Consejo Nacional\nSupervisor de Cooperativas (CONSUCOOP).\nDe igual manera los activos y pasivos y en general, los derechos y obligaciones\ndel Instituto de Formación Cooperativo (IFC), pasan a formar parte de pleno\nderecho, del patrimonio de la Confederación Hondureña de Cooperativas\n(C.H.C.).", "resumen": "- TRANSITORIO- Los activos y pasivos y en general los derechos y obligaciones del Institut"}, {"num": "Art. 9", "ley": "LCH", "texto": "ARTÍCULO 9.- TRANSITORIO- Derogado", "resumen": "- TRANSITORIO- Derogado"}, {"num": "Art. 10", "ley": "LCH", "texto": "ARTÍCULO 10.- TRANSITORIO- Los reglamentos, normas y demás\ndisposiciones adoptadas por las cooperativas, tienen vigencia, mientras no se\nemitan por parte del Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP), las normativas o resoluciones apropiadas, de buena gestión y\ncontrol administrativo.", "resumen": "- TRANSITORIO- Los reglamentos, normas y demás disposiciones adoptadas por las cooperativa"}, {"num": "Art. 11", "ley": "LCH", "texto": "ARTÍCULO 11.- TRANSITORIO- En un plazo de noventa (90) días hábiles, la\nSecretaría de Estado en los Despachos de Desarrollo Económico, a propuesta\ndel Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), debe\nadecuar la reglamentación pertinente a la Ley de Cooperativas de Honduras\nconforme a las presentes reformas.\nTodas las Cooperativas deben ajustar sus Estatutos a las disposiciones de esta\nLey, dentro del plazo de un (1) año, contado a partir del día de la publicación del\nReglamento.\nA las cooperativas que no se reinscribieron bajo la ordenanza del Decreto\nLegislativo No. 174 2013, se les concederá un plazo que será definido por el Ente\nSupervisor.", "resumen": "- TRANSITORIO- En un plazo de noventa (90) días hábiles, la Secretaría de Estado en los De"}, {"num": "Art. 12", "ley": "LCH", "texto": "ARTÍCULO 12.- TRANSITORIO- Derogar los artículos: 66, 96 literales a), c) y e),\n97, 98, 106, 116, 117, 119, 130 párrafo segundo, 132, 133, 134,135, 137, y 138\nde la LEY DE COOPERATIVAS DE HONDURAS, contenida en el Decreto\nNo.65-87 del 30 de abril del año 1987.", "resumen": "- TRANSITORIO- Derogar los artículos: 66, 96 literales a), c) y e), 97, 98, 106, 116, 117,"}, {"num": "Art. 13", "ley": "LCH", "texto": "ARTÍCULO 13.- TRANSITORIO- El presente Decreto entrará en vigencia a partir\ndel día de su publicación en el Diario Oficial \"LA GACETA\".\n\nde fecha 11 de enero del 2020\nD E C R E T O No.174-2013\nDado en la ciudad de Tegucigalpa, Municipio del Distrito Central, en el Salón de\nSesiones del Congreso Nacional, el uno del mes de Septiembre de Dos Mil Trece.\nMAURICIO OLIVA HERRERA\nPRESIDENTE POR LA LEY\nRIGOBERTO CHANG CASTILLO\nSECRETARIO\nGLADIS AURORA LÓPEZ CALDERÓN\nSECRETARIA\nAl Poder Ejecutivo.\nPor Tanto: Ejecútese.\nTegucigalpa, M.D.C., 24 de Diciembre de 2013.\nPORFIRIO LOBO SOSA\nPRESIDENTE DE LA REPÚBLICA\nEL SECRETARIO DE ESTADO EN LOS DESPACHOS DE INDUSTRIA Y\nCOMERCIO.\nJOSÉ ADONIS LAVAIRE\nDecreto No.146-2019 publicado en la Gaceta número 35,146 del 11 de enero\ndel año 2020", "resumen": "- TRANSITORIO- El presente Decreto entrará en vigencia a partir del día de su publicación "}, {"num": "Art. 2", "ley": "LCH", "texto": "ARTÍCULO 2.- Adicionar los artículos 97-A y 98-A a la Ley de Cooperativas,\ncontenida en Decreto No. 65-87 de fecha 30 de abril de 1987 y sus reformas; los\nque se leerán de la siguiente forma: ….", "resumen": "- Adicionar los artículos 97-A y 98-A a la Ley de Cooperativas, contenida en Decreto No. 6"}, {"num": "Art. 3", "ley": "LCH", "texto": "ARTÍCULO 3.- Derogar los artículos 128 y 9 TRANSITORIOS del Decreto No.\n65-87 que creo la LEY DE COOPERATIVAS DE HONDURAS, de fecha 30 de\nabril de 1987, Publicado en el Diario Oficial LA GACETA en fecha 20 de mayo de\n1987 y sus reformas mediante Decreto No.174-2013 de fecha 01 de septiembre\nde 2013 y publicado en el Diario Oficial “La Gaceta” el 1 de febrero de 2014 y\nDecreto Legislativo No. 168-2016 del 15 de diciembre del 2016, publicado en el\nDiario Oficial “La Gaceta” No. 34,265 del 14 de febrero del 2017.\nARTICULO 4. Liberar de los pagos omisos correspondientes a los años 2014,\n2015 y 2016 a las Cooperativas que estaban obligadas al pago mínimo de L.10,\n000.00, según el literal a) del artículo 105 del Decreto Legislativo No. 174-2013\nque contiene las reformas de la Ley de Cooperativas de Honduras.\nARTICULO 5. El Sector Cooperativista puede impulsar la creación de un\nBanco Cooperativo para promover su propio desarrollo y del país en general, y\npara lo cual, debe de sujetarse a los que establece la Ley del Sistema Financiero,\nen cuanto a su organización, autorización, constitución y funcionamiento.", "resumen": "- Derogar los artículos 128 y 9 TRANSITORIOS del Decreto No. 65-87 que creo la LEY DE COOP"}, {"num": "Art. 6", "ley": "LCH", "texto": "ARTÍCULO 6.- La Comisión Nacional de Bancos y Seguros, brindara asistencia\ntécnica al Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), para\nla correcta aplicación del artículo 97 de esta ley y creación de la unidad de\ncumplimiento a la Ley Especial Contra el Lavado de Activos. Asistencia técnica\nque no será mayor de un año a partir de la vigencia de las presentes reformas.", "resumen": "- La Comisión Nacional de Bancos y Seguros, brindara asistencia técnica al Consejo Naciona"}, {"num": "Art. 7", "ley": "LCH", "texto": "ARTÍCULO 7.- Para efectos de lo dispuesto en los artículos 26 y 32 de esta\nLey, las personas que hayan ejercido dos periodos consecutivos a partir del\nDecreto Legislativo No. 174-2013, solo pueden optar a un periodo más.", "resumen": "- Para efectos de lo dispuesto en los artículos 26 y 32 de esta Ley, las personas que haya"}, {"num": "Art. 8", "ley": "LCH", "texto": "ARTÍCULO 8.- El presente Decreto entrara en vigencia a partir de su\npublicación en el Diario Oficial “La Gaceta”.\nDado en la ciudad de Tegucigalpa, Municipio del Distrito Central, en el\nsalón de sesiones del Congreso Nacional, a los cuatro días del mes de\ndiciembre del dos mil diecinueve.\nANTONIO CÉSAR RIVERA CALLEJAS\nPRESIDENTE\nSALVADOR VALERIANO PINEDA\nSECRETARIO\nJOSÉ TOMÁS ZAMBRANO MOLINA\nSECRETARIO\nAl Poder Ejecutivo.\nPor Tanto: Ejecútese.\nJUAN ORLANDO HERNÁNDEZ ALVARADO.\nPRESIDENTE DE LA REPÚBLICA\nEL SECRETARIO DE ESTADO EN EL DESPACHO\nDE DESARROLLO ECONÓMICO\nMARÍA ANTONIA RIVERA\n\nReglamento\nDe La\nLey de\nCooperativas\nCon las reformas del Acuerdo Ejecutivo No. 015-2021publicado en el diario\noficial La Gaceta No. 35,563 del 06 de abril del año 2021\n\nÍndice\nTítulo I: Disposiciones Preliminares pag.46\nTítulo II: Cooperativas y Cooperativistas pag.50\nCapítulo I: De las Cooperativas pag.50\nSección I: Principios pag.50\nSección II: De la Constitución pag.51\nSección III: Administración y Vigilancia pag.54\nSección IV: RDe las Cooperativas de Servicio pag.55\nSección V: De las Cooperativas de Ahorro y Crédito pag.58\nCapítulo II: De los Cooperativista pag.61\nSección I: Definición y Requisitos pag.61\nSección II: Administración y Vigilancia pag.63\nSección III: Asamblea General pag.68\nSección IV: Régimen Económico pag.72\nSección V: Derechos Patrimoniales pag.75\nSección VI: Disolución y Liquidación de las Cooperativas pag.76\nCapítulo III: De Integración Cooperativo pag.78\nCapítulo IV: De la Protección Estatal pag.83\nCapítulo V: De las Sanciones pag.85\nCapítulo VI: Del Consejo Supervisor de Cooperativas pag.86\nSección I: De la Supervisión eIntervención pag.86\nSección II: Administración pag.88\nSección III: Patrimonio del CONSUCOOP pag.89\nCapítulo VII: Registro de Cooperativas pag.90\nTítulo III: Disposiciones Finales y Transitorias pag.93\nSecretaría de Estado en el\nDespacho de Desarrollo\nEconómico\nACUERDO No. 041-2014\nEL PRESIDENTE CONSTITUCIONAL DE LA\nREPÚBLICA\nCONSIDERANDO: Que la Constitución de la República en su Artículo 338\nestablece la obligación del Estado en la Promoción y el fomento de las\norganizaciones Cooperativas de cualquier clase, sin que se eludan o se alteren\nlos principios económicos establecidos en la misma. Sobre cuya base el Congreso\nNacional emitió el Decreto No.65-87 de fecha 7 de mayo de 1987, contentivo la\nLey de Cooperativas de Honduras.\nCONSIDERANDO: Que el Congreso Nacional emitió el 1 de Septiembre del año\n2013, el Decreto No. 174-2013, contentivo de reformas a la Ley de Cooperativas\nde Honduras, publicado en el Diario Oficial La Gaceta el 1 de febrero del año\n2014, ordenando en su Artículo Transitorio 11 que la Secretaría de Estado en el\nDespacho de Desarrollo Económico, en un plazo de noventa (90) días hábiles, a\npropuesta del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP),\nadecúe la reglamentación pertinente a la Ley de Cooperativas de Honduras\nconforme a las referidas reformas. Lo que considerando la magnitud de las\nreformas exige la emisión de un nuevo reglamento de Ley.\nCONSIDERANDO: Que de conformidad con el Artículo 41 reformado de la Ley\nde Procedimiento Administrativo, por la Ley para Optimizar la Administración\nPública, Mejorar los Servicios a la Ciudadanía y Fortalecimiento de la Transparencia\nen el Gobierno, aprobado mediante Decreto 266-2013 y publicado en el Diario\nOficial La Gaceta del 23 de enero del año 2014, “corresponde al poder ejecutivo,\nexpedir los reglamentos de la administración pública, salvo disposición contraria\nde la ley”.\nACUERDA: Emitir el Reglamento de la Ley de Cooperativas de Honduras\ncontenida en Decreto No. 65/87 del 30 de abril de 1987 y reformado mediante\nDecreto No.174-2013 de fecha 1 de Septiembre del año 2013, siguiente:", "resumen": "- El presente Decreto entrara en vigencia a partir de su publicación en el Diario Oficial "}, {"num": "Art. 1", "ley": "RLCH", "texto": "Artículo 1.- Objeto del Reglamento. El presente reglamento contiene las\ndisposiciones complementarias necesarias para la aplicación de la Ley de\nCooperativas de Honduras emitida mediante el Decreto No.65-87 del 30 de abril\nde 1987 y reformada mediante Decreto No.174-2013 de fecha 1 de Septiembre\ndel año 2013, publicado en el Diario Oficial La Gaceta No. 33,344 de fecha 01 de\nfebrero del 2014 2014 y Decreto No. 146-2019 de fecha 4 de diciembre de 2019\ny publicado en el Diario Oficial La Gaceta No. 35,146 de fecha 11 de enero de\n2020.", "resumen": "- Objeto del Reglamento. El presente reglamento contiene las disposiciones complementarias"}, {"num": "Art. 2", "ley": "RLCH", "texto": "Artículo 2.- Definiciones. Salvo que expresamente se indique lo contrario se entiende por: 47 a) Aportaciones ordinarias: Son las sumas de dinero que los Cooperativistas entregan a sus Cooperativas como obligación estatutaria para formar el haber social. Se caracteriza por ser nominativas, intransferibles, indivisibles.\nb) Aportaciones extraordinarias: Son las sumas de dinero que los\nCooperativistas entregan a sus Cooperativas, por acuerdo de la Asamblea\nGeneral, con un destino o fin específico y con previa aprobación del\nCONSUCOOP.\nc) CHC: Es la Confederación Hondureña de Cooperativas.\nd) CNBS: Es la Comisión Nacional de Bancos y Seguros.\ne) CONAMUCOOPH: Es el Consejo Nacional de la Mujer Cooperativista de\nHonduras.\nf) CONAJOVEN: Consejo Nacional de la Juventud Cooperativista;\ng) CONSUCOOP: Es el Consejo Nacional Supervisor de Cooperativas.\nh) Cooperativa: Es la entidad de carácter privado, sin fines de lucro, reconocida\npor el Estado conforme a la Ley de Cooperativas.\ni) Cooperativista o Afiliado(a): Es la persona natural o jurídica afiliada(o) a\nuna Cooperativa.\nj) Cuentas Mancomunadas: Es aquella en la que existen dos o más titulares\ny cualquier disposición en la cuenta, debe realizarse por acuerdo de estos,\nexigiendo la firma de ambos;\nk) Denuncia: Es dar parte a una autoridad pública o privada de que está\naconteciendo algo inmoral, y/o ilegal.\nl) Delegados: Mujer u hombre electo(a) en Asamblea General para representar\na una cantidad de afiliados de la Cooperativa.\nm) Director Ejecutivo: Es el Director Ejecutivo del CONSUCOOP.\nn) Estatuto: Es la normativa interna que regula a la Cooperativa.\no) Excedente Social Neto: Se entenderá al excedente cooperativo, como\naquel que proviene de la diferencia entre el costo y el precio de los servicios\nprestados a los afiliados y que debe devolverse a los mismos en proporción\nal uso de los servicios sociales, después de la constitución de reservas.\np) Exclusión: Extinción del vínculo que une a un Afiliado con la Cooperativa,\npor incumplimiento de requisito mínimo para ser afiliado, Excluyéndolo del\ndisfrute de las oportunidades económicas, sociales, culturales y políticas\nexistentes en la Cooperativa.\nq) Gobierno Cooperativo: Conjunto de reglas y directrices que regulan las\nrelaciones internas entre la asamblea general, directivos, comités de apoyo,\nórganos de vigilancia y de supervisión, gerencia, funcionarios y empleados\ny demás personas que tienen influencia en una cooperativa; con el propósito\nde que el actuar y desempeño de los mismos procure siempre la protección\ndel patrimonio, el bienestar de los afiliados y la confianza del público en\ngeneral. Mediante la sana administración, responsabilidad social con la\ncomunidad, y cumplir con los principios y valores cooperativos.\nr) IFC: Es el Instituto de Investigación y Formación Cooperativo, como departamento\ntécnico de la CHC.\nt) Inhabilitación: Es la limitación o prohibición automática a un afiliado, al\nejercicio de un cargo de dirección o el uso de un derecho, por incumplimiento\nde obligaciones contraídas; así como, de los lineamientos internos y Estatutos\nde la Cooperativa.\nt) Ley: Es la Ley de Cooperativas de Honduras contenida en el Decreto\nNo.65-87 del 30 de abril de 1987 y sus reformas contenidas en el Decreto\nNo.174-2013 emitido el 1 de septiembre del 2013.\nu) Organismos Auxiliares: CONAMUCOOPH y CONAJOVEN, Son órganos\nespecializados en materia de género y juventud de la Confederación Hondureña\nde Cooperativas.\nv) Provisiones: Registros reconocidos como gastos dentro del estado de\nresultado, concernientes a estimaciones de créditos en mora, posibles\npérdidas de inversiones, depreciación, amortización y agotamiento que\nsufran los bienes en uso; así como por otras provisiones de gastos, cuya\ncuantía puede estimarse y ajustarse al cierre del año por el monto real\npagado.\nw) Queja: Reclamación o protesta que se hace ante una autoridad a causa de\nun desacuerdo o inconformidad.\nx) Reclamo: Sin que tenga carácter limitativo, es el derecho de petición que\ntiene un cooperativista que se ve afectado, ya sea por incumplimiento de los\ntérminos del contrato suscrito con una cooperativa, por cobros en exceso de\nlo pactado o por servicios no pactados o aceptados; o cuando han sido\nvulnerados sus derechos.\ny) Registro: Es el Registro Nacional de Cooperativas.\nz) Reservas Patrimoniales: Son los valores que se establecen para fortalecer\nla estructura patrimonial de la cooperativa y para hacer frente a necesidades,\ncontingentes y/o riesgos futuros, se derivan de los excedentes, conforme lo\nestablecido en la Ley, Reglamento, Estatuto y aprobación de la Asamblea\nGeneral Ordinaria, por lo que no constituye un gasto para la cooperativa.\naa) Reservas Especiales: Son aquellas que se constituyen de los excedentes\npara dar cumplimiento a una disposición legal que la requiere con el propósito\nde ser utilizadas para un fin específico, En aquellos casos en que la Asamblea\nGeneral constituya reservas voluntariamente sin que sean requeridas por el\nmarco legal vigente y que dicha constitución implique desembolsos de\nrecursos se registrarán como provisiones.\nbb) Suspensión: Es la interrupción temporal de los derechos establecidos en la\nLey de Cooperativas, a un afiliado(a), por la violación a el Estatuto o\nlineamientos internos de la Cooperativa.\ncc) Valores éticos: Son normas y comportamientos de los niveles organizativos\nde la cooperativa, para asegurar el cumplimiento de los valores cooperativos,\nlos objetivos estratégicos y las normas éticas de conducta, con el fin de\natender necesidades individuales y colectivas, que tienen incidencia social.", "resumen": "- Definiciones. Salvo que expresamente se indique lo contrario se entiende por: 47 a) Apor"}, {"num": "Art. 3", "ley": "RLCH", "texto": "Artículo 3.- Garantía del Libre Desarrollo del Cooperativismo. El Estado\ngarantiza el libre desarrollo del cooperativismo, por ser asociaciones no lucrativas\ny por la acción que al efecto realicen sus cooperativistas, el CONSUCOOP, así\ncomo los organismos de integración y auxiliares del sistema cooperativo.\nLas instituciones del Estado están obligadas a prestar al cooperativismo el apoyo\nnecesario para que este sector coadyuve eficazmente al desarrollo de la nación.", "resumen": "- Garantía del Libre Desarrollo del Cooperativismo. El Estado garantiza el libre desarroll"}, {"num": "Art. 4", "ley": "RLCH", "texto": "Artículo 4.- Valores cooperativos. Las Cooperativas deben basar sus\nactuaciones en los siguientes valores:\na) Valor de ayuda mutua: Apoyo recíproco entre afiliados(as)y su cooperativa,\npara dar y recibir servicios que procuren beneficios comunes a los\nparticipantes;\nb) Responsabilidad: Nivel de desempeño en el cumplimiento de las actividades\npara el logro de metas, sintiendo un compromiso moral con los afiliados(as).\nLos afiliados (as) de una cooperativa son responsables de su creación,\nmantenimiento y de su desarrollo futuro y asumen un compromiso con el\npaís en términos de solidaridad, humanismo y patriotismo;\nc) Democracia: Toma de decisiones colectivas por los afiliados(as). Significa\nejercer la libertad, estimular la participación y desempeñarse con igualdad y\nequidad. La democracia debe ser uno de los elementos esenciales del\nsistema cooperativo, faltando este elemento, una organización no puede ser\nconsiderada como una verdadera cooperativa;\nd) Equidad: Que implica la distribución de recursos y beneficios entre afiliadas\ny afiliados debe ser justa y tratar equitativamente, tales como costo de\nservicio, distribución de excedentes, asignación de recursos;\ne) Igualdad de derechos: Lo que implica que en todo acto las Cooperativas\ndeben aceptar igual posibilidad de ingreso y reconocer idénticos derechos y\nobligaciones a todos los Afiliados(as) sin distinción de género, raza, color de\npiel, sexo, preferencia de sexo, origen étnico u otro análogo;\nf) Solidaridad: Apoyar, cooperar en la solución de problemas de los\nafiliados(as), la familia y la comunidad. También promueve los valores éticos\nde la honestidad, transparencia, responsabilidad social y compromiso con\nlos demás;\ng) Honestidad: Es la honradez, la dignidad y la decencia en la conducta de las\ny los afiliados(as) en sus actuaciones y decisiones, en todos y cada uno de\nlos campos de desempeños de la cooperativa;\nh) Transparencia: En una cooperativa hay “transparencia” cuando la\ninformación es administrada entre las y los afiliados y dirigentes de manera\nclara, veraz y oportuna;\ni) Responsabilidad Social: Es la presencia activa de las cooperativas y sus\nafiliados(as) en las comunidades donde actúan, con el fin de contribuir a su\nmejoramiento integral y/o desarrollo humano sostenible; y,\nj) Preocupación por los Demás: Hasta no lograr el bienestar material y\nespiritual de las personas que le rodean, el cooperativista estará en una\ncondición de inquietud, buscando soluciones a los problemas sociales.", "resumen": "- Valores cooperativos. Las Cooperativas deben basar sus actuaciones en los siguientes val"}, {"num": "Art. 5", "ley": "RLCH", "texto": "Artículo 5.- Designación de Representantes del Sector Cooperativista.\nCorresponde a la C.H.C. designar a los representantes del sistema Cooperativista\nante los organismos del Estado ligados con la economía y desarrollo nacional,\nasí como ante cualquier otra entidad de carácter nacional o internacional en que\ndeba estar representado.", "resumen": "- Designación de Representantes del Sector Cooperativista. Corresponde a la C.H.C. designa"}, {"num": "Art. 6", "ley": "RLCH", "texto": "Artículo 6.- Límite de Responsabilidad de los Cooperativistas. Por\nresponsabilidad limitada se entiende el que los Afiliados(as) de una Cooperativa\nreconocida bajo la Ley, no responden de los actos y acciones de su Cooperativa\nmás allá de sus aportaciones al haber social. Con la excepción de cuando un\nAfiliado(a) garantice o avale a otro cooperativista, sólo y solidariamente, con sus\nbienes las obligaciones de la Cooperativa ante terceros, o cuando la Cooperativa\nle conceda créditos garantizados con bienes.", "resumen": "- Límite de Responsabilidad de los Cooperativistas. Por responsabilidad limitada se entien"}, {"num": "Art. 7", "ley": "RLCH", "texto": "Artículo 7.- Actos Cooperativos. Son actos cooperativos los que realice la\nCooperativa:\na) Con sus Cooperativistas como persona natural o jurídicas sin fines de lucro,\nen su condición de tal;\nb) Con otra u otras Cooperativas de igual o diferente actividad principal o del\nmismo o distinto grado de integración;\nc) Con no Cooperativistas, siempre que se refiera cumplir su objeto social y en\ncuya relación no se persiga fines de lucro;\nd) Los relativos a la Constitución de la Cooperativa;\ne) La fusión, incorporación y transformación de Cooperativas;\nf) La disolución y liquidación de la Cooperativa cuando sea voluntaria; y,\ng) Con otras instituciones públicas o privadas siempre y cuando se persiga\nprestar servicios a sus cooperativistas y la comunidad.\nTITULO II\nCOOPERATIVAS Y COOPERATIVISTAS\nCAPITULO I\nDE LAS COOPERATIVAS\nSECCION I\nPRINCIPIOS", "resumen": "- Actos Cooperativos. Son actos cooperativos los que realice la Cooperativa: a) Con sus Co"}, {"num": "Art. 8", "ley": "RLCH", "texto": "Artículo 8.-Definición de los Principios Cooperativos. Los principios enunciados\nen literal b) del Artículo 7 de la Ley, deben ser entendidos de la manera\nsiguiente:\nPrimer Principio: Membresía abierta y voluntaria, Las cooperativas son\norganizaciones voluntarias, abiertas para todas aquellas personas dispuestas a\nutilizar sus servicios y dispuestas a aceptar las responsabilidades que conlleva la\nmembresía, sin discriminación de género, raza, clase social, posición política o\nreligiosa;\nSegundo Principio: Control democrático de los miembros, Las cooperativas\nson organizaciones democráticas controladas por sus miembros, quienes partici\u0002pan activamente en la definición de las políticas y en la toma de decisiones. Los\nhombres y mujeres elegidos para representar a su cooperativa, responden ante\nlos miembros. En las cooperativas de base los miembros tienen igual derecho de\nvoto (un miembro, un voto), mientras en las cooperativas de otros niveles\ntambién se organizan con procedimientos democráticos;\nTercer Principio: Participación económica de los miembros, Los miembros\ncontribuyen de manera equitativa y controlan de manera democrática el capital\nde la cooperativa. Por lo menos una parte de ese capital es propiedad común de\nla cooperativa.\nUsualmente reciben una compensación limitada, si es que la hay, sobre el capital\nsuscrito como condición de membresía. Los miembros asignan excedentes para\ncualquiera de los siguientes propósitos: El desarrollo de la cooperativa mediante\nla posible creación de reservas, de la cual al menos una parte debe ser indivisi\u0002ble; los beneficios para los miembros en proporción con sus transacciones con la\ncooperativa; y el apoyo a otras actividades según lo apruebe la membresía;\nCuarto Principio: Autonomía e independencia, Las cooperativas son organi\u0002zaciones autónomas de ayuda mutua, controladas por sus miembros. Si entran\nen acuerdos con otras organizaciones (incluyendo gobiernos) o tienen capital de\nfuentes externas, lo realizan en términos que aseguren el control democrático\npor parte de sus miembros y mantengan la autonomía de la cooperativa.\nQuinto Principio: Educación, formación e información, Las cooperativas\nbrindan educación y entrenamiento a sus miembros, a sus dirigentes electos,\ngerentes y empleados, de tal forma que contribuyan eficazmente al desarrollo de\nsus cooperativas. Las cooperativas informan al público en general, particular\u0002mente a jóvenes y creadores de opinión, acerca de la naturaleza y beneficios del\ncooperativismo;\nSexto Principio: Cooperación entre cooperativas, Las cooperativas sirven a\nsus miembros más eficazmente y fortalecen el movimiento cooperativo trabajando\nde manera conjunta por medio de estructuras locales, nacionales, regionales e\ninternacionales; y,\nSéptimo Principio: Compromiso con la comunidad; Las cooperativas\ntrabajan para el desarrollo sostenible de su comunidad y la protección del medio\nambiente, a través de políticas aceptadas por sus miembros, promoviendo la\ngestión responsable de los recursos naturales para garantizar el equilibrio\necológico y el bienestar humano.\nSECCION II\nDE LA CONSTITUCIÓN", "resumen": "-Definición de los Principios Cooperativos. Los principios enunciados en literal b) del Ar"}, {"num": "Art. 9", "ley": "RLCH", "texto": "Artículo 9.- Constitución de una Cooperativa. Para constituir una Cooperativa\nse debe proceder de la manera siguiente:\na) Los interesados en formar una cooperativa deben buscar asesoría en el\norganismo de fomento o de integración, una vez recibida dicha asesoría,\nprocederá a convocar por escrito a todos los interesados en pertenecer a la\nmisma;\nb) La Asamblea queda constituida con un número de asistentes no menor de\ndoce (12) personas; sin embargo para las cooperativas de ahorro y crédito y\ncooperativas regionales, este requisito se eleva a no menos de treinta (30)\npersonas;\nc) La Asamblea de constitución debe nombrar con carácter provisional para\ndirigir la asamblea un Presidente(a) y un Secretario(a) de Actas;\nd) El(la) Presidente(a) provisional hará un resumen de las actividades previas\na la formación de la Cooperativa y explicar el proceso necesario para su\nreconocimiento oficial, así como los objetivos fundamentales de la Cooperativa;\ne) El(la) Secretario(a) debe dar lectura a un proyecto de Estatuto preparado por\nel IFC, persona natural o jurídica con capacidad técnica en la materia o\ncualquier organismo de integración, conforme a lo establecido por la Ley y\néste Reglamento, el cual debe ser discutido y aprobado por la Asamblea;\nf) Acreditación de haber recibido el seminario básico de cooperativas impartido\npor el IFC o cualquier organismo de integración;\ng) La Asamblea debe escoger los integrantes de los cuerpos directivos\nprovisionales, según lo dispongan el Estatuto aprobado; y,\nh) Todos los presentes deben firmar el Acta Constitutiva.", "resumen": "- Constitución de una Cooperativa. Para constituir una Cooperativa se debe proceder de la "}, {"num": "Art. 10", "ley": "RLCH", "texto": "Artículo 10.- Requisitos del Acta Constitutiva. El acta constitutiva de toda\nCooperativa debe de contener los requisitos siguientes:\na) Lugar y fecha del acto de constitución;\nb) Nombre, nacionalidad, domicilio, dirección exacta, teléfonos, correos\nelectrónicos y otros datos generales de las personas naturales o jurídicas\nque la constituyen, incluyendo el número de tarjeta de identidad u otro\ndocumento oficial de identificación en caso de menores de edad, partida de\nnacimiento y extranjeros carné de residencia o pasaporte; si son personas\njurídicas, documento que acredite la personalidad jurídica; La clase y nivel\nde integración de la Cooperativa que se constituye;\nc) Naturaleza de la actividad principal de la Cooperativa;\nd) Denominación social;\ne) La expresa declaración de que es por tiempo indefinido;\nf) Domicilio;\ng) Monto del haber social;\nh) La indicación de lo que cada Cooperativista aporte en dinero u otros bienes;\ni) Indicar los órganos de dirección, administración y fiscalización;\nj) El nombre de las personas electas para integrar los órganos administrativos\ny la designación de quienes tienen la representación legal;\nk) El porcentaje de las reservas, creación de fondos especiales de asignación\npresupuestaria para fomentar la educación Cooperativista;\nl) El compromiso de integrarse a organismos cooperativos a nivel superior,\ntres (3) meses después de haber obtenido su personalidad jurídica y bajo\nadvertencia de las sanciones de ley, su incumplimiento y,\nm) Adoptar los principios y valores cooperativos ordenados en la Ley y este\nReglamento.", "resumen": "- Requisitos del Acta Constitutiva. El acta constitutiva de toda Cooperativa debe de conte"}, {"num": "Art. 11", "ley": "RLCH", "texto": "Artículo 11.- Contenido del Estatuto. El Estatuto de toda Cooperativa debe\nregular los aspectos siguientes:\na) Denominación, membresía y finalidad (si es abierta o cerrada) y domicilio\nb) Objetivo social;\nc) Derechos y obligaciones de los(as) Cooperativistas;\nd) Condiciones de ingreso, retiro, suspensión y expulsión de los Afiliados(as);\ne) Acciones afirmativas, en igualdad, equidad y transversalización en los actos\ncon enfoque de género;\nf) Valor y clase de las aportaciones;\ng) Forma de devolver el valor de las aportaciones en caso de pérdida de la\ncalidad de Cooperativista;\nh) Forma de determinar el valor de las aportaciones que no fueren hechas en\nefectivo;\ni) Monto y clase de la garantía que debe rendir el personal responsable de la\ncustodia de los bienes o fondos de las Cooperativas;\nj) Clases de Asambleas, asuntos que puedan considerar las mismas, formas\nde convocatoria, quórum de asistencia y votación para validez de sus\nsesiones;\nk) Número mínimo de veces que debe sesionar anualmente laAsamblea General;\nl) Forma como han de integrarse los órganos administrativos, sus funciones y\nlas de cada uno de sus miembros;\nm) Forma de distribución de excedentes y absorción de pérdidas; formación de\nreservas y fondos especiales permanentes;\nn) Forma de constituir, aumentar o reducir los recursos económicos;\no) Fecha de cierre del ejercicio económico;\np) Normas sobre integración y educación Cooperativa;\nq) Procedimiento de reforma del Estatuto;\nr) Procedimiento de disolución y liquidación;\ns) Destino de los bienes para el caso de disolución;\nt) Forma de representación de la Cooperativa;\nu) Comités de obligatorio cumplimiento, y,\nv) Las demás disposiciones y requisitos que se considere necesarios para el\nbuen funcionamiento de la Cooperativa, siempre que no se opongan a la Ley\ny a este Reglamento.\n\n53", "resumen": "- Contenido del Estatuto. El Estatuto de toda Cooperativa debe regular los aspectos siguie"}, {"num": "Art. 12", "ley": "RLCH", "texto": "Artículo 12.- Solicitud de Inscripción. Para la formal constitución de una\nCooperativa se debe presentar una solicitud de inscripción ante el\nCONSUCOOP, la que debe ir acompañada de los documentos siguientes:\na) Original y fotocopia de la respectiva Acta Constitutiva;\nb) Lista de Afiliados(as), especificando nombre completo, domicilio, estado\ncivil, ocupación, nacionalidad, capital suscrito y pagado y número de tarjeta\nde identidad;\nc) Certificación del(la) Secretario(a) de los nombres completos y direcciones\nde los directivos(as) electos, con sus cargos correspondientes;\nd) Certificación del organismo de Fomento o de integración Cooperativo, que\nacredita que el grupo que se pretende constituir en Cooperativa recibió la\ninstrucción tanto doctrinaria como técnica para capacitarlo en el cumplimiento\nde sus deberes y en la exigencia de sus derechos; y,\ne) Certificación que evidencie el depósito del capital social de la Cooperativa,\nextendida por una Cooperativa de Ahorro y Crédito o una institución del\nsistema financiero.\nLa solicitud de reconocimiento e inscripción en el Registro Nacional de\nCooperativas debe ser presentada por un profesional de derecho colegiado.", "resumen": "- Solicitud de Inscripción. Para la formal constitución de una Cooperativa se debe present"}, {"num": "Art. 13", "ley": "RLCH", "texto": "Artículo 13.- Denominación Social de las Cooperativas. La denominación\nde cada Cooperativa se debe formar libremente, haciendo referencia a la\nactividad social principal, la denominación social debe ser distinta de cualquier\notra Cooperativa. No está permitido a las Cooperativas adoptar en la\ndenominación social el nombre de personas naturales.\nEn las Cooperativas mixtas, la denominación social debe llevar la indicación de\nla clase de Cooperativa de que se trate.", "resumen": "- Denominación Social de las Co
