operativas. La denominación de cada Cooperativa se debe for"}, {"num": "Art. 14", "ley": "RLCH", "texto": "Artículo 14.- Patrimonio de las Cooperativas. Las Cooperativas deben\nconstituirse con un patrimonio, no inferior al porcentaje siguiente:\na) Las de Servicio, un mínimo del 50% del salario mínimo;\nb) Las de Producción, un mínimo del 25 % del salario mínimo;\nc) Las de centros educativos, un mínimo del 12.5% del salario mínimo.\nSirviendo como referencia la categoría económica más baja del salario\nmínimo vigente en la zona donde se constituirá la misma.", "resumen": "- Patrimonio de las Cooperativas. Las Cooperativas deben constituirse con un patrimonio, n"}, {"num": "Art. 15", "ley": "RLCH", "texto": "Artículo 15.- Límite de Aportaciones. Ningún Cooperativista puede tener una\naportación mayor del treinta (30%) del total de las aportaciones suscritas por\ntodos los miembros de la Cooperativa.", "resumen": "- Límite de Aportaciones. Ningún Cooperativista puede tener una aportación mayor del trein"}, {"num": "Art. 16", "ley": "RLCH", "texto": "Artículo 16.- Asociación con Otras Personas Jurídicas, no cooperativas. Las\nCooperativas de cualquier grado pueden asociarse con personas de otra condición\njurídica no cooperativas, para constituir otra entidad jurídica o celebrar contratos\nde participación, siempre que no se desvirtúe su propósito de servicio, ni se\nviolente la Ley.\nEn ningún caso las Cooperativas pueden trasladar a la nueva entidad o a la\nparticipante no Cooperativa los derechos y beneficio que la Ley les confiere,\nincluyendo beneficios ya obtenidos.", "resumen": "- Asociación con Otras Personas Jurídicas, no cooperativas. Las Cooperativas de cualquier "}, {"num": "Art. 17", "ley": "RLCH", "texto": "Artículo 17.- Contratos de Participación. La asociación o contratos de\nparticipación pueden hacerse o celebrarse con entidades de los sectores\npúblicos y/o privados ya sea que los mismos persigan o no fines de lucro. Si el\ncontrato de participación sobrepasa del diez (10%) de los activos de la Cooperativa,\nse deben llenar los requisitos siguientes:\na) Acuerdo de la Asamblea General Ordinaria de la Cooperativa;\nb) Dictamen del organismo de integración del Movimiento Cooperativo Hondu\u0002reño al cual esté afiliado la Cooperativa; y,\nc) Dictamen favorable de la Dirección Ejecutiva del CONSUCOOP.\nLos excedentes que obtenga la Cooperativa como partícipe de la nueva\nentidad o del contrato de participación se deben entender generados por\noperaciones con no Afiliados(as) y tendrán el destino a que se refiere el\nArtículo 45 de la Ley.", "resumen": "- Contratos de Participación. La asociación o contratos de participación pueden hacerse o "}, {"num": "Art. 18", "ley": "RLCH", "texto": "Artículo 18.- Constancia de Cooperativas en Formación. Para ejecutar\nactos frente a terceros, las Cooperativas en formación deben acreditar tal\ncondición mediante constancia extendida por el CONSUCOOP. Pueden ejecutar\nactos frente a terceros relativos a la obtención de su personalidad jurídica,\norganización de servicios y gestión de recursos económicos para poder\nfuncionar como Cooperativa.\nLas operaciones internas que la Cooperativa haya realizado con sus Afiliados(as)\ndesde la fecha de la Asamblea General Constitutiva hasta su inscripción, deben\nconsiderarse legalmente celebradas.", "resumen": "- Constancia de Cooperativas en Formación. Para ejecutar actos frente a terceros, las Coop"}, {"num": "Art. 19", "ley": "RLCH", "texto": "Artículo 19.- Cooperativas Extranjeras. Las Cooperativas extranjeras\ngozan en Honduras de los beneficios que la Ley y la norma que se cree para tal\nefecto les concede, siempre que tales beneficios estén concedidos a Cooperativas\nhondureñas en las respectivas leyes del país de origen de aquellas.", "resumen": "- Cooperativas Extranjeras. Las Cooperativas extranjeras gozan en Honduras de los benefici"}, {"num": "Art. 20", "ley": "RLCH", "texto": "Artículo 20. Personalidad Jurídica. Las Cooperativas tienen personalidad\njurídica a partir de la fecha en que queden inscritas en el Registro Nacional de\nCooperativas del CONSUCOOP.\nSECCION III\nCLASES DE COOPERATIVAS", "resumen": "Personalidad Jurídica. Las Cooperativas tienen personalidad jurídica a partir de la fecha "}, {"num": "Art. 21", "ley": "RLCH", "texto": "Artículo 21.- Clases de Cooperativas de Producción. Las Cooperativas de\nProducción, entre otras, pueden ser de las clases siguientes:\na) Producción Agrícola;\nb) Producción Pecuaria;\nc) Producción Acuícola;\nd) Producción Agropecuaria;\ne) Producción Artesanal;\nf) Producción Industrial, Agro-industrial o Agroforestal; y,\ng) Otras que autoricé el CONSUCOOP.", "resumen": "- Clases de Cooperativas de Producción. Las Cooperativas de Producción, entre otras, puede"}, {"num": "Art. 22", "ley": "RLCH", "texto": "Artículo 22.- Cooperativas de Producción Agrícola. Son Cooperativas de\nProducción Agrícola aquellas cuya actividad principal es la de lograr la produc\u0002ción de la tierra por medio de la siembra de cultivos permanentes o estacionarios\ny su comercialización.", "resumen": "- Cooperativas de Producción Agrícola. Son Cooperativas de Producción Agrícola aquellas cu"}, {"num": "Art. 23", "ley": "RLCH", "texto": "Artículo 23.- Cooperativas de Producción Pecuaria. Son Cooperativas de\nProducción Pecuaria aquellas cuyas actividades principales son la crianza,\nconservación, desarrollo y su comercialización, pudiendo ser estas de ganado\nmayor y/o de ganado menor. Son actividades de ganado mayor, las de carne y\nlecheras; y de ganado menor, las de avicultura, apicultura, y otras similares.", "resumen": "- Cooperativas de Producción Pecuaria. Son Cooperativas de Producción Pecuaria aquellas cu"}, {"num": "Art. 24", "ley": "RLCH", "texto": "Artículo 24.- Cooperativas de Producción Acuícola. Son Cooperativas de\nProducción Acuícola aquellas en las cuales para la realización de sus objetivos y\nfines principales, sus actividades están orientadas a realizar un conjunto de\nactividades, tecnológicas, técnicas, o artesanales, orientadas al cultivo o crianza\nde especies acuáticas que abarca su ciclo biológico completo o parcial y se\nrealiza en un medio seleccionado y controlado, en ambientes hídricos naturales\no artificiales, tanto en aguas marinas, dulces o salobres. Se incluyen las\nactividades de poblamiento o siembra y repoblamiento o resiembra, así como las\nactividades de investigación y el procesamiento primario de los productos\nprovenientes de dicha actividad.", "resumen": "- Cooperativas de Producción Acuícola. Son Cooperativas de Producción Acuícola aquellas en"}, {"num": "Art. 25", "ley": "RLCH", "texto": "Artículo 25.- Cooperativas de Producción Agropecuaria. Son Cooperativas\nde Producción Agropecuaria aquellas cuyas actividades principales en la\ncombinación de la agrícola y pecuaria.", "resumen": "- Cooperativas de Producción Agropecuaria. Son Cooperativas de Producción Agropecuaria aqu"}, {"num": "Art. 26", "ley": "RLCH", "texto": "Artículo 26.- Cooperativas de Producción Artesanal. Son Cooperativas de\nProducción Artesanal aquellas cuyas actividades principales son la producción,\nrecolección, reparación, transformación y comercialización de bienes, realizadas\nmediante un proceso de intervención manual.", "resumen": "- Cooperativas de Producción Artesanal. Son Cooperativas de Producción Artesanal aquellas "}, {"num": "Art. 27", "ley": "RLCH", "texto": "Artículo 27.- Cooperativas de Producción Industrial. Son Cooperativas de\nProducción Industrial aquellas que tienen por finalidad la transformación de\nmaterias primas, fundamentalmente mediante procesos mecanizados y su\ncomercialización.", "resumen": "- Cooperativas de Producción Industrial. Son Cooperativas de Producción Industrial aquella"}, {"num": "Art. 28", "ley": "RLCH", "texto": "Artículo 28.- Cooperativas de Producción Agroindustrial. Son Cooperativas\nAgroIndustriales aquellas cuya actividad agraria es la de producir materias\nprimas y procesarlas. La producción de las CooperativasAgro-Industriales puede ser:\na) Agro-Industria de primer grado; siendo aquella que produce materia prima\nde origen agropecuario, forestal, pesquero o proveniente de la explotación\nde cualquier recurso natural renovable, de modo que el proceso de producción\nhasta la elaboración de productos agroindustriales finales, forman una\ncadena de métodos y sistemas destinados a tales fines;\nb) Agro-industria, de segundo grado; es aquella en donde las actividades de\nfomento, financiación, procesamiento y comercialización las realizan\ndiferentes personas, por lo cual no existe un proceso en cadena, efectuado\npor la misma Cooperativa; y,\nc) Agro-forestal, es aquella en donde las actividades de protección, restauración,\nconservación, fomento y comercialización las realizan los afiliados, por la\nactividad de manejo sostenible de los bosques y el aprovechamiento de\nproductos maderables y no maderables.\nSECCION IV\nDE LAS COOPERATIVAS DE SERVICIOS", "resumen": "- Cooperativas de Producción Agroindustrial. Son Cooperativas AgroIndustriales aquellas cu"}, {"num": "Art. 29", "ley": "RLCH", "texto": "Artículo 29.- Clases de Cooperativas de Servicios. Las Cooperativas de\nServicio, entre otras, pueden ser de las clases siguientes:\na) Ahorro y Crédito;\nb) Transporte;\nc) Consumo;\nd) Profesionales;\ne) Salud;\nf) Educación;\ng) Vivienda;\nh) Comercialización;\ni) Escolares y Juveniles; y,\nj) Otras que autorice el CONSUCOOP.\n\n56", "resumen": "- Clases de Cooperativas de Servicios. Las Cooperativas de Servicio, entre otras, pueden s"}, {"num": "Art. 30", "ley": "RLCH", "texto": "Artículo 30.- Cooperativas de ahorro y crédito. Las cooperativas de ahorro\ny crédito, son las constituidas para brindar servicios financieros de carácter\nsolidario, en forma libre y voluntaria para satisfacer necesidades comunes de sus\nafiliados y de responsabilidad social con su comunidad. Su funcionalidad\nse desarrolla dentro de los principios y valores cooperativos mundialmente\naceptados, cumpliendo las disposiciones legales vigentes que regulan la\nactividad financiera en el país.", "resumen": "- Cooperativas de ahorro y crédito. Las cooperativas de ahorro y crédito, son las constitu"}, {"num": "Art. 31", "ley": "RLCH", "texto": "Artículo 31. Cooperativas de Transporte. Definición y Clases. Las\nCooperativas de Transporte son aquellas constituidas para prestar el servicio de\ntransporte de personas o bienes, ya sea por vía aérea, terrestre, fluvial o marítima.\nEstas pueden ser de propietarios o de trabajadores.", "resumen": "Cooperativas de Transporte. Definición y Clases. Las Cooperativas de Transporte son aquell"}, {"num": "Art. 32", "ley": "RLCH", "texto": "Artículo 32.- Cooperativas de Propietarios. Son aquellas en las cuales sus\nAfiliados(as), conductores profesionales mantienen la propiedad de los vehículos\ndestinados al servicio.\nLas Cooperativas de propietarios pueden ser de caja común o de caja individual.", "resumen": "- Cooperativas de Propietarios. Son aquellas en las cuales sus Afiliados(as), conductores "}, {"num": "Art. 33", "ley": "RLCH", "texto": "Artículo 33.- Cooperativas de Propietarios de cuenta de Caja común. Son\naquellas en las cuales la recaudación por concepto de la prestación del servicio,\nintegra un fondo común repartible entre los Afiliados(as), una vez deducidos los\ngastos generales y de conformidad con el mecanismo de devolución aprobado\npor la Asamblea General.", "resumen": "- Cooperativas de Propietarios de cuenta de Caja común. Son aquellas en las cuales la reca"}, {"num": "Art. 34", "ley": "RLCH", "texto": "Artículo 34.- Cooperativas de Propietarios de cuenta de Caja Individual.\nSon aquellas en las cuales sus Afiliados(as), conductores o choferes profesionales,\nson propietarios individuales de no más de un vehículo en la Cooperativa,\nadministrándolos y conduciéndolos personalmente, salvo quienes no puedan\nhacerlo por exceso de la jornada diaria de trabajo, razones de edad, incapacidad\nfísica o mental sobreviniente, enfermedad, impedimento legal o calamidad\ndoméstica debidamente justificada, en cuyos casos pueden contratar\nconductores o choferes asalariados.", "resumen": "- Cooperativas de Propietarios de cuenta de Caja Individual. Son aquellas en las cuales su"}, {"num": "Art. 35", "ley": "RLCH", "texto": "Artículo 35.- Cooperativas de Trabajadores. Son aquellas en las cuales la\ntotalidad de vehículos y bienes muebles e inmuebles son propiedad de la\nCooperativa y sus Afiliados(as) son las personas que trabajan en la organización,\nen cualquiera de sus áreas administrativas u operacionales.", "resumen": "- Cooperativas de Trabajadores. Son aquellas en las cuales la totalidad de vehículos y bie"}, {"num": "Art. 36", "ley": "RLCH", "texto": "Artículo 36.- Permisos de Operación en las Cooperativas de Propietarios.\nLos permisos de operación en las Cooperativas de Propietarios, contratos,\nconcesiones o autorizaciones para la prestación del servicio de transporte,\ndeben únicamente concederse a favor de las Cooperativas y no individualmente\na sus Afiliados(as).\nSe prohíbe la transferencia de los derechos sobre permisos de operación o\ncontratos de explotación de rutas, frecuencias, cupos, o similares, a cualquier\ntítulo y bajo cualquier figura jurídica.", "resumen": "- Permisos de Operación en las Cooperativas de Propietarios. Los permisos de operación en "}, {"num": "Art. 37", "ley": "RLCH", "texto": "Artículo 37.- Venta de Unidades de Transporte. Las Cooperativas de\nTransporte deben conservar la propiedad de las unidades hasta su disolución y\nliquidación. No obstante pueden vender unidades de transporte, que por su\nobsolescencia ya no presten ningún servicio o con el objeto de comprar nuevas\nunidades o cumplir con algunas obligaciones, esto último previa autorización de\nla Asamblea General.", "resumen": "- Venta de Unidades de Transporte. Las Cooperativas de Transporte deben conservar la propi"}, {"num": "Art. 38", "ley": "RLCH", "texto": "Artículo 38.- Cooperativas de Consumo. Son Cooperativas de Consumo\naquellas que tienen por finalidad adquirir o vender a sus Afiliados(as) y a la\ncomunidad, bienes de uso y de consumo para satisfacer necesidades\npersonales, familiares o de trabajo.\n\n57", "resumen": "- Cooperativas de Consumo. Son Cooperativas de Consumo aquellas que tienen por finalidad a"}, {"num": "Art. 39", "ley": "RLCH", "texto": "Artículo 39.- Actividades de las Cooperativas de Consumo. Para el logro\nde sus objetivos las Cooperativas de Consumo pueden dedicarse a:\na) La compra y venta de artículos de consumo;\nb) Celebrar contratos de suministro, en condiciones ventajosas tanto de\nvíveres, combustibles como de toda clase de productos o servicios; y\nc) Distribución de artículos o prestación de servicios, estableciendo en su caso,\ntiendas de venta o sucursales.", "resumen": "- Actividades de las Cooperativas de Consumo. Para el logro de sus objetivos las Cooperati"}, {"num": "Art. 40", "ley": "RLCH", "texto": "Artículo 40.- Cooperativas de Profesionales. Son Cooperativas de\nProfesionales las integradas por personas naturales que se dedican al ejercicio\nde profesiones independientes y que tienen por objeto la prestación de servicios\ntécnicos, consultoría, asesoría y asistencia, entre otras actividades.", "resumen": "- Cooperativas de Profesionales. Son Cooperativas de Profesionales las integradas por pers"}, {"num": "Art. 41", "ley": "RLCH", "texto": "Artículo 41.- Cooperativa de Salud. Se entiende por Cooperativa de Salud\naquellas organizadas por los consumidores o servidores de servicios médicos y\nfarmacéuticos para el mantenimiento óptimo de la salud y la prevención de\nenfermedades.\nPueden operar bajo las normativas legales vigentes tales como: laboratorios\nfarmacéuticos, farmacias, hospitales o clínicas bajo cualquier título e inclusive\nsubcontratar servicios profesionales.", "resumen": "- Cooperativa de Salud. Se entiende por Cooperativa de Salud aquellas organizadas por los "}, {"num": "Art. 42", "ley": "RLCH", "texto": "Artículo 42.- Cooperativas de Educación. Son Cooperativas de Educación\nlas que tienen por objeto la prestación de servicios orientados al desarrollo cultural\ny académico de sus Afiliados(as) y a la comunidad.", "resumen": "- Cooperativas de Educación. Son Cooperativas de Educación las que tienen por objeto la pr"}, {"num": "Art. 43", "ley": "RLCH", "texto": "Artículo 43.- Cooperativas de Comercialización. Son Cooperativas de\nComercialización las que tienen por objeto la adquisición de productos finales o\nintermedios, producidos por sus Afiliados(as) o la comunidad, con el fin de\nvenderlos en el mercado nacional o internacional, mediante la realización de\nactividades de captación y clasificación, empaque, elaboración, almacenaje o\nventa y transporte.", "resumen": "- Cooperativas de Comercialización. Son Cooperativas de Comercialización las que tienen po"}, {"num": "Art. 44", "ley": "RLCH", "texto": "Artículo 44.- Cooperativas de Centros Educativos. Las Cooperativas de\nCentros Educativos deben tener como objetivos específicos los siguientes:\na) Desarrollar aptitudes, estimular hábitos sanos o inducir a sus Afiliados(as) a\nbasarse en el esfuerzo propio y ayuda mutua para solucionar sus problemas\ncomunes;\nb) Formar en el alumno el conocimiento teórico–práctico del cooperativismo;\nc) Desarrollar conocimientos, habilidades y destrezas en relación a la\norganización y dirección de Cooperativas, gestión empresarial y trabajo\ncolectivo;\nd) Fomentar el espíritu de cooperación en los educadores, padres de familia,\nmediante actividades de producción, consumo, ahorro y crédito y otras que\nestablezca su Estatuto;\ne) Contribuir a la consolidación de una firme conciencia Cooperativa que\nposibilite la posterior integración de los alumnos Afiliados(as) a las Cooperativas\nde centro educativos u otras Cooperativas del movimiento; y,\nf) Promover en los educadores una actitud de compromiso con la\ntransformación y humanización de su medio de vida.", "resumen": "- Cooperativas de Centros Educativos. Las Cooperativas de Centros Educativos deben tener c"}, {"num": "Art. 45", "ley": "RLCH", "texto": "Artículo 45. Representante legal de las Cooperativas de Centros Educativos.\nPara efecto de los actos administrativos y de representación legal de las\nCooperativas de Centros Educativos, el menor de edad que ostente un cargo\ndirectivo se considera habilitado de edad. El CONSUCOOP reglamentará las\nactividades de centros educativos.\nLas Cooperativas de Centros Educativos deben ser administradas por los\nmismos alumnos o jóvenes Afiliados(as), bajo la orientación y responsabilidad de\nsus educadores y directores del centro educativo.", "resumen": "Representante legal de las Cooperativas de Centros Educativos. Para efecto de los actos ad"}, {"num": "Art. 46", "ley": "RLCH", "texto": "Artículo 46.- De las Cooperativas de Vivienda. Por Cooperativas de Viviendas\nse entiende aquellas organizadas por personas naturales para proveerse de un\nhogar propio.\nLas Cooperativas de Vivienda pueden adquirir bienes raíces y otros tales como\nmateriales y equipos de construcción para el uso individual y/o Colectiva de sus\nAfiliados(as).\nTodo Afiliado(a) de una Cooperativa de Vivienda está obligado a vivir en la casa\nadquirida, si la propiedad es individual puede transferir el título de propiedad, con\nel acuerdo previo de la Junta Directiva.\nCuando la Cooperativa de Vivienda sea de propiedad horizontal, la adjudicación\nde los departamentos se debe realizar por sorteo y las vacantes a nuevos\nAfiliados(as) es función de la Junta Directiva. A tal fin el Estatuto de cada Cooperativa\ndebe establecer las normas y reglas pertinentes.\nEn caso de fallecimiento del Afiliado(a), los herederos pueden optar por continuar\nen el uso y goce de la vivienda, en cuyo caso subrogarán al causante en todos\nsus derechos y obligaciones, debiendo designar a uno de ellos como Afiliado(a)\nbeneficiario(a).", "resumen": "- De las Cooperativas de Vivienda. Por Cooperativas de Viviendas se entiende aquellas orga"}, {"num": "Art. 47", "ley": "RLCH", "texto": "Artículo 47.- Cooperativas de Actividades Mixtas. Las Cooperativas que\ndecidan dedicarse a nuevas actividades en adición a las que realizan, si están\nautorizadas para ello desde su reconocimiento oficial pueden hacerlo, limitándose\núnicamente a notificar tal decisión anticipadamente al CONSUCOOP, con su\nplan de operaciones y la fecha de inicio de las mismas.\nSECCION V\nDE LAS COOPERATIVAS DE AHORRO Y CRÉDITO", "resumen": "- Cooperativas de Actividades Mixtas. Las Cooperativas que decidan dedicarse a nuevas acti"}, {"num": "Art. 48", "ley": "RLCH", "texto": "Artículo 48.- Normativas Prudenciales: El CONSUCOOP dirigirá la\nsupervisión del sistema cooperativo de ahorro y crédito, bajo normativas\nprudenciales conforme a lo dispuesto en el artículo 103 literal d) de la Ley, siendo\nentre otras, las siguientes:\na) Normas para la Evaluación y Clasificación de Inversiones, en las cuales se\nconsiderarán los tipos de inversión, límites de concentración y niveles de\nautorización, así como los de diversificación;\nb) Normas para la Evaluación y Clasificación de Cartera de Créditos mediante\nlas cuales se evalúe y clasifique el riesgo asumido y se determine el grado\nde deterioro de las operaciones de crédito y se constituyan oportunamente\nlas reservas respectivas;\nc) Normas para la Administración de Activos Eventuales que incluirá como\nmínimo los procedimientos de adquisición, registro, venta y uso propio;\nd) Normas para el otorgamiento de créditos a partes relacionadas por propiedad\ny gestión;\ne) Normas relacionadas con el cumplimiento de indicadores financieros y de\ngestión para evaluar el desempeño financiero de éstas;\nf) Normas relacionadas con la remisión y acceso a la Central de Información\nCrediticia (CIC), públicas o privadas;\ng) Normas relacionadas con registros contables, elaboración, presentación,\nremisión, así como lo relativo a los medios y plazos para su publicación;\nh) Normas relacionadas con Gobierno Cooperativo que incluirá las definiciones,\nrequisitos mínimos de gobierno, valores y estrategias, funcionamiento y\nresponsabilidades de Asamblea de Cooperativistas, Junta Directiva, Junta\nde Vigilancia, comités, funcionamiento del sistema de control interno,\nrevelación y transparencia así como lo referente a grupos de interés y\nrégimen de sanciones;\ni) Normas que regulen y limiten el buen funcionamiento de aquellas cooperativas\nque por su nivel de activos no permita cubrir los costos de una gran estructura\nadministrativa, pero quienes si deben nombrar al menos a un Tesorero, un\nAdministrador o Gerente General o quien haga sus veces.\nj) Normas relacionadas con la administración integral de riesgos que incluirá\ncomo mínimo definiciones, sistema de administración de riesgos,\nresponsabilidad de la Junta Directiva, Junta de Vigilancia, Gerencia General,\nconstitución y funcionamiento del Comité de Riesgos y de la Unidad\nde Administración de Riesgos, contenido y presentación de informe\nde riesgo y memoria anual, contenido en el manual y políticas de administración\nde riesgos;\nk) Normas relacionadas con la administración de tecnologías de información y\ncomunicaciones;\nl) Normas para la prevención y detección del lavado de activos y financiamiento\ndel terrorismo, con el propósito de que las mismas implementen políticas,\nprocedimientos específicos y metodologías para la identificación de los\ncooperativistas que hacen uso de los servicios y productos que prestan, así\ncomo el mantenimiento, disponibilidad de registros y notificación a de\ntransacciones financieras y sospechosas;\nm) Normas en materia de transparencia financiera, promoción de la cultura\nfinanciera y atención de las reclamaciones o consultas que presenten los\ncooperativistas;\nn) Normas Mínimas para el funcionamiento de Auditoría Interna, requisitos e\nimpedimentos, plan anual de trabajo y contenido mínimo y presentación de\nlos informes de auditoría interna;\no) Normas relacionadas con la disolución, liquidación, fusión, incorporación y\ntransformación; y\np) Normas relacionadas con el Balance Social.", "resumen": "- Normativas Prudenciales: El CONSUCOOP dirigirá la supervisión del sistema cooperativo de"}, {"num": "Art. 49", "ley": "RLCH", "texto": "Artículo 49.- Solvencia Patrimonial. Las cooperativas deberán determinar\ny cumplir con un índice de solvencia, el cual será establecido en las normas\nemitidas por el Consejo Nacional Supervisor de Cooperativas (CONSUCOOP),\nconsiderando para tal efecto el capital en riesgo y el capital institucional\nregistrado por las cooperativas.", "resumen": "- Solvencia Patrimonial. Las cooperativas deberán determinar y cumplir con un índice de so"}, {"num": "Art. 50", "ley": "RLCH", "texto": "Artículo 50. Incumplimiento del índice de solvencia. En el caso que la\ncooperativa no cumpla con el índice de solvencia, la Junta Directiva y\nGerencia General de la cooperativa, debe presentar un plan de adecuación\npara lograr y mantener el índice de solvencia requerido, asimismo\nlos excedentes obtenidos durante el ejercicio económico afectado, serán\ncapitalizados para fortalecer el patrimonio de las cooperativas.", "resumen": "Incumplimiento del índice de solvencia. En el caso que la cooperativa no cumpla con el índ"}, {"num": "Art. 51", "ley": "RLCH", "texto": "Artículo 51.- Constitución del capital en riesgo. El patrimonio de las\ncooperativas estará constituido por el capital en riesgo, integrado por las\naportaciones obligatorias y extraordinarias así como por el capital\ninstitucional integrado por las reservas técnicas, legales y voluntariamente\nconstituidas.\n\n60", "resumen": "- Constitución del capital en riesgo. El patrimonio de las cooperativas estará constituido"}, {"num": "Art. 52", "ley": "RLCH", "texto": "Artículo 52.- Fondo de Estabilización. Las Cooperativas de ahorro y crédito\ndeberán mantener recursos financieros como fondo de estabilización, constituido\ncomo un mecanismo de asistencia transitoria de liquidez, los cuales deberán\nserinvertidos en instituciones calificadas de acuerdo a las normas que emita el\nCONSUCOOP.\nEl Fondo de Estabilización, puede ser utilizado como prestamista de última\ninstancia, para efecto de cubrir iliquidez transitoria de la Cooperativa; la cooperativa\nestá autorizada a utilizar un porcentaje no mayor del 50% del fondo, el cual debe\nser pagado en un plazo no mayor de noventa (90) días.\nLa Cooperativa previamente debe de solicitar por escrito a la superintendencia\nde ahorro y crédito del CONSUCOOP, la no objeción de este proceso, quien\ndeberá pronunciarse en un término no mayor de diez (10) días hábiles, el silencio\nde la Superintendencia se tomará sin objeción al mismo.", "resumen": "- Fondo de Estabilización. Las Cooperativas de ahorro y crédito deberán mantener recursos "}, {"num": "Art. 53", "ley": "RLCH", "texto": "Artículo 53.- Cuenta mancomunada. Un afiliado de una cooperativa de\nahorro y crédito, podrá designar a cualquier persona o personas para ser\npropietaria de una cuenta de ahorro mancomunada de esa cuenta; en caso de\nmuerte del cooperativista y los valores acumulados en sus aportaciones y\nahorros diferentes a la cuenta mancomunada serán entregados al beneficiario\ndescrito en la solicitud de ingreso o en su defecto a los herederos legales.", "resumen": "- Cuenta mancomunada. Un afiliado de una cooperativa de ahorro y crédito, podrá designar a"}, {"num": "Art. 54", "ley": "RLCH", "texto": "Artículo 54.- Cuentas inactivas. La cooperativa pueda declarar abandonadas\nlas cuentas inactivas en los casos siguientes:\na) Si no ha habido actividad en la cuenta de aportaciones o depósito de un\nafiliado por un año o más, la Junta Directiva podrá imponerle un cargo de\nmantenimiento razonable. La cooperativa previamente, debe realizar todas\nlas acciones pertinentes, para avisar al afiliado de esta acción, en la última\ndirección conocida o en su defecto por un medio de comunicación escrito o\nradial, permitiéndole al menos treinta (30) días calendario para retirar los\nvalores o activar su cuenta La cooperativa deberá mantener un registro de\ncontabilidad separado de todas estas cuentas.\nb) Las cuentas de aportaciones y depósitos, excedentes, intereses y otras\nsumas adeudadas a un afiliado y tenidas por la cooperativa, pueden consid\u0002erarse abandonadas, a menos de que el propietario haya contactado a la\ncooperativa de ahorro y crédito en persona o por escrito dentro del periodo\nprescrito.\nc) La Junta Directiva podrá acreditar los fondos abandonados a las reservas\nque señala el", "resumen": "- Cuentas inactivas. La cooperativa pueda declarar abandonadas las cuentas inactivas en lo"}, {"num": "Art. 81", "ley": "RLCH", "texto": "artículo 81-A de la ley; después de esto, ningún excedente o\ninterés se acumulará a las cuentas abandonadas y podrán excluirse al\nafiliado.\nd) El Afiliado(a) o su representante podrá reclamar los fondos abandonados a\ntravés de un proceso judicial o extrajudicial apropiado, reclamo que deberá\nrealizarse en el término de dos años, después de que la cooperativa haya\nacreditado las mismas a la cuenta contable respectiva.", "resumen": "A de la ley; después de esto, ningún excedente o interés se acumulará a las cuentas abando"}, {"num": "Art. 55", "ley": "RLCH", "texto": "Artículo 55.- Compensación de cuentas. La Cooperativa tiene un primer\ngravamen o derecho preferente sobre aportaciones, saldos de cuenta de ahorro\ny a plazo, y sobre cualquier excedente o interés pagadero al afiliado(a) o a sus\nbeneficiarios (as), por cualquier deuda con la Cooperativa, como deudor o co-ga\u0002rante de un préstamo o por cualquier otra obligación. Pudiendo compensar\ncualquier suma acreditada o pagadera a un afiliado que esté en mora o negarse\na permitir retiros de cualquier cuenta de aportaciones o depósitos, cuando el\ntitular de la cuenta presenta mora de sus obligaciones; cuando dicha obligación\nhaya sido establecido en el contrato.\nCAPITULO II\nDE LOS COOPERATIVISTAS\nSECCION I\nDEFINICION Y REQUISITOS", "resumen": "- Compensación de cuentas. La Cooperativa tiene un primer gravamen o derecho preferente so"}, {"num": "Art. 56", "ley": "RLCH", "texto": "Artículo 56.- Requisitos para ser Afiliado(a). Sin perjuicio de los requisitos\nque establezca el Estatuto de cada Cooperativa, la persona interesada a afiliarse\na una Cooperativa, debe:\na) Presentar por escrito solicitud de ingreso dirigida a la Junta Directiva;\nb) Presentar sus documentos personales;\nc) Pagar una cuota de ingreso no reembolsable, la cual debe ser establecida\nen el estatuto; y,\nd) Presentar declaración de beneficiarios(as).\nLa Junta Directiva puede delegar en la administración, la facultad de revisar\ny analizar las solicitudes de ingreso y renuncia de cooperativistas, debiendo\nésta, rendir informe mensual a la Junta Directiva para su conocimiento y\nvalidación.", "resumen": "- Requisitos para ser Afiliado(a). Sin perjuicio de los requisitos que establezca el Estat"}, {"num": "Art. 57", "ley": "RLCH", "texto": "Artículo 57.- Afiliación de Personas Jurídicas. Las personas jurídicas\nreferidas en el Artículo 72 de la Ley, deben presentar para su afiliación a una\nCooperativa, los siguientes documentos:\na) Personería jurídica;\nb) Estatuto social o documento equivalente;\nc) Certificación del acta de Junta Directiva en donde conste la decisión de\nafiliarse a la Cooperativa;\nd) Certificación del punto acta de la Junta Directiva, que acredite la persona\nque ostenta la representación legal de conformidad a su Estatuto;\ne) Constancia de inscripción de la Junta Directiva en la Unidad de Registro y\nseguimiento de Sociedades Civiles ( URSAC) o su equivalente;\nf) Documentos personales del representante legal; y,\ng) Otros que establezca el Estatuto de la Cooperativa, por el tipo de actividad\nde que se trate.\nLas personas jurídicas de derecho público así como las MIPYMES deben\nigualmente cumplir con las formalidades establecidas en la Ley, en todo\ncuanto fueren pertinentes. Las Cooperativas de ahorro y crédito se limitarán\na atender las MIPYME constituidas como comerciantes individuales.", "resumen": "- Afiliación de Personas Jurídicas. Las personas jurídicas referidas en el Artículo 72 de "}, {"num": "Art. 58", "ley": "RLCH", "texto": "Artículo 58.- Inhabilitación de Cooperativista. Son causales de\ninhabilitación de los derechos señalados en los artículos 76 y 77 de la Ley de\nCooperativas:\na) La mora en el pago de las aportaciones o préstamos otorgados;\nb) La suspensión de los derechos como Afiliado(a), impuesta conforme al\nEstatuto; y,\nc) Las demás que establezca el Estatuto de la Cooperativa.", "resumen": "- Inhabilitación de Cooperativista. Son causales de inhabilitación de los derechos señalad"}, {"num": "Art. 59", "ley": "RLCH", "texto": "Artículo 59.- Suspensión de Cooperativistas. Son causales de suspensión\nde Cooperativistas:\na) Negarse sin motivo justificado a desempeñar el cargo para el cual fue electo;\nb) Negarse sin motivo justificado a desempeñar comisiones que le encomiende\nla Junta Directiva;\nc) Haber sido electo directivo y estar afiliado a dos o más cooperativas del\nmismo subsector;\nd) Promover asuntos políticos-partidistas, religiosos o raciales en el seno de la\nCooperativa; y,\ne) Las demás que establezca el Estatuto.\nEn el caso establecido en el literal a) y b), la suspensión debe durar el\nequivalente al tiempo que debiere desempeñarse el cargo rehusado y en el\ncaso del inciso c), el equivalente al tiempo que no acredite la renuncia a las\notra(s) cooperativa afiliada. En el Estatuto Social podrá establecerse\nsuspensión como sanción previa a la expulsión, determinándose las causas\ny procedimientos para la aplicación de las mismas.\nLa solicitud de suspensión o expulsión de un Cooperativista puede\nformularla la Junta Directiva o la Junta de Vigilancia, presentando a la\nAsamblea General los cargos que se atribuyan y las pruebas que lo\njustifiquen.", "resumen": "- Suspensión de Cooperativistas. Son causales de suspensión de Cooperativistas: a) Negarse"}, {"num": "Art. 60", "ley": "RLCH", "texto": "Artículo 60.- Expulsión de Cooperativista. Son causales de expulsión de\nCooperativistas:\na) Conducta inapropiada, según el Código de Ética;\nb) Causar grave perjuicio material, económico o reputacional a la Cooperativa;\nc) Reincidencia en las causales de suspensión; y\nd) Las demás que establezca el Estatuto.\nCuando la gravedad de la infracción, su importancia social o económica y los\nperjuicios causados, son relevantes, la Asamblea General Ordinaria de la\nCooperativa puede expulsar sin haberse suspendido previamente al\nAfiliado(a).", "resumen": "- Expulsión de Cooperativista. Son causales de expulsión de Cooperativistas: a) Conducta i"}, {"num": "Art. 61", "ley": "RLCH", "texto": "Artículo 61.- Derecho a la Defensa. El Afiliado(a) tiene derecho a defenderse\npor sí mismo o su defensor, quien debe ser Cooperativista.\nEn caso de no estar presente, se le debe nombrar un defensor de oficio, quien\ndebe ser Cooperativista y estar presente en la Asamblea.\nRecibida y practicada la prueba propuesta y escuchados los alegatos, la\nAsamblea General debe resolver si procede o no la suspensión o exclusión.", "resumen": "- Derecho a la Defensa. El Afiliado(a) tiene derecho a defenderse por sí mismo o su defens"}, {"num": "Art. 62", "ley": "RLCH", "texto": "Artículo 62.- Recursos contra la Suspensión o Expulsión. Contra el acuerdo\nde Suspensión o Expulsión de un Cooperativista, puede recurrirse en apelación\nante el CONSUCOOP, de conformidad a lo establecido en este Reglamento.\nEl acuerdo con que se sancione a un Cooperativista surte efecto una vez que sea\nfirme la misma, por haberse agotado los recursos contra ella.\nEn caso de interponerse recurso de apelación y la sanción sea de expulsión, no\nse debe liquidar la cuenta del expulsado hasta que se resuelva el mismo,\nquedando en suspenso sus derechos y obligaciones de tipo contractual que\nestén pendientes al acordarse la expulsión. Salvo los relativos al pago de los\npréstamos que se le hayan otorgado.", "resumen": "- Recursos contra la Suspensión o Expulsión. Contra el acuerdo de Suspensión o Expulsión d"}, {"num": "Art. 63", "ley": "RLCH", "texto": "Artículo 63.- Revocación del acuerdo de Suspensión o de Expulsión de\nun Cooperativista. El CONSUCOOP, al revocar la Resolución de suspensión o\nde expulsión de un Cooperativista, debe ordenar que éste sea reintegrado\ncomo tal, con todos sus derechos y obligaciones adquiridas; al momento de\nadoptarse deben tomar las medidas necesarias para el cumplimiento de su\nmandato.\nEn el caso de las Cooperativas de Producción, donde la calidad de Cooperativista\nrequiere la aportación de trabajo, el reintegro conlleva además, una\nindemnización a favor del Cooperativista involucrado, consistente en una\ncantidad equivalente a los anticipos dejados de percibir. No obstante, en ningún\ncaso la indemnización excederá el equivalente a seis (6) meses, debiéndose\ncalcularse con base al promedio de anticipos recibidos en los últimos sesenta\n(60) días que antecedieron a la expulsión.", "resumen": "- Revocación del acuerdo de Suspensión o de Expulsión de un Cooperativista. El CONSUCOOP, "}, {"num": "Art. 64", "ley": "RLCH", "texto": "Artículo 64.- La Renuncia de un Cooperativista. La voluntad de retirarse de\nun Cooperativista es inviolable. La respectiva renuncia debe presentarse por\nescrito ante la Junta Directiva, o a quien está allá delegado, quien debe resolver\ndentro de los treinta (30) días siguientes al recibo de la misma. No obstante, en\ncasos necesarios para garantizar la estabilidad económica social de la\nCooperativa y de acuerdo a su Estatuto, ésta puede cancelar las aportaciones\ndel Cooperativista retirado, de una sola vez o en desembolsos parciales dentro\nde un período no mayor a dieciocho (18) meses.\nMientras no se les cancelen las sumas adeudadas, los Afiliados(as) deben ser\nconsiderados como acreedores de la Cooperativa, pero no pueden intervenir en\nlas Asambleas u órganos directivos para los que hayan sido electos ni en las\noperaciones sociales de ésta.\nLa devolución de los excedentes que le correspondieren, si los hubieren, debe\nefectuarse dentro de los sesenta (60) días siguientes en que la Asamblea General\nOrdinaria apruebe los Estados Financieros del ejercicio social correspondiente.", "resumen": "- La Renuncia de un Cooperativista. La voluntad de retirarse de un Cooperativista es invio"}, {"num": "Art. 65", "ley": "RLCH", "texto": "Artículo 65.- Restricción a la afiliación a más de una cooperativa. La\nexcepción que establece el artículo 74 de la ley, se limita cuando el afiliado\npertenece más de una cooperativa del mismo subsector y aspira a cargo de\nelección de Junta Directiva o vigilancia, en dichos casos, solamente debe de\nestar afiliado a la Cooperativa donde aspira a ser electo.", "resumen": "- Restricción a la afiliación a más de una cooperativa. La excepción que establece el artí"}, {"num": "Art. 66", "ley": "RLCH", "texto": "Artículo 66.- Límite de Afiliados(as). La cantidad de Afiliados(as) de la\nCooperativa es ilimitada en cuanto al máximo. Sin embargo, en atención a la\nactividad que realice, puede suspenderse provisionalmente el ingreso cuando la\ncapacidad instalada, la disponibilidad de fuentes de trabajo u otra razón\nsemejante, impidieren prestar servicios a mayor número de Afiliados(as).\nSECCIÓN II\nADMINISTRACIÓN Y VIGILANCIA", "resumen": "- Límite de Afiliados(as). La cantidad de Afiliados(as) de la Cooperativa es ilimitada en "}, {"num": "Art. 67", "ley": "RLCH", "texto": "Artículo 67.- Dirección y Administración de las Cooperativas. La dirección\ny administración de las Cooperativas está bajo la responsabilidad de la Asamblea\nGeneral, la Junta Directiva y la Gerencia, en los términos de la Ley, el presente\nReglamento y las Normas establecidas en el Estatuto.", "resumen": "- Dirección y Administración de las Cooperativas. La dirección y administración de las Coo"}, {"num": "Art. 68", "ley": "RLCH", "texto": "Artículo 68.- Elección de Junta Directiva. Corresponde a la Asamblea\nGeneral Ordinaria elegir una Junta Directiva en orden jerárquico, designando\nun(a) presidente(a), un(a) vicepresidente, un(a) secretario(a), un(a) tesorero(a),\nmás el número de vocales que establezca el Estatuto; y un suplente por\nLey; el número de integrantes titulares será impar y nunca menor a cinco (5).\nCuando haya un Gerente General o el que haga sus veces, el tesorero no\nserá obligatorio. Para darle continuidad al proceso de dirección y\nadministración, la elección de los miembros de la Junta Directiva se hará\nde forma alterna y de acuerdo a lo establecido en la Ley y Estatuto.", "resumen": "- Elección de Junta Directiva. Corresponde a la Asamblea General Ordinaria elegir una Junt"}, {"num": "Art. 69", "ley": "RLCH", "texto": "Artículo 69.- Funciones del suplente: El directivo suplente, tendrá las\nsiguientes funciones.\na) Integrarse en las sesiones de Junta Directiva o Vigilancia, para formar el\nquórum de instalación y/o resolución;\nb) Las demás que establezca el CONSUCOOP; y,\nc) Otras que se definan en el Estatuto.", "resumen": "- Funciones del suplente: El directivo suplente, tendrá las siguientes funciones. a) Integ"}, {"num": "Art. 70", "ley": "RLCH", "texto": "Artículo 70.- Sesiones de Junta Directiva. La Junta Directiva debe sesionar\nordinariamente por lo menos una vez al mes y extraordinariamente cuantas\nveces fuere necesario. Sus decisiones se deben tomar por mayoría de votos y en\ncaso de empate, se debe realizar una segunda ronda de votación, de persistir el\nempate, el Presidente debe hacer uso de su voto de calidad o desempate.", "resumen": "- Sesiones de Junta Directiva. La Junta Directiva debe sesionar ordinariamente por lo meno"}, {"num": "Art. 71", "ley": "RLCH", "texto": "Artículo 71.- Administración. La Junta Directiva debe delegar funciones\nespecíficas en los Comité de Gobierno Cooperativo y establecer sus normas de\nfuncionamiento.\nAl CONSUCOOP corresponde determinar los Comités de Gobierno Cooperativo\nque debe tener una Cooperativa, de conformidad a su actividad especial. Siendo\nobligatorio el Comité de género, de juventud, educación y que por normativas del\nCONSUCOOP sean creados.\nLas Cooperativas deben seguir los lineamientos generales que emita el\nCONAMUCOOPH y CONAJOVEN en estos temas.", "resumen": "- Administración. La Junta Directiva debe delegar funciones específicas en los Comité de G"}, {"num": "Art. 72", "ley": "RLCH", "texto": "Artículo 72.- Dirección de Comités Obligatorios. El Comité de Educación,\nserá presidido por el Vicepresidente de la Junta Directiva; El Comité de Género,\nserá presidido de preferencia por un miembro de Junta Directiva del sexo femenino\ny el Comité de Juventud por quien designe la Junta Directiva.", "resumen": "- Dirección de Comités Obligatorios. El Comité de Educación, será presidido por el Vicepre"}, {"num": "Art. 73", "ley": "RLCH", "texto": "Artículo 73.- Informes de los Comités. Los Comités deben informar de todas\nsus gestiones y actuaciones en un resumen ejecutivo en la próxima sesión de la\nJunta Directiva, poniendo a disposición de ésta copias de las actas de toda\nsesión que celebren.", "resumen": "- Informes de los Comités. Los Comités deben informar de todas sus gestiones y actuaciones"}, {"num": "Art. 74", "ley": "RLCH", "texto": "Artículo 74.- Conflicto de Intereses. Los miembros de Gobierno Cooperativo,\nque se hallan en consideración de ser portadores o titulares de un interés doble;\no sea de un interés como afiliado y de un interés extraño a tal condición,\nimponiendo la realización de uno de ellos y el sacrificio del otro; no tendrán\nderecho a discutir ni votar en acuerdos en que tengan por cuenta propia o ajena\nun interés contrario al de la Cooperativa.", "resumen": "- Conflicto de Intereses. Los miembros de Gobierno Cooperativo, que se hallan en considera"}, {"num": "Art. 75", "ley": "RLCH", "texto": "Artículo 75.- Impugnación de acto por conflicto de intereses. Se estipula\nque puede impugnarse de nulidad la decisión acordada, si el voto dado en\nuna situación de conflicto de intereses, contribuye a la formación de las mayorías\nque anteponen intereses ajenos a la Cooperativa por encima del interés\ncolectivo. Tal impugnación se impondrá a los directivos que con su voto\nhubieren violado la disposición contenida en el", "resumen": "- Impugnación de acto por conflicto de intereses. Se estipula que puede impugnarse de nuli"}, {"num": "Art. anterior", "ley": "RLCH", "texto": "artículo anterior. Así mismo se le\ndeducirán responsabilidades por los daños y perjuicios ocasionados en virtud de\nque sin su voto no se hubiera logrado la mayoría necesaria para la validez del\nacuerdo. El estatuto de la Cooperativa debe establecer los mecanismos para la\nresolución de conflictos.", "resumen": "Así mismo se le deducirán responsabilidades por los daños y perjuicios ocasionados en virt"}, {"num": "Art. 76", "ley": "RLCH", "texto": "Artículo 76.- Elección de Junta de Vigilancia. Corresponde a la Asamblea\nGeneral Ordinaria elegir una Junta de Vigilancia, designando un presidente, un\nsecretario y vocales, bajo el mismo procedimiento de elección de la Junta Directiva.\nPara darle continuidad al proceso de fiscalización, la elección de los miembros\nde la Junta de Vigilancia se hará de forma alterna y de acuerdo a lo establecido\nen el Estatuto.\n\n65", "resumen": "- Elección de Junta de Vigilancia. Corresponde a la Asamblea General Ordinaria elegir una "}, {"num": "Art. 77", "ley": "RLCH", "texto": "Artículo 77.- Organismos Complementarios de Fiscalización. La función\nde fiscalización puede ser complementada o auxiliada en áreas específicas, que\npara el fin indique la Junta de Vigilancia, pudiendo recaer en:\na) Organismos de integración del sistema cooperativo, acreditados por el\nCONSUCOOP;\nb) Organismos auxiliares de integración del Sistema Cooperativo;\nc) Auditoría Interna;\nd) Auditoría externa; y,\ne) Comisiones especiales.", "resumen": "- Organismos Complementarios de Fiscalización. La función de fiscalización puede ser compl"}, {"num": "Art. 78", "ley": "RLCH", "texto": "Artículo 78.- Dependencia de los Organismos Complementarios o\nAuxiliares de Fiscalización. Para el cumplimiento de sus funciones, los\nOrganismos Complementarios o Auxiliares dependen de la Junta de Vigilancia\nquien es competente para seleccionarlos para su contratación por la Junta Directiva.\nLa Junta Directiva no puede obstaculizar en forma alguna el funcionamiento de los\nOrganismos Complementarios o Auxiliares de Fiscalización y carece de facultades\npara separar, suspender o despedir a sus integrantes, sin la autorización de la Junta\nde Vigilancia o la Asamblea General. De presentarse conflictos de intereses su\nresolución es potestad del CONSUCOOP.", "resumen": "- Dependencia de los Organismos Complementarios o Auxiliares de Fiscalización. Para el cum"}, {"num": "Art. 79", "ley": "RLCH", "texto": "Artículo 79.- Plan Anual de Trabajo de Auditoría Interna. Para el\ncumplimiento de las disposiciones legales y normativas que rigen a las Cooperativas,\nasí como la suficiencia y efectividad del sistema de control Interno y ejecutar su\ntrabajo de conformidad con las Normas Internacionales de Auditoria, Principios de\nContabilidad Generalmente Aceptados (PCGA) y las que emita el CONSUCOOP.\nJunta de Vigilancia, debe remitir al CONSUCOOP, PlanAnual de Trabajo deAuditoría\nInterna o su propio plan, en el caso de las cooperativas de otros subsectores a más\ntardar el 31 de diciembre de cada año. El CONSUCOOP validará su cumplimiento en\nel ejercicio de sus labores de supervisión.", "resumen": "- Plan Anual de Trabajo de Auditoría Interna. Para el cumplimiento de las disposiciones le"}, {"num": "Art. 80", "ley": "RLCH", "texto": "Artículo 80.- Informe de Resultados de la Junta de Vigilancia. El resultado\nde las acciones realizadas por la Junta de Vigilancia debe hacerse de conocimiento\nde la Junta Directiva mensualmente y presentar el informe anual a la Asamblea\nGeneral. Las recomendaciones que emita la Junta de Vigilancia, deben analizarse\ncon la Junta Directiva a fin de adoptar los acuerdos convenientes al interés de la\nCooperativa.", "resumen": "- Informe de Resultados de la Junta de Vigilancia. El resultado de las acciones realizadas"}, {"num": "Art. 81", "ley": "RLCH", "texto": "Artículo 81.- Presupuesto de la Junta de Vigilancia. La Junta de Vigilancia\nde conformidad con el plan estratégico de la Cooperativa, debe elaborar su plan\noperativo anual y presupuesto los cuales deben presentarse oportunamente a la\nJunta Directiva para someterlo a la aprobación de laAsamblea General.\nLa Junta de Vigilancia goza de independencia en la administración de su presupuesto,\ny se responsabiliza por su sana ejecutoria, a cuyo efecto la Junta Directiva a través\nde laAdministración de la Cooperativa, debe brindarle el apoyo logístico que requiera.", "resumen": "- Presupuesto de la Junta de Vigilancia. La Junta de Vigilancia de conformidad con el plan"}, {"num": "Art. 82", "ley": "RLCH", "texto": "Artículo 82.- Compensación a Directivos. Los miembros de la Junta Directiva\ny Junta de Vigilancia no perciben salario por sus servicios. No obstante, cuando la\nsituación económica de la Cooperativa lo permita, pueden compensar, dietas, viáticos\no gastos fijados por la Junta Directiva en un reglamento especial.", "resumen": "- Compensación a Directivos. Los miembros de la Junta Directiva y Junta de Vigilancia no p"}, {"num": "Art. 83", "ley": "RLCH", "texto": "Artículo 83.- Disposición Común a los Órganos de Administración yVigilancia.\nLos miembros de los órganos directivos son solidariamente responsables ya sea\nadministrativa, civil o penal, por las decisiones que tomen en contravención a las\nnormas legales que rigen a las Cooperativas. Quedan exentos los directivos que\nsalvan su responsabilidad, haciendo constar en el acta respectiva. Igualmente se\nsalva de responsabilidad los ausentes.\nLa responsabilidad solidaria alcanza a los miembros de la Junta de Vigilancia por\nlos actos que ésta no hubiere objetado oportunamente, los cuales deben ser\ncalificados por el CONSUCOOP.", "resumen": "- Disposición Común a los Órganos de Administración yVigilancia. Los miembros de los órgan"}, {"num": "Art. 84", "ley": "RLCH", "texto": "Artículo 84.- Declaración de Dimitencia de Directivos. Los miembros de la\nJunta Directiva y de la Junta de Vigilancia, que habiendo sido convocados\nfaltaren a tres (3) o más sesiones consecutivas sin causa justificada o cuatro (4)\nalternas en el año de su ejercicio directivo, se consideran como dimitentes.", "resumen": "- Declaración de Dimitencia de Directivos. Los miembros de la Junta Directiva y de la Junt"}, {"num": "Art. 85", "ley": "RLCH", "texto": "Artículo 85.- Funciones del Gerente General. El Gerente General o quien\nhaga sus veces tiene las funciones siguientes:\na) Organizar y dirigir la administración de la Cooperativa en cumplimiento con\nlas normas dictadas por la Junta Directiva;\nb) Presentar al término de cada ejercicio social, un Balance General, Estado de\nResultados, el Inventario General, Liquidación Presupuestaria, cumplimiento\ndel plan estratégico y otros informes solicitados por la Junta Directiva;\nc) Presentar mensualmente informes, sobre los principales riesgos enfrentados\npor la cooperativa y las acciones adoptadas para administrarlos adecuadamente;\nd) Velar porque lo libros de contabilidad sean llevados al día y con claridad, de\nla que es directamente responsable;\ne) Asistir con voz a las sesiones de la Junta Directiva cuando para ello sea\nrequerido;\nf) Ejecutar los acuerdos de Junta Directiva y Asamblea General;\ng) Dar a los Cooperativistas las explicaciones que pidan sobre la situación de la\nCooperativa en los asuntos de su competencia;\nh) Cobrar las sumas adeudadas a la Cooperativa y hacer los pagos acordados\npor la Junta Directiva;\ni) Cumplir con las normativas y requerimientos que solicite el CONSUCOOP;\nj) Representar extrajudicialmente a la Cooperativa en aquellas transacciones\nque sean necesarias para la ejecución de las actividades y servicios de la\norganización;\nk) Notificar a la Junta Directiva el nombramiento o destitución del personal a su\ncargo;\nl) Determinar necesidades, mecanismos y opciones de financiamiento para\nque la Junta Directiva adopte las medidas del caso;\nm) Presentar mensualmente a la Junta Directiva los Estados Financieros y\notros informes que le sean solicitados;\nn) Elaborar proyectos de presupuesto, ejecutarlos y controlarlos una vez\naprobados por la Junta Directiva y la Asamblea General;\no) Elaborar y ejecutar planes de desarrollo y los planes anuales de la Cooperativa;\np) Trimestralmente, sobre el desempeño económico de la cooperativa de\nahorro y crédito a la Junta Directiva comparando ese informe con el\ncorrespondiente al trimestre anterior y con las metas previstas para dicho\nperíodo;\nq) Mensualmente, en la cooperativa de ahorro y crédito a la Junta Directiva,\nsobre los créditos otorgados y la integración por riesgo de la cartera, así\ncomo las inversiones y ventas de activos realizados;\nr) Cualquier otra información que establezca el CONSUCOOP y que debe ser\nde conocimiento de la Junta Directiva de la cooperativa; y,\ns) Otras que especifique el Manual de Organización y Funciones de la\nCooperativa.\n\n67", "resumen": "- Funciones del Gerente General. El Gerente General o quien haga sus veces tiene las funci"}, {"num": "Art. 86", "ley": "RLCH", "texto": "Artículo 86.- Caución y Nulidad de los Actos del Gerente General o el que\nhaga sus veces. El Gerente General o el que haga sus veces, no puede tomar\nposesión de su cargo sin haber rendido la caución respectiva. Son nulos los\nactos que éste realice si no cumple con tal requisito, lo que además le acarrea\nresponsabilidad civil y criminal; en caso de pérdida material en perjuicio de la\nCooperativa, la Junta Directiva es solidariamente responsable.", "resumen": "- Caución y Nulidad de los Actos del Gerente General o el que haga sus veces. El Gerente G"}, {"num": "Art. 87", "ley": "RLCH", "texto": "Artículo 87.- Clases de Caución. Clases de Caución. Los Directivos,\nGerente General o el que haga sus veces, y demás empleados que tengan firma\nautorizada y/o administren fondos; están obligados a rendir, previo a tomar\nposesión de su cargo, cualquiera de las cauciones siguientes:\na) Primera hipoteca sobre bienes inmuebles;\nb) Depósitos de dinero en la Cooperativa o a nombre de ésta en una institución\nfinanciera;\nc) Garantía de fidelidad rendida por una institución de seguros; o,\nd) Fianza solidaria.\nPara los efectos de este artículo, la Cooperativa puede aceptar como valor\nde los inmuebles el que haya asignado la oficina catastral de la municipalidad\nrespectiva o el de un avaluó practicado por un profesional certificado.\nLa Junta Directiva dentro de la póliza institucional, podrá comprender la\nfianza de los Gerentes y demás empleados o agentes que manejen o tengan\ncustodia de los fondos o bienes de la cooperativa.\nAdemás podrá contratar pólizas de seguros que protejan a los directores,\nfuncionarios, empleados, contra cualquier riesgo de responsabilidad civil en\nque incurra dicha persona en el ejercicio de sus funciones, siempre y cuando\ntal persona actúe con honestidad y buena fe, velando por el mejor interés de\nla cooperativa de ahorro y crédito.\nLa fianza solidaria puede aceptarse como caución, la cual debe ser rendida\npor persona que sea propietaria de bienes suficientes. La Cooperativa debe\ntener especial diligencia de analizar el activo y pasivo del fiador.\nEl monto de la caución debe ser establecida por la Junta Directiva, la cual no\ndebe ser mayor del 20% de la póliza de dinero y valores para las cooperativas\nde ahorro y crédito y los otros subsectores un mínimo de diez mil lempiras y\nun máximo de quinientos mil lempiras; pudiéndolo rendir bajo un Título Valor\na favor de la Cooperativa", "resumen": "- Clases de Caución. Clases de Caución. Los Directivos, Gerente General o el que haga sus "}, {"num": "Art. 88", "ley": "RLCH", "texto": "Artículo 88.- Finiquito de Solvencia al Gerente General. Para extender el\nfiniquito de solvencia al Gerente General o el que haga sus veces, la Junta Directiva\ndebe solicitar una auditoria externa de la gestión de su periodo, previo al\notorgamiento del mismo.", "resumen": "- Finiquito de Solvencia al Gerente General. Para extender el finiquito de solvencia al Ge"}, {"num": "Art. 89", "ley": "RLCH", "texto": "Artículo 89.- Contabilidad. Las Cooperativas deben establecer y mantener\nun adecuado sistema de contabilidad. El cual debe llevar y mantener en su\nestablecimiento, con registros de contabilidad debidamente organizados en\nforma íntegra, de tal manera que indique en forma clara, razonable y precisa los\nresultados de sus operaciones anuales o fracción de año, en idioma español y en\nmoneda nacional.\nLos sistemas de contabilidad y controles internos deben asegurar la contabilización\napropiada y oportuna de todas las actividades, transacciones llevados a cabo,\nque permitan ejercer un control efectivo sobre los bienes, derechos y\nobligaciones, así como producir información financiera relevante para los\nAfiliados(as), CONSUCOOP, público en general, así como para entes estatales\nque por sus funciones o atribuciones tengan interés en dicha información.\nLos libros contables de la Cooperativa son documentos públicos que deben ser\nescritos o impresos con tinta negra, nitidez y exactitud, sin borrones, tachaduras,\nalteraciones o desprendimiento de sus folios.\nAdemás, deben conservar en forma ordenada por un periodo mínimo de cinco (5)\naños, los libros de contabilidad, otros libros y registros especiales, documentos y\nen su caso los programas, subprogramas y demás registros procesados\nmediante sistemas electrónicos o de computación.", "resumen": "- Contabilidad. Las Cooperativas deben establecer y mantener un adecuado sistema de contab"}, {"num": "Art. 90", "ley": "RLCH", "texto": "Artículo 90.- Libros Legales. Las actas y operaciones deben anotarse sin dejar\nespacios en blanco. Las correcciones que procedan en los libros legales deben\nsalvarse al final del documento que se trate.\nLas Cooperativas pueden llevar sus libros legales en forma manual, en hojas\nsueltas autorizadas por el CONSUCOOP, con mecanismos de seguridad o por\nsistemas mecanizados, magnéticos, electrónicos o cualquier otro sistema\nlegalmente aceptado, este proceso aplica para los libros contables, siempre que\nel sistema que se adopte, proporcione información íntegra, veraz y confiable de\nla situación financiera de la Cooperativa.\nSECCIÓN III\nASAMBLEA GENERAL", "resumen": "- Libros Legales. Las actas y operaciones deben anotarse sin dejar espacios en blanco. Las"}, {"num": "Art. 91", "ley": "RLCH", "texto": "Artículo 91.- Asamblea General Ordinaria. Toda Cooperativa debe celebrar\npor lo menos una (1) Asamblea General Ordinaria al año, dentro de los tres (3)\nmeses siguientes a la finalización de cada ejercicio social.\nEn casos especiales debidamente justificados, el CONSUCOOP y a petición de\nla Cooperativa puede ampliar este plazo hasta un máximo de treinta (30) días\ncalendarios. El ejercicio social de toda Cooperativa es de un año y debe cerrar\nsegún su actividad.", "resumen": "- Asamblea General Ordinaria. Toda Cooperativa debe celebrar por lo menos una (1) Asamblea"}, {"num": "Art. 92", "ley": "RLCH", "texto": "Artículo 92.- Balance Social. La Junta Directiva de la Cooperativa incorporarán\nen el balance social a ser conocido y dictaminado por la Junta de Vigilancia\nen forma previa a la Asamblea General, indicadores que acreditarán el nivel\nde cumplimiento de los principios y sus objetivos sociales, en cuanto a la\npreservación de su identidad, su incidencia en el desarrollo social y comunitario,\nimpacto ambiental, educativo y cultural.", "resumen": "- Balance Social. La Junta Directiva de la Cooperativa incorporarán en el balance social a"}, {"num": "Art. 93", "ley": "RLCH", "texto": "Artículo 93.- Indicadores del Balance Social. Para la construcción de indicadores\ndel balance social deberá observar los siguientes principios:\na) Prelación del trabajo sobre el capital y de los intereses colectivos sobre los\nindividuales;\nb) Asociación voluntaria, equitativa y respeto a la identidad en general;\nc) Autogestión y Autonomía;\nd) Participación económica solidaria, y distribución equitativa de excedentes;\ne) Educación, capacitación y comunicación;\nf) Compromiso social, solidario, comunitario y ambiental; y,\ng) Indicadores que evidencien haber propiciado la apertura de espacios de\nparticipación para la juventud y las mujeres en igualdad de oportunidades.", "resumen": "- Indicadores del Balance Social. Para la construcción de indicadores del balance social d"}, {"num": "Art. 94", "ley": "RLCH", "texto": "Artículo 94.- Convocatoria a Asamblea General. LAsamblea General debe ser\nconvocada por escrito mediante acuerdo de la Junta Directiva, con la\nanticipación de por lo menos quince (15) días calendario a la celebración de\nla misma, por cualquiera de las formas siguientes:\na) Mediante un listado que pase el Secretario a los Cooperativistas;\nb) Mediante cualquier medio electrónico validable, como ser correo electrónico,\nmensaje vía teléfono móvil, redes sociales u otros;\nc) Mediante circular o publicación en un medio de comunicación escrito, radial\no televisivo de difusión nacional; y,\nd) El acuerdo de convocatoria debe ser ejecutado por el Secretario de la Junta\nDirectiva, con evidencia del hecho.", "resumen": "- Convocatoria a Asamblea General. LAsamblea General debe ser convocada por escrito median"}, {"num": "Art. 95", "ley": "RLCH", "texto": "Artículo 95.- Quórum de Presencia. Si el día y hora señalados en la\nconvocatoria no se tuviere el quórum requerido, la Asamblea General se debe\nllevar a cabo en segunda convocatoria, una hora después con los Afiliados(as)\npresentes, siempre que su número no sea menor de la mitad más uno de la\nasistencia que exige la Ley y este Reglamento para la constitución de la Cooperativa\nde que se trate. La primera y la segunda convocatoria pueden hacerse\nsimultáneamente.\nEn el aviso de convocatoria se debe informar del mecanismo de constitución en\nsegunda convocatoria. Este procedimiento es también aplicable para los casos\nque la Junta de Vigilancia convoque.\nCuando por razones de fuerza mayor calificada, sea imposible celebrar la Asamblea\nGeneral en segunda convocatoria, la Junta Directiva está obligada a convocar a\nla Asamblea General dentro de un plazo no mayor de diez (10) días calendario,\ncontados desde la fecha que se fijó en la convocatoria fallida.\nUn afiliado para ser elegible para votar en las asambleas debe ser mayor de\ndieciséis años y para ocupar un cargo directivo debe de tener mayoría de edad.\nA excepción de las cooperativas escolares.", "resumen": "- Quórum de Presencia. Si el día y hora señalados en la convocatoria no se tuviere el quór"}, {"num": "Art. 96", "ley": "RLCH", "texto": "Artículo 96.- Quórum de Resolución. Cuando la Asamblea General se\ninstale en primera convocatoria, las resoluciones se deben tomar por la simple\nmayoría de votos.En segunda convocatoria, las resoluciones se deben tomar por\nlas dos terceras partes de los Cooperativistas presentes.", "resumen": "- Quórum de Resolución. Cuando la Asamblea General se instale en primera convocatoria, las"}, {"num": "Art. 97", "ley": "RLCH", "texto": "Artículo 97.- Dirección de la Asamblea. La Asamblea General debe ser\npresidida por el Presidente de la Junta Directiva auxiliado por el Secretario de la\nmisma. En caso de conflicto de interés, de conformidad a lo establecido en el\nEstatuto de la Cooperativa o por estado de salud, que imposibilite al\nPresidente, sin que haya sustituto legal que lo supla, la Asamblea General si lo\nestima conveniente, puede nombrar como Presidente Interino a un\nCooperativista.", "resumen": "- Dirección de la Asamblea. La Asamblea General debe ser presidida por el Presidente de la"}, {"num": "Art. 98", "ley": "RLCH", "texto": "Artículo 98.- Escrutinio de la Asamblea General. El escrutinio en las\nelecciones o resoluciones de la Asamblea General debe ser realizado por el\nSecretario(a) de la Junta Directiva, con la asistencia de dos (2) personas\ndesignadas por el Presidente de la Junta Directiva.\nLos acuerdos tomados por la Asamblea General deben ser consignados en el\nacta respectiva, la que debe ser firmada por el Presidente y Secretario, una vez\naprobada y al finalizar la Asamblea General.", "resumen": "- Escrutinio de la Asamblea General. El escrutinio en las elecciones o resoluciones de la "}, {"num": "Art. 99", "ley": "RLCH", "texto": "Artículo 99.- Asamblea Sectorial y la Representación de Afiliado(a). En\nlos casos que las cooperativas tengan varias filiales en la misma ciudad o\ndepartamento, deben de convocar y realizar asamblea sectorial para elección de\ndelegados, con un número no mayor de 5 filiales.\nCada Afiliado(a) puede representar y ser representado en las Asambleas Sectoriales\no local, por un Afiliado(a) inscrito en una misma localidad o sector, dicha\nrepresentación debe constar por escrito.\n\n70", "resumen": "- Asamblea Sectorial y la Representación de Afiliado(a). En los casos que las cooperativas"}, {"num": "Art. 100", "ley": "RLCH", "texto": "Artículo 100.- Asamblea por Delegado. Para el cumplimiento del Artículo 23\ny 119E, de la Ley, la Asamblea General, ya sea ésta ordinaria o extraordinaria,\npor delegados de las Cooperativas, deben ser electos de los Afiliados presentes\nen la Asamblea, bajo el siguiente procedimiento:\na) Por lo primeros 100 afiliados, se elegirá 1 delegado por cada 10 cooperativistas;\nb) Por los siguientes 101, hasta 500 afiliados, se elegirá 1 delegado por cada\n20 cooperativistas;\nc) Por los siguientes 501, hasta 1000 afiliados, se elegirá 1 delegado por cada\n30 cooperativistas;\nd) Por los siguientes 1001, hasta 2000 afiliados, se elegirá 1 delegado por cada\n40 cooperativistas; y,\ne) De 2001 afiliados en adelante, 1 por cada 50 cooperativistas.\nSe deben elegir delegados suplentes en una proporción de uno por cada\ndiez (10) propietarios, en el orden en que hayan sido electos, para el caso de\nausencia de un delegado propietario por fuerza mayor.\nLos delegados(as) electos, pueden ser convocados a Asambleas Generales\nOrdinarias o Extraordinarias en el periodo del año, si la Junta Directiva\nconvocare por temas específicos.", "resumen": "- Asamblea por Delegado. Para el cumplimiento del Artículo 23 y 119E, de la Ley, la Asambl"}, {"num": "Art. 101", "ley": "RLCH", "texto": "Artículo 101.- Dirección de las Asambleas por Delegados. Las Asambleas\nlocales o sectoriales para elección de delegados deben ser presididas por la\nJunta Directiva, dirigidas por el Presidente o quien lo sustituya. El Secretario de\nla Junta Directiva debe levantar y leer el acta de cada Asamblea para su\ndiscusión, aprobación o improbación, además debe acreditar a los delegados\nelectos.", "resumen": "- Dirección de las Asambleas por Delegados. Las Asambleas locales o sectoriales para elecc"}, {"num": "Art. 102", "ley": "RLCH", "texto": "Artículo 102.- Regulaciones de Asamblea por Delegados. En el Estatuto\nde la Cooperativa se debe regular los requisitos para la elección de los delegados\ny tiempo en la cual se debe convocar la misma, así como otras condiciones para\nel mejor control democrático de la cooperativa.\nEn la elección de los delegados se debe observar de preferencia, el porcentaje\nde género establecido en el Artículo 109 de este reglamento.", "resumen": "- Regulaciones de Asamblea por Delegados. En el Estatuto de la Cooperativa se debe regular"}, {"num": "Art. 103", "ley": "RLCH", "texto": "Artículo 103.- Delegados de los Organismos de Integración. Los delegados\nde las Cooperativas a las Asambleas Generales de segundo grado, no pueden\nostentar más representación que la de su Cooperativa base. En la Asamblea\nGeneral de la Confederación, la representación debe recaer en un miembro de la\nJunta Directiva del Organismo de segundo grado.", "resumen": "- Delegados de los Organismos de Integración. Los delegados de las Cooperativas a las Asam"}, {"num": "Art. 104", "ley": "RLCH", "texto": "Artículo 104.- Contenido de la Agenda. La agenda de la Asamblea General\nlo debe fijar el órgano que efectúo la convocatoria. Esta debe contener los temas\nespecíficos a ser tratados en la misma.", "resumen": "- Contenido de la Agenda. La agenda de la Asamblea General lo debe fijar el órgano que efe"}, {"num": "Art. 105", "ley": "RLCH", "texto": "Artículo 105.- Modificación de la Agenda de la Asamblea General. Cinco\n(5) días antes de la realización de la Asamblea de que se trate, uno o un grupo\nde afiliado(s) o cualquiera de los órganos estatutarios con potestad para convocar\na una Asamblea General, puede solicitar por escrito y fundadamente a quien\nefectúo la convocatoria, la inclusión de otros temas.\nDespués de este plazo, no puede alterarse el orden del día.", "resumen": "- Modificación de la Agenda de la Asamblea General. Cinco (5) días antes de la realización"}, {"num": "Art. 106", "ley": "RLCH", "texto": "Artículo 106.- Disponibilidad de Documentos a ser Tratados en la Asamblea.-\nLos documentos a ser tratados en la Asamblea, y en particular, la memoria de la\nJunta Directiva, Estados Financieros auditados, dictamen y el informe de la Junta\nde Vigilancia, plan operativo anual y el presupuesto general de ingresos y\negresos, deben estar a disposición de los Afiliados(as) o delegado(s) en las\noficinas de la Cooperativa, el día siguiente de su convocatoria legal.\n\n71", "resumen": "- Disponibilidad de Documentos a ser Tratados en la Asamblea.- Los documentos a ser tratad"}, {"num": "Art. 107", "ley": "RLCH", "texto": "Artículo 107.- Derecho a Voz y Voto en la Asamblea. Tienen derecho a voz\ny voto en la Asamblea los Afiliados(as) o delegado(s) que a la fecha de la respec\u0002tiva convocatoria estén debidamente habilitados, para lo cual el Estatuto Social\ndebe regular lo pertinente sobre la materia.", "resumen": "- Derecho a Voz y Voto en la Asamblea. Tienen derecho a voz y voto en la Asamblea los Afil"}, {"num": "Art. 108", "ley": "RLCH", "texto": "Artículo 108.- Sistema de Elección de Directivos. La elección de directivos\npara integrar los órganos previstos en el Estatuto Social, debe efectuarse en\nAsamblea General Ordinaria, Esta puede verificarse por votación directa,\nnominal o secreta según lo decida la Asamblea. Serán electos los candidatos\nque obtengan la mayor cantidad de votos.\nEn el Estatuto de la Cooperativa se debe adoptar mecanismos para que el\ncambio de la Junta Directiva o vigilancia se haga parcial en cada elección.", "resumen": "- Sistema de Elección de Directivos. La elección de directivos para integrar los órganos p"}, {"num": "Art. 109", "ley": "RLCH", "texto": "Artículo 109.- Participación de la Mujer. La Asamblea General debe\nprocurar elegir para los cargos de Junta Directiva y vigilancia no menos del\ncincuenta por ciento (50%) de afiliados(as) del sexo femenino. Igual representación\nse debe garantizar en cada comité que forme la cooperativa a excepción\ndel Comité de Genero que debe estar conformado por una mayoría de mujeres.\nNo podrá ser causal de impugnación a la elección de los miembros de Junta\nDirectiva y Vigilancia aquellos casos en que los niveles de participación en las\nasambleas y cargos de elección en una Cooperativa no permitan cumplir lo\nestablecido en el párrafo anterior.", "resumen": "- Participación de la Mujer. La Asamblea General debe procurar elegir para los cargos de J"}, {"num": "Art. 110", "ley": "RLCH", "texto": "Artículo 110.- Excepción de Vacación del Cargo. Los miembros de la Junta\nDirectiva deben continuar en el desempeño de sus funciones, aunque hubiese\nconcluido el período para el que fueron electos, por las siguientes causas:\na) Cuando por causa mayor y autorizado por el CONSUCOOP, no se haya\ncelebrado Asamblea General para la elección de los nuevos miembros;\nb) Cuando habiendo sido electos los nuevos miembros, no hubieren tomado\nposesión formal de sus cargos; y,\nc) Cuando habiéndose celebrado la Asamblea General, no hubiere acuerdo\nsobre la elección de los directivos.", "resumen": "- Excepción de Vacación del Cargo. Los miembros de la Junta Directiva deben continuar en e"}, {"num": "Art. 111", "ley": "RLCH", "texto": "Artículo 111.- Traspaso de Funciones, Entrega de Sellos y Libros de Actas.\nPara el cumplimiento a lo indicado en el literal b) del Artículo anterior, los miembros\ndirectivos salientes deben celebrar en setenta y dos (72) horas posteriores\na la Asamblea General, reunión de informe sobre la situación actual de la\nCooperativa, casos importantes pendientes, entrega de sellos, libros de\nactas y cualquier documentación o bienes que por su cargo tenga en su\npoder, a los directivos entrantes. Pasado dicho término, tal acto lo debe\nrealizar el Gerente General o quien haga sus veces. Durante dicho término,\nel directivo saliente no puede tomar decisión alguna, después que sean\nelectos los nuevos directivos.", "resumen": "- Traspaso de Funciones, Entrega de Sellos y Libros de Actas. Para el cumplimiento a lo in"}, {"num": "Art. 112", "ley": "RLCH", "texto": "Artículo 112.- Órgano de Administración Provisional. El Estatuto social\npuede establecer la elección en Asamblea General de una cantidad impar de\nmiembros para conformar un órgano de administración provisional, en caso que\nresolviere la remoción de los miembros de la Junta Directiva y que por disposiciones\npropias de la Asamblea no pudiere designarse en el mismo acto a los\nreemplazantes. Este órgano provisional tiene por objetivo principal, convocar a\nuna nueva Asamblea General Ordinaria en un plazo no mayor de sesenta (60)\ndías.", "resumen": "- Órgano de Administración Provisional. El Estatuto social puede establecer la elección en"}, {"num": "Art. 113", "ley": "RLCH", "texto": "Artículo 113.- Asamblea Convocada por la Junta de Vigilancia. Cuando la\nJunta de Vigilancia lo considere necesario, puede solicitar a la Junta Directiva\nque convoque a Asamblea General.\nSi la Junta Directiva no lo hiciere dentro del término de treinta (30) días calendario\ncontados desde la fecha de recepción de la relacionada solicitud, la Junta de\nVigilancia debe acudir al CONSUCOOP; cuando la convocatoria no reuniere los\nrequisitos indicados, en cuyo caso ésta puede ser declarada nula, previa audiencia\nde los miembros de la Junta de Vigilancia.\nEste proceso será sumario y sólo son admisibles pruebas documentales.\nEs justificable la convocatoria a Asamblea por parte de la Junta de Vigilancia\ncuando el Estatuto Social o las resoluciones asamblearias sean transgredidos\npor la Junta Directiva.", "resumen": "- Asamblea Convocada por la Junta de Vigilancia. Cuando la Junta de Vigilancia lo consider"}, {"num": "Art. 114", "ley": "RLCH", "texto": "Artículo 114.- Convocatoria por Cooperativistas. Un número no inferior al\ntreinta por ciento (30%) de los Cooperativistas activos, pueden en cualquier\ntiempo solicitar por escrito a la Junta Directiva la convocatoria de una Asamblea\nGeneral, para resolver los asuntos que indiquen en su solicitud, debiendo\njustificar la misma.\nSi la solicitud fuera rechazada por la Junta Directiva o no recibiere respuesta en\nel plazo de treinta (30) días de su recepción, los solicitantes pueden\npresentarse ante el CONSUCOOP, quien correrá traslado de la misma, a la Junta\nDirectiva de la Cooperativa, dentro de los diez (10) días hábiles siguientes, a fin\nde que fundamente el rechazo u omisión dentro de los diez (10) días hábiles de\nque los directivos reciban la notificación oficial.\nVisto el descargo o vencido el plazo para presentarlo, el CONSUCOOP debe\nresolver lo pertinente admitiendo que se procesa o denegando la convocatoria.", "resumen": "- Convocatoria por Cooperativistas. Un número no inferior al treinta por ciento (30%) de l"}, {"num": "Art. 114-A", "ley": "RLCH", "texto": "Artículo 114-A.- En caso de no llevarse a cabo el procedimiento de los artículos\n113 y 114 de este reglamento, el CONSUCOOP, debe convocar a asamblea\ngeneral en cualquier tiempo, para normalizar la situación de la Cooperativa.\nSECCIÓN IV\nRÉGIMEN ECONÓMICO", "resumen": "- En caso de no llevarse a cabo el procedimiento de los artículos 113 y 114 de este reglam"}, {"num": "Art. 115", "ley": "RLCH", "texto": "Artículo 115.- Aportaciones como Haber Social. Son aportaciones las\ncantidades que los cooperativistas entregan a su Cooperativa como obligación\nestatutaria para formar el haber social. Las aportaciones estarán representadas\nen dinero. Cuando en virtud de disposición estatutaria se permita a los\nCooperativistas la aportación de su fuerza de trabajo, capacidad profesional o\nindustrial a favor de la Cooperativa, éstas se deben cuantificar en los registros\ncontables con su valor equivalente en dinero.\nLas aportaciones en las Cooperativas de cualquier tipo o grado pueden ser\nordinarias y extraordinarias. Las primeras son fijadas en el Estatuto de carácter\nobligatorio y las últimas acordadas por la Asamblea General y tiene un destino\nespecífico.\nEn las Cooperativas de Primer Grado, las aportaciones de las(los) Cooperativistas\nno serán menores a trescientos sesenta lempiras (L. 360.00) anuales; en las\nCooperativas Escolares, no serán menores a ciento veinte lempiras (L. 120.00)\nanuales.", "resumen": "- Aportaciones como Haber Social. Son aportaciones las cantidades que los cooperativistas "}, {"num": "Art. 116", "ley": "RLCH", "texto": "Artículo 116.- Aportaciones de Bienes Inmuebles. Cuando las aportaciones\nsean de bienes inmuebles, el aportante está obligado a transferir su dominio y\ndemás derechos reales a favor de la Cooperativa conforme a las disposiciones\nlegales pertinentes. El aportante responderá por la evicción y saneamiento\nconforme a las disposiciones del Código Civil relativas al contrato de Compraventa.\nLos bienes se deben justipreciar tomando como base su valor real, entendiéndose\ncomo tal el que resulte menor de la aplicación de cualquiera de las siguientes\nreglas:\na) El precio de adquisición del inmueble en las últimas transferencias de\ndominio que se hubieren realizado en los cinco (5) años que preceden al\nmomento del avalúo;\nb) El valor de la producción media anual durante los cinco (5) años inmediatos\nanteriores a la fecha del avalúo; y,\nc) El valor declarado por el dueño para efectos tributarios o la estimación oficial\nefectuada en virtud de leyes que regulen aspectos fiscales.\nEn todo caso, deben tomarse en cuenta las mejoras permanentes efectuadas\ncon posterioridad a la determinación de los precios a valores señalados. Se\nexceptúa la aplicación de este artículo a las cooperativas de ahorro y crédito\nquienes se regirán por lo dispuesto en las normas que se emitan para dicho\nsub sector.", "resumen": "- Aportaciones de Bienes Inmuebles. Cuando las aportaciones sean de bienes inmuebles, el a"}, {"num": "Art. 117", "ley": "RLCH", "texto": "Artículo 117.- Tasa de Interés Anual de las Aportaciones por Renuncia.\nLas aportaciones totalmente pagadas y que aun habiendo renunciado el\nAfiliado(a) no hayan sido retiradas antes del cierre del Ejercicio Económico\nsiguiente, devengaran una tasa de interés anual fijada por la Junta Directiva de\nla Cooperativa.", "resumen": "- Tasa de Interés Anual de las Aportaciones por Renuncia. Las aportaciones totalmente paga"}, {"num": "Art. 118", "ley": "RLCH", "texto": "Artículo 118.- Certificados o B
