<script>
const DB = [{"num": "Art. 1", "ley": "LCH", "texto": "ARTÍCULO 1.- Declárese de necesidad nacional y de interés público, la\npromoción y la protección del cooperativismo, como un sistema eficaz para el\ndesarrollo económico y social de la nación, respeto de la dignidad humana,\npropiciar la apertura de espacios de participación para la juventud y las mujeres\nen igualdad de oportunidades, fortalecimiento de la democracia, realización de la\njusticia social, defensa de los valores, derechos humanos y protección del\nambiente.”", "resumen": "- Declárese de necesidad nacional y de interés público, la promoción y la protección del c"}, {"num": "Art. 2", "ley": "LCH", "texto": "ARTÍCULO 2.- El Estado garantiza el libre desarrollo del cooperativismo y la\nautonomía de las cooperativas como entidades privadas. El\ncooperativismo constituye un sector especial, con personalidad propia dentro de\nla economía y la sociedad nacional.", "resumen": "- El Estado garantiza el libre desarrollo del cooperativismo y la autonomía de las coopera"}, {"num": "Art. 3", "ley": "LCH", "texto": "ARTÍCULO 3.- El Sector Cooperativista tendrá representación propia en los\norganismos del Estado ligados con la economía y el desarrollo nacional; cuando\nasí lo determine la ley.\n“", "resumen": "- El Sector Cooperativista tendrá representación propia en los organismos del Estado ligad"}, {"num": "Art. 4", "ley": "LCH", "texto": "ARTÍCULO 4.- Son actos cooperativos los que se realizan entre las cooperativas\ny sus afiliados (as) o por las cooperativas entre sí, en cumplimiento de su objetivo\nsocial sin fines de lucro. Los actos Cooperativos se regirán por las disposiciones\nde esta Ley.”\n\n5", "resumen": "- Son actos cooperativos los que se realizan entre las cooperativas y sus afiliados (as) o"}, {"num": "Art. 5", "ley": "LCH", "texto": "ARTÍCULO 5.- En los actos cooperativos se promoverá el mejoramiento\neconómico y social de los cooperativistas, su condición humana y su formación\nindividual y familiar, para lo cual el móvil de su realización deberá ser\nprimordialmente el servicio y no el lucro.\nTITULO II\nCOOPERATIVAS Y COOPERATIVISTAS\nCAPITULO I\nDE LAS COOPERATIVAS\nSECCION PRIMERA\nDEFINICION Y REQUISITOS", "resumen": "- En los actos cooperativos se promoverá el mejoramiento económico y social de los coopera"}, {"num": "Art. 6", "ley": "LCH", "texto": "ARTÍCULO 6.- Las cooperativas, son organizaciones autónomas de personas\nque constituidas conforme a esta Ley se han integrado voluntariamente para\nhacer frente a sus necesidades y aspiraciones económicas, sociales y culturales\ncomunes; por medio de una empresa de propiedad conjunta y democráticamente\ncontrolada.”", "resumen": "- Las cooperativas, son organizaciones autónomas de personas que constituidas conforme a e"}, {"num": "Art. 7", "ley": "LCH", "texto": "ARTÍCULO 7.- Las Cooperativas para que sean reconocidas como tales, debe\ncumplir para su organización y funcionamiento, las condiciones siguientes:\na) Contar con personalidad jurídica extendida por el Organismo Supervisor del Sector Cooperativo;\nb) Funcionar bajo los principios de: adhesión voluntaria y abierta, gestión democrática por parte de los afiliado(as), participación económica de los afiliados(as), autonomía e independencia, educación, formación e información, interés por la comunidad, protección del ambiente, equidad e igualdad en derechos y obligaciones de los cooperativistas;\nc) Funcionar con un número ilimitado de cooperativistas;\nch) Operar con recursos económicos variables y duración indefinida;\nd) Prestar, a sí misma y a los particulares, bienes y servicios, para la satisfacción de necesidades colectivas e individuales;\ne) Distribuir los excedentes sociales netos en proporción al patrocinio; después de la constitución de las reservas técnicas y legales;\nf) Pagar un interés sobre el valor de las aportaciones;\ng) Establecer en el Acta Constitutiva, el compromiso de una asignación presupuestaria en un monto no menor a los porcentajes establecidos en el Reglamento de esta Ley, para fomentar la educación cooperativista;\nh) Integrarse en los organismos de diferentes grados y naturaleza que sean necesarios para el mejor cumplimiento de sus objetivos; e,\ni) Contar con Estatutos debidamente aprobados por la Asamblea Constitutiva.”", "resumen": "- Las Cooperativas para que sean reconocidas como tales, debe cumplir para su organización"}, {"num": "Art. 8", "ley": "LCH", "texto": "ARTÍCULO 8.- Son objetivos de las cooperativas: Mejorar la condición económica, social, cultural y ambiental de los cooperativistas y de la comunidad en que actúan;\na) Aumentar el patrimonio de los cooperativistas y el nacional , mediante el incremento de la producción y la productividad, el estímulo al ahorro, la intervención, y la sana utilización del crédito;\nb) 6\nc) Aumentar la renta nacional y las posibilidades de empleo con igualdad de condiciones y oportunidades; en el uso de los recursos naturales para incrementar y diversificar la producción, productividad y la oferta exportable e impulsar el uso de técnicas compatibles con el ambiente;\nch) Estimular la iniciativa individual y colectiva, la solidaridad, auto-ayuda y el espíritu de responsabilidad en todos los estratos de la población, para la solución de sus problemas económicos y sociales, en particular y los del país en general;\nd) Coadyuvar con el Estado y sus instituciones en la elaboración y ejecución de los planes de desarrollo económicos y sociales, en particular y los del país en general;\ne) Fomentar la educación en general y principalmente cooperativista a todos los niveles a través de la formación y capacitación;\nf) Promover la investigación en cooperativismo; y,\ng) Los demás que se establezca en el Estatuto respectivo.” “", "resumen": "- Son objetivos de las cooperativas: Mejorar la condición económica, social, cultural y am"}, {"num": "Art. 8-A", "ley": "LCH", "texto": "ARTÍCULO 8-A.- La educación cooperativa entre los afiliados(as) es una prioridad de la cooperativa. Es obligación de la Junta Directiva dar cumplimiento a este principio.\nLa Asamblea General Ordinaria debe evaluar el grado de desarrollo de la\neducación cooperativa y su influencia para mejorar la formación moral y espiritual\nde los afiliados y de la comunidad, a cuyo efecto la Junta de Vigilancia debe\npresentar su dictamen sobre los logros en este campo.”\n“", "resumen": "- La educación cooperativa entre los afiliados(as) es una prioridad de la cooperativa. Es "}, {"num": "Art. 8-B", "ley": "LCH", "texto": "ARTÍCULO 8-B.- La Secretaría de Estado en el Despacho de Educación en\ncoordinación con la Confederación Hondureña de Cooperativas (C.H.C.), debe\nelaborar los programas curriculares de nivel primario, secundario y superior que\nincorporen progresivamente la enseñanza y la práctica del cooperativismo.\nPuede crear centros regionales de docentes, dirigentes y técnicos en cooperativismo.\nAsimismo la Confederación Hondureña de Cooperativas (C.H.C.) debe cooperar\nestrechamente con la Secretaría de Estado en el Despacho\nde Educación, las universidades y demás organismos afines, en la\nformulación de planes, programas de enseñanza, promoción de material didáctico\ny edición de textos especializados.”\nSECCION SEGUNDA\nCONSTITUCION Y PERSONALIDAD", "resumen": "- La Secretaría de Estado en el Despacho de Educación en coordinación con la Confederación"}, {"num": "Art. 9", "ley": "LCH", "texto": "ARTÍCULO 9.- La constitución de las cooperativas se hará en documentos privado,\nlegalmente autenticado. En las cooperativas de centros educativos, las Actas de\nConstitución serán autorizadas por el director del centro educativo respectivo, sin\nnecesidad de auténtica.", "resumen": "- La constitución de las cooperativas se hará en documentos privado, legalmente autenticad"}, {"num": "Art. 10", "ley": "LCH", "texto": "ARTÍCULO 10.- Ninguna cooperativa podrá constituirse con un número\nmenor de (12) cooperativistas, sin perjuicio de lo que establezcan el reglamento de\nesta ley, en cuanto a un número mayor para sub-sectores especiales. Y las de\nsegundo Grado se constituirán con un número no menor de 20 cooperativas.", "resumen": "- Ninguna cooperativa podrá constituirse con un número menor de (12) cooperativistas, sin "}, {"num": "Art. 11", "ley": "LCH", "texto": "ARTÍCULO 11.- La personalidad jurídica de las cooperativas nace desde la\ninscripción de su documento constitutivo en el Registro Constitutivo en el Registro\nNacional de Cooperativas.\n\nde fecha 11 de enero del 2020\n\nde fecha 11 de enero del 2020\n7", "resumen": "- La personalidad jurídica de las cooperativas nace desde la inscripción de su documento c"}, {"num": "Art. 12", "ley": "LCH", "texto": "ARTÍCULO 12.- Las cooperativas tendrán su domicilio en el lugar que se\nseñale en le documento de constitución; en su defecto, en el lugar donde tengan\nsus oficinas o establecimientos principales.", "resumen": "- Las cooperativas tendrán su domicilio en el lugar que se señale en le documento de const"}, {"num": "Art. 13", "ley": "LCH", "texto": "ARTÍCULO 13.- Las organizaciones cooperativas deben incluir en su\ndenominación social, la palabra que según el nivel de integración le\ncorresponde conforme al artículo 88 de esta ley, indicando la naturaleza de su\nactividad principal y la mención de que la responsabilidad es limitada.", "resumen": "- Las organizaciones cooperativas deben incluir en su denominación social, la palabra que "}, {"num": "Art. 14", "ley": "LCH", "texto": "ARTÍCULO 14.- Las cooperativas no adoptarán denominaciones que induzcan\na suponer un campo de operaciones distinto del previsto en el estatus, ni la\nexistencia de un propósito contrario a las prohibiciones que establece está ley.", "resumen": "- Las cooperativas no adoptarán denominaciones que induzcan a suponer un campo de operacio"}, {"num": "Art. 15", "ley": "LCH", "texto": "ARTÍCULO 15.- Las cooperativas pueden asociarse con personas de otra\ncondición jurídica, si no se desvirtúa su propósito de servicio ni se viola la ley.", "resumen": "- Las cooperativas pueden asociarse con personas de otra condición jurídica, si no se desv"}, {"num": "Art. 16", "ley": "LCH", "texto": "ARTÍCULO 16.- Son cooperativas en formación, las constituidas y no inscritas en\nel Registro Nacional de Cooperativas.\nEl período de formación no podrá ser mayor de un año, contado desde fecha de\nla suscripción del Acta constitutiva. Durante este período llevarán junto a la\ndenominación social, las palabras en “Formación” y estarán facultadas para\nejecutar actos frente a terceros. En este caso, la responsabilidad de los suscriptores\nserá solidaria.", "resumen": "- Son cooperativas en formación, las constituidas y no inscritas en el Registro Nacional d"}, {"num": "Art. 17", "ley": "LCH", "texto": "ARTÍCULO 17.- Las sociedades mercantiles en proceso de convertirse en\ncooperativas por acción y participación de sus trabajadores, tendrán los mismos\nderechos y obligaciones que las cooperativas en formación.", "resumen": "- Las sociedades mercantiles en proceso de convertirse en cooperativas por acción y partic"}, {"num": "Art. 18", "ley": "LCH", "texto": "ARTÍCULO 18.- Las Cooperativas pueden tener regionales y filiales en el\nterritorio nacional o en el extranjero, previa autorización del Organismo Supervisor\ndel Sector Cooperativo, quien debe pronunciarse en el plazo no mayor de quince\n(15) días hábiles. En caso de falta de pronunciamiento se debe entender como\notorgada la autorización. Podrán asimismo tener ventanillas u otros medios de\nprestación de servicios a sus afiliados(as), siendo la apertura de estas con simple\ncomunicación al Organismo Supervisor del Sector Cooperativo.\nPara otorgar tales autorizaciones, la cooperativa debe acreditar los requisitos\nestablecidos en la norma que se cree para tal efecto.\nEl Organismo Supervisor del Sector Cooperativo debe limitar o prohibir la apertura\nde regionales, filiales, ventanilla u otros medios de prestación de servicios,\ncuando la cooperativa solicitante presente insuficiencias de reservas u otras\nprovisiones requeridas por la Ley o que las notas a los Estados Financieros\nindiquen situaciones anómalas”.", "resumen": "- Las Cooperativas pueden tener regionales y filiales en el territorio nacional o en el ex"}, {"num": "Art. 19", "ley": "LCH", "texto": "ARTÍCULO 19.- Las cooperativas no hondureñas podrán operar en el país\ncon permiso previo del Organismo Supervisor del Sector Cooperativo, quien, para\nconcederlo, tomará en cuenta lo ordenado en la norma que se cree para tal efecto\ny la reciprocidad con el país de origen. El permiso surtirá efecto desde su inscripción\nen el Registro Nacional de Cooperativas, siempre que el Organismo Supervisor del\nSector Cooperativo haya suscrito con la autoridad supervisora del país de origen,\nun convenio de intercambio de información o un documento equivalente que permita\nla supervisión transfronteriza de sus operaciones”.\nSECCION TERCERA\nADMINISTRACION Y VIGILANCIA\n“", "resumen": "- Las cooperativas no hondureñas podrán operar en el país con permiso previo del Organismo"}, {"num": "Art. 20", "ley": "LCH", "texto": "ARTÍCULO 20.- La Dirección, Administración, Vigilancia y fiscalización interna de\nlas cooperativas se guiará bajo los principios de buen Gobierno Cooperativo y\nestará a cargo de:\na) La Asamblea General;\nb) Junta Directiva;\nc) Junta de Vigilancia; y,\nch) Gerencia General o en su defecto quien establezca sus estatutos.”", "resumen": "- La Dirección, Administración, Vigilancia y fiscalización interna de las cooperativas se "}, {"num": "Art. 21", "ley": "LCH", "texto": "ARTÍCULO 21.- La fiscalización y la vigilancia en las cooperativas estarán a cargo de la Junta de Vigilancia. Sin embargo, y de conformidad al Reglamento de esta ley en los estatutos podrán contemplarse otros organismos y mecanismos de fiscalización, sustitutivos, complementarios o auxiliares de esa junta. Las cooperativas deberán efectuar anualmente por lo menos una auditoria de sus operaciones.", "resumen": "- La fiscalización y la vigilancia en las cooperativas estarán a cargo de la Junta de Vigi"}, {"num": "Art. 22", "ley": "LCH", "texto": "ARTÍCULO 22.- La Asamblea General legalmente convocada y reunida, es la\nautoridad suprema de la cooperativa y expresa la voluntad colectiva de la misma.\nLas facultades que la ley, sus reglamentos o los Estatus no atribuyan a otro\nórgano de la cooperativa serán competencia de la Asamblea General.\n“", "resumen": "- La Asamblea General legalmente convocada y reunida, es la autoridad suprema de la cooper"}, {"num": "Art. 23", "ley": "LCH", "texto": "ARTÍCULO 23.- Las sesiones de la Asamblea General deben ser de\nafiliados(as) o delegados, sean éstas ordinarias o extraordinarias. Las normas de\nsu funcionamiento deben ser definidas en el Reglamento de la presente Ley y por\nsu propio Estatuto.”\n“", "resumen": "- Las sesiones de la Asamblea General deben ser de afiliados(as) o delegados, sean éstas o"}, {"num": "Art. 24", "ley": "LCH", "texto": "ARTÍCULO 24.- Cada Cooperativa debe realizar por lo menos una Asamblea\nGeneral Ordinaria al año, dentro de los tres (3) meses siguientes al cierre de\ncada ejercicio social para tratar los asuntos siguientes:\na) Conocer los Estados Financieros auditados y presentados por la Junta Directiva, después de oído el informe de la Junta de Vigilancia;\nb) En su caso, elegir o destituir a miembros de la Junta Directiva o Junta de Vigilancia, de acuerdo a las causales establecidas en el Reglamento de la presente Ley;\nc) Capitalizar los intereses devengados sobre las aportaciones pagadas por los cooperativistas;\nch) Aprobar sustentándolo en esta Ley, la forma de distribución de los excedentes de cada ejercicio social, si no mediare objeción del Organismo Supervisor del Sector Cooperativo;\nd) Aprobar sobre la afiliación o desafiliación a los organismos de integración;\ne) Discutir y aprobar el Plan Operativo Anual presentado por la Junta Directiva;\nf) Discutir y aprobar el Presupuesto GeneralAnual presentado por la Junta Directiva;\ng) Aprobar o improbar la expulsión de afiliado(as), luego de conocido el informe presentado por la Junta Directiva y ejercido el derecho de defensa, certificado por la Junta de Vigilancia;\nh) Ratificar o no, la suspensión de afiliados(as) efectuada por la Junta Directiva,\ni) de conformidad al procedimiento legal;\nConocer y aprobar el balance social de la cooperativa presentado por la\nJunta Directiva;\n\nde fecha 11 de enero del 2020\nj) Autorizar a la Junta Directiva fijar y firmar las bases de contratos y convenios\nen que sea parte la cooperativa, cuando el monto sea mayor al Diez por\nciento (10%) de los activos totales de la cooperativa; y,\nk) Los demás que no sean competencia de laAsamblea General Extraordinaria.”", "resumen": "- Cada Cooperativa debe realizar por lo menos una Asamblea General Ordinaria al año, dentr"}, {"num": "Art. 24-A", "ley": "LCH", "texto": "ARTÍCULO 24-A.- Son Asambleas Generales Extraordinarias las que se\nreúnen para tratar uno o más de los asuntos siguientes:\na) Modificación del documento constitutivo y el Estatuto;\nb) La enajenación de los bienes propiedad de la cooperativa, cuando sobrepase del Diez (10%) del valor de su patrimonio;\nc) La disolución voluntaria de la cooperativa, la cual debe ser justificada ante el Organismo Supervisor de Cooperativas, y,\nch) Lafusión, incorporacióno transformación de acuerdo con esta Ley, el Reglamento y el Estatuto.”", "resumen": "- Son Asambleas Generales Extraordinarias las que se reúnen para tratar uno o más de los a"}, {"num": "Art. 25", "ley": "LCH", "texto": "ARTÍCULO 25.- Serán nulos los acuerdos que tome la Asamblea General,\ncontraviniendo la ley, los Reglamentos y los Estatutos.", "resumen": "- Serán nulos los acuerdos que tome la Asamblea General, contraviniendo la ley, los Reglam"}, {"num": "Art. 26", "ley": "LCH", "texto": "ARTÍCULO 26.- La Junta Directiva está integrada por el número de miembros\nque establezca el Estatuto y un miembro más que tiene el carácter de suplente;\ndicho número debe ser impar y nunca menor de cinco (5).\nLos miembros de la Junta Directiva durarán en sus funciones tres (3) años.\nNingún cooperativista puede ser miembro de la Junta Directiva por más de tres\n(3) períodos consecutivos; en el caso de optar a un tercer periodo la votación\ndebe realizarse por las dos terceras partes de la Asamblea General sea esta en\nprimera o segunda convocatoria, en el Reglamento de esta Ley se deben adoptar\nmecanismos de elección alterna y otros procedimientos afines.\nUna vez que el directivo cese en sus funciones, no podrá ser miembro de Junta\nDirectiva o Vigilancia, hasta después de un (1) año de haber cesado de su cargo\npor cualquier motivo.”", "resumen": "- La Junta Directiva está integrada por el número de miembros que establezca el Estatuto y"}, {"num": "Art. 27", "ley": "LCH", "texto": "ARTÍCULO 27.- La representación legal de la cooperativa estará a cargo del\npresidente de la junta Directiva, quien podrá delegarla quien según dispongan los\nEstatutos.", "resumen": "- La representación legal de la cooperativa estará a cargo del presidente de la junta Dire"}, {"num": "Art. 28", "ley": "LCH", "texto": "ARTÍCULO 28.- Para ser directivo(a) se requiere:\n1. Ser hondureño(a);\n2. Mayor de edad y miembro de la cooperativa respectiva. En las cooperativas\nde centros educativos no es necesario el requisito de edad;\n3. Saber leer y escribir;\n4. Encontrarse solvente en sus obligaciones económicas y estatutarias con la\ncooperativa al momento de su elección y durante desempeñe el cargo;\n5. Haber aprobado el proceso de formación cooperativista establecido en el\nEstatuto de la cooperativa;\n6. No ser cónyuges o parientes entre sí o con miembros del Órgano de Vigilancia,\ndentro del cuarto grado de consanguinidad o segunda de afinidad a excepción\nde lo que establezca el reglamento de esta ley;\n7. No haber sido condenado por delitos que impliquen falta de probidad;\n0\n9. No ser empleado de la cooperativa; y,\n10. Los demás requisitos que se establezcan en el Estatuto de cada cooperativa,\nreglamentos referidos por esta Ley y lo que indique el Organismo Supervisor\ndel Sector Cooperativo, de acuerdo a la actividad y especialización de cada\nsub- sector.”", "resumen": "- Para ser directivo(a) se requiere: 1. Ser hondureño(a); 2. Mayor de edad y miembro de la"}, {"num": "Art. 29", "ley": "LCH", "texto": "ARTÍCULO 29.- La responsabilidad de los Directivos será solidaria y cubre:\na) La efectividad de los pagos efectuados por los cooperativistas a la cooperativa y viceversa;\nb) La autenticidad de los excedentes obtenidos o de las pérdidas sufridas por las cooperativas;\nc) La existencia de los libros sociales y la veracidad de las anotaciones hechas en los mismo; y,\nch) En general velar por el cumplimiento de las obligaciones que imponen la ley,\nlos Reglamentos y los Estatutos.\n“", "resumen": "- La responsabilidad de los Directivos será solidaria y cubre: a) La efectividad de los pa"}, {"num": "Art. 29-A", "ley": "LCH", "texto": "ARTÍCULO 29-A. Corresponde a la Junta Directiva:\na) Cumplir y hacer cumplir los acuerdos, resoluciones y disposiciones de la\nAsamblea General;\nb) Cumplir y hacer cumplir las resoluciones y disposiciones que emita el Organismo\nSupervisor del Sector Cooperativo;\nc) Tomar las medidas pertinentes para salvaguardar los intereses de la cooperativa;\nch) Mantener al día y correctamente los libros obligatorios y demás documentos\nde la cooperativa;\nd) Presentar a la Asamblea General Ordinaria los Estados Financieros del\nejercicio anterior debidamente auditados, la liquidación presupuestaria o\ncualquier otra información que deba conocer la Asamblea General;\ne) Presentar a la Asamblea General, para su conocimiento el plan estratégico\ny para su aprobación el Plan Operativo Anual y proyecto de presupuesto, así\ncomo otros documentos que requieran aprobación de ésta;\nf) Autorizar la adquisición de bienes, contratar empréstitos y constituir\ngarantías;\ng) Fijar las bases y firmar contratos y convenios en que sea parte la cooperativa,\ncuando el monto sea menor al Diez (10%) de los activos totales de ésta;\nh) Fijar la tasa de interés que devengarán anualmente las aportaciones\ntotalmente pagadas;\ni) Decidir por sí misma o en forma delegada sobre las solicitudes de ingreso o\nretiro de la cooperativa;\nj) Conocer sobre las acciones judiciales;\nk) Conferir poderes y revocarlos;\nl) Llevar los libros ordenados por la Ley y el Reglamento;\nm) Nombrar o destituir al Gerente General;\nn) Remitir a la Junta de Vigilancia para dictamen, los Estados Financieros del\nejercicio social, con treinta (30) días de anticipación a la celebración de la\nAsamblea General;\no) Nombrar comités y comisiones especiales necesarios para apoyar la gestión\ndel Gobierno Cooperativo;\np) Remitir anualmente al Organismo Supervisor del Sector Cooperativo, el\nnúmero de afiliados(as) desagregados por edad y sexo, la conformación de\ncuerpos directivos, Gerente General, Estados Financieros y otra información\nrequerida;\n\nde fecha 11 de enero del 2020\nq) Acordar la suspensión o exclusión de un cooperativista y en los casos de\nexpulsión presentar el informe respectivo a la Asamblea General, para que\nésta tome la decisión correspondiente; y,\nr) Las demás que disponga esta Ley, su Reglamento, Estatuto y el Organismo\nSupervisor del Sector Cooperativo.”", "resumen": "Corresponde a la Junta Directiva: a) Cumplir y hacer cumplir los acuerdos, resoluciones y "}, {"num": "Art. 30", "ley": "LCH", "texto": "ARTÍCULO 30.- El directivo que hiciera salvedad de su voto estará exento de\nresponsabilidad por un acto que la mayoría de los Directivos acordare. La salvedad\nse consignará obligatoriamente en el acta correspondiente.\n“", "resumen": "- El directivo que hiciera salvedad de su voto estará exento de responsabilidad por un act"}, {"num": "Art. 31", "ley": "LCH", "texto": "ARTÍCULO 31.- El Gerente General será nombrado por la Junta Directiva\nquien para entrar en el desempeño de sus funciones debe rendir caución\nsuficiente para garantizar su gestión, misma que será fijada y calificada por la\nJunta Directiva. En ningún caso un miembro de Junta Directiva o Vigilancia en\nfunciones podrá ser contratado como Gerente General, si no después de haber\ntrascurrido un (1) año de haber cesado de su cargo.”", "resumen": "- El Gerente General será nombrado por la Junta Directiva quien para entrar en el desempeñ"}, {"num": "Art. 32", "ley": "LCH", "texto": "ARTÍCULO 32.- La Asamblea General elegirá de su seno una Junta de\nVigilancia, compuesta por el número de integrantes que establezca el Estatuto y\nun miembro más que tendrá el carácter de suplente, en número impar no menor\nde tres (3) ni mayor de siete (7). Durarán tres (3) años en sus funciones y podrán\nser reelectos consecutivamente por dos períodos más.\nUna vez que el directivo cese en sus funciones, no podrá ser miembro de Junta\nDirectiva o Vigilancia, hasta después de un (1) año de haber cesado de su cargo\npor cualquier motivo.\nPara ser miembro de la Junta de Vigilancia se requerirá los mismos requisitos\nque para ser miembro de Junta Directiva.\nTanto en el caso de la Junta de Vigilancia como en el de la Junta Directiva, quien\nsea electo para sustituir a otro que no ha terminado su período, éste se elegirá\npor el tiempo que faltare para concluir el mismo.\nLa Junta de Vigilancia será solidariamente responsable con la Junta Directiva en\nlos términos establecidos en el Artículo 29, cuando hubiere omisión o negligencia\nen el cumplimiento de sus funciones”.\n“", "resumen": "- La Asamblea General elegirá de su seno una Junta de Vigilancia, compuesta por el número "}, {"num": "Art. 33", "ley": "LCH", "texto": "ARTÍCULO 33.- Sin perjuicio de las demás señaladas en esta Ley, su\nReglamento y en el Estatuto, la Junta de Vigilancia tendrá las atribuciones\nsiguientes:\na) Fiscalizar la dirección y administración de la cooperativa, a cuyo efecto sus miembros pueden asistir con voz pero sin voto, a las sesiones de la Junta Directiva. Esta fiscalización se cumplirá en forma ilimitada y permanente sobre las operaciones sociales, legales, administrativas y financieras, pero sin intervenir en la gestión administrativa;\nb) Ordenar una Auditoría Externa según los procedimientos autorizados por el Organismo Supervisor del Sector Cooperativo, por lo menos una (1) vez al año;\nc) Seleccionar al Auditor Interno y sus organismos complementarios, auxiliares o, los sustitutos de éstos;\nch) Conocer y dictaminar los Estados Financieros y emitir sus observaciones o recomendaciones a la Junta Directiva;\n2\nd) Examinar los libros y documentos cuando lo juzgue conveniente;\ne) Verificar las transacciones financieras, las disponibilidades y títulos valores,\nasí como las obligaciones y modo en que estas son cumplidas;\nf) Presentar a la Asamblea General Ordinaria un informe escrito y fundamentado\nsobre la situación económica, financiera y social de la cooperativa;\ng) Suministrar a los cooperativistas que lo requieran, información sobre las\nmaterias que son de su competencia, sin perjuicio de las restricciones\nestablecidas en la Ley;\nh) Hacer incluir en el orden del día de la Asamblea General los puntos que\nconsidere procedentes dentro del plazo previsto en el Estatuto;\ni) Dictaminar en los casos de suspensión o exclusión de cooperativistas;\nj) Vigilar que los órganos de administración acaten debidamente las leyes,\nEstatuto, Reglamentos y decisiones de la Asamblea General; y,\nk) Investigar, por sí o en forma delegada, cualquier irregularidad de orden legal,\nfinanciero o económico-administrativo que se le denuncie o detectare.\nLas recomendaciones que hiciere la Junta de Vigilancia por incumplimiento\nde esta Ley, su Reglamento, Normativas especiales emitidas por el Organismo\nSupervisor del Sector Cooperativo, el Estatuto, políticas internas y los acuerdos\nde la Asamblea General, serán de obligatorio cumplimiento por la Junta\nDirectiva, salvo lo dispuesto en el Artículo 35 de la presente Ley, relacionado\nal acto o gestión administrativa.\nEn caso de conflicto sobre el cumplimiento de las recomendaciones decidirá\nel Organismo Supervisor del Sector Cooperativo.”", "resumen": "- Sin perjuicio de las demás señaladas en esta Ley, su Reglamento y en el Estatuto, la Jun"}, {"num": "Art. 34", "ley": "LCH", "texto": "ARTÍCULO 34.- En el presupuesto anual de las cooperativas se establecerá\nuna partida para sufragar los Gastos de la Junta de Vigilancia.", "resumen": "- En el presupuesto anual de las cooperativas se establecerá una partida para sufragar los"}, {"num": "Art. 35", "ley": "LCH", "texto": "ARTÍCULO 35.- La Junta de Vigilancia no puede intervenir en los actos\nadministrativos de exclusiva competencia de la Junta Directiva y de la Gerencia.", "resumen": "- La Junta de Vigilancia no puede intervenir en los actos administrativos de exclusiva com"}, {"num": "Art. 36", "ley": "LCH", "texto": "ARTÍCULO 36.- Toda cooperativa deberá anotar sus operaciones contables\ny las actuaciones de los órganos directivos en libros, hojas u otros registros\ndebidamente autorizados por el Organismo rector del cooperativismo, conforme\na lo establecido en el Reglamento.", "resumen": "- Toda cooperativa deberá anotar sus operaciones contables y las actuaciones de los órgano"}, {"num": "Art. 37", "ley": "LCH", "texto": "ARTÍCULO 37.- Será obligatorio para las cooperativas llevar los libros siguientes:\na) Libro de Actas Asambleas General;\nb) Libro de Actas de la Junta Directiva;\nc) Libro de Actas de la Junta Vigilancia o del órgano de la fiscalización que se hubiere adoptado;\nch) Libro de Registro de Cooperativas;\nd) Libro de Aportaciones;\ne) Libro Diario General;\nf) Libro Mayor General; y Libro inventario Balances.\ng)", "resumen": "- Será obligatorio para las cooperativas llevar los libros siguientes: a) Libro de Actas A"}, {"num": "Art. 38", "ley": "LCH", "texto": "ARTÍCULO 38.- Las cooperativas estarán obligadas a exhibir sus libros o sus funcionarios del Organismo rector del; cooperativismo, autorizado para practicar revisiones y a otra personas y instituciones autorizadas por disposición de la ley o en virtud del mandato judicial igualmente para enviar la información estadísticas que requiere este mismo organismo.", "resumen": "- Las cooperativas estarán obligadas a exhibir sus libros o sus funcionarios del Organismo"}, {"num": "Art. 39", "ley": "LCH", "texto": "ARTÍCULO 39.- Las cooperativas que ofrecen bienes o servicios al público\nestarán obligadas a:\na) Participar al público por un medio de comunicación social, la iniciación de\nsus operaciones y la apertura de sus establecimientos o despachos, indicando\nlas actividades, principales de su giro, su domicilio, las direcciones\ny nombres de sus filiales y establecimientos, y los nombres de los\nrepresentantes de la cooperativas;\nb) Notificar de igual manera cualquier modificación que sufren los datos indicados\nen el numeral precedente; y\nc) Comunicar al público su disolución, liquidación y el cierre de su\nestablecimiento.\nARTÍCULO40.-", "resumen": "- Las cooperativas que ofrecen bienes o servicios al público estarán obligadas a: a) Parti"}, {"num": "Art. 40", "ley": "LCH", "texto": "Artículo 40.- Las cooperativas que solo operen con sus miembros,\ntambién están sujetas a las obligaciones establecidas en el", "resumen": "- Las cooperativas que solo operen con sus miembros, también están sujetas a las obligacio"}, {"num": "Art. anterior", "ley": "LCH", "texto": "Artículo anterior.\nSECCION CUARTA\nRECURSOS ECONOMICOS\n“", "resumen": "SECCION CUARTA RECURSOS ECONOMICOS “"}, {"num": "Art. 41", "ley": "LCH", "texto": "ARTÍCULO 41.- El patrimonio de las cooperativas será variable y podrá\nconstituirse de la forma siguiente:\na) Con las aportaciones de los cooperativistas que forman el haber social de la cooperativa, así como con los excedentes, rendimientos capitalizados y las reservas acumuladas;\nb) Con bienes muebles o inmuebles, trabajo, industria, capacidad profesional o fuerza productiva que aporten los cooperativistas;\nc) Con donaciones, herencias, legados, préstamos, créditos, derechos y privilegios que reciban de personas naturales o jurídicas; y,\nch) Con el producto de las ventas de certificados de participación y/o bonos que la Cooperativa emita. Los bonos antes mencionados devengarán el interés que fije la Junta Directiva y no serán negociables.\nd) Con los derechos, patentes, marcas de fábrica u otros intangibles de su propiedad;\ne) Con todos aquellos ingresos lícitos provenientes de las operaciones que no involucre captación de recursos económicos de terceros no afiliados(as); y,\nf) Con los recursos provenientes de donaciones producto de convenios o contratos que suscriba la Junta Directiva y que debe ser utilizados exclusivamente para el propósito y destino establecido en dicho convenio y que tenga relación con la actividad principal de la cooperativa.”", "resumen": "- El patrimonio de las cooperativas será variable y podrá constituirse de la forma siguien"}, {"num": "Art. 42", "ley": "LCH", "texto": "ARTÍCULO 42.- Las aportaciones totalmente pegadas devengarán un interés que fijará anualmente la Junta Directiva. Los intereses devengados podrán ser capitalizados total o parcialmente, por decisión de la Asamblea General.", "resumen": "- Las aportaciones totalmente pegadas devengarán un interés que fijará anualmente la Junta"}, {"num": "Art. 43", "ley": "LCH", "texto": "ARTÍCULO 43.- Se consideran excedentes los saldos que a favor de una\ncooperativa resulten de sus operaciones al final de cada ejercicio social.\n“", "resumen": "- Se consideran excedentes los saldos que a favor de una cooperativa resulten de sus opera"}, {"num": "Art. 44", "ley": "LCH", "texto": "ARTÍCULO 44.- Los excedentes se distribuirán en la forma siguiente:\na) Por lo menos un 10% para formar un fondo de reserva legal acumulable\nanualmente, no repartible y que servirá para cubrir pérdidas de acuerdo con\nla liquidez de la cooperativa en los porcentajes que establezca el reglamento\nde esta Ley, el fondo de reserva se invertirá en bonos u otros títulos de fácil\nconvertibilidad, emitidos por federaciones de cooperativas, instituciones\nbancarias o del estado;\nb) La formación de fondos especiales: requerimiento de capital y patrimonio,\nreservas para activos de riesgo y otros que establezca la Junta Directiva;\nc) Distribuciones entre los cooperativistas de acuerdo al patrocinio efectuado con la cooperativa, después de constituir la reserva legal, las requeridas por el Organismo Supervisor del Sector Cooperativo y reservas especiales aprobadas por la Asamblea General;\nch) La Asamblea General podrá acordar la capitalización total o parcial de los excedentes distribuidos y no pagados, siempre que la cooperativa cuente con los recursos que le garantice su sostenibilidad; y,\nd) Treinta (30) días hábiles antes de la celebración de la Asamblea General Ordinaria, la Junta Directiva debe poner en conocimiento del Organismo Supervisor del Sector Cooperativo el proyecto de distribución de excedentes, quien puede objetar la misma si determina que la cooperativa presenta una situación financiera inestable.” ARTICULO 45.- Los excedentes netos generados por operaciones con no afiliados, se destinarán por la cooperativa, preferentemente a programas de desarrollo cooperativista.\n“", "resumen": "- Los excedentes se distribuirán en la forma siguiente: a) Por lo menos un 10% para formar"}, {"num": "Art. 46", "ley": "LCH", "texto": "ARTÍCULO 46.- Las pérdidas anuales se deben cubrir con la Reserva Legal\ny de no ser suficiente la misma, con un porcentaje de las otras reservas patrimoniales,\nde conformidad con las disposiciones que emita el Organismo Supervisor del\nSector Cooperativo, de todo lo cual la Junta Directiva debe informar inmediatamente\na la Asamblea General Ordinaria más próxima.\nCuando una cooperativa en su Estado Financiero anual refleje pérdidas, además\nde cubrir las mismas con su reserva legal y patrimonial dentro del plazo que\nestablezca el Reglamento, está en la obligación de presentar ante el Organismo\nSupervisor del Sector Cooperativo un Plan de Estabilización Financiera, que\ncontemple:\na) Mecanismos de capitalización, constitución de las reservas, adecuación y\nsaneamiento de activos y pasivos; y,\nb) Estrategias y cronograma para lograr la estabilización y recuperación\nfinanciera.\nEn caso de liquidación de la cooperativa, las pérdidas se distribuirán entre\nlos cooperativistas, en proporción al monto de sus aportaciones.”\nSECCION QUINTA\nCLASIFICACION", "resumen": "- Las pérdidas anuales se deben cubrir con la Reserva Legal y de no ser suficiente la mism"}, {"num": "Art. 47", "ley": "LCH", "texto": "ARTÍCULO 47.- Las cooperativas serán de producción, de servicios, de\nconsumo o mixtas.\nARTICULO 48.- La cooperativa será de producción, cuando esté constituida\npor personas que se asocian para trabajar, producir, transformar y vender en\ncomún los productos que elaboran.\nARTICULO 49.- La cooperativa será de servicio, cuando esté formada por\npersonas que se asocien para la prestación de servicios al público y así mismas.", "resumen": "- Las cooperativas serán de producción, de servicios, de consumo o mixtas. ARTICULO 48.- L"}, {"num": "Art. 50", "ley": "LCH", "texto": "ARTÍCULO 50.- La cooperativa será de consumo, cuando esté formada por\npersonas que se asocian para obtener en común, bienes o servicios para ellas,\nsus hogares o sus actividades económicas y sociales.\n“", "resumen": "- La cooperativa será de consumo, cuando esté formada por personas que se asocian para obt"}, {"num": "Art. 51", "ley": "LCH", "texto": "ARTÍCULO 51.- Son mixtas las cooperativas, cuando en sus Estatutos\nestablezcan actividades múltiples como su objetivo principal.\nNo pueden constituirse como cooperativas mixtas, las cooperativas que su\nactividad principal sea el ahorro y crédito de afiliaciones abiertas. En el caso de\nlas cooperativas de afiliación limitadas o cerradas con activos mayores equivalentes\nen moneda nacional a Un Millón de Dólares de los Estados Unidos de América\n(US$1,000,000.00), deben adecuar su funcionalidad automáticamente al Capítulo\nrelativo a las cooperativas de ahorro y crédito de la presente Ley.\nEl Organismo Supervisor del Sector Cooperativo, regulará cada una de las\nactividades de las Cooperativas Mixtas, ajustándolas a los conceptos contenidos\nen los Artículos 48, 49 y 50 de la presente Ley.”", "resumen": "- Son mixtas las cooperativas, cuando en sus Estatutos establezcan actividades múltiples c"}, {"num": "Art. 52", "ley": "LCH", "texto": "ARTÍCULO 52.- Las cooperativas deberán utilizar los servicios de sus\ncooperativistas en los trabajos, obras que emprendieren y servicios que presten.\nExcepcionalmente las cooperativas de producción podrán ocupar mano de obra\nasalariada, en los casos que determine el Reglamento de esta Ley.\nARTICULO 53.- Las cooperativas de producción que empleen asalariados,\ndeberán admitirlos como cooperativistas, cuando hubieren cumplido un año\ninterrumpido de laborar para la cooperativa, siempre que los soliciten y cumplan\ncon los requisitos que al efecto dispongan los Estatutos.", "resumen": "- Las cooperativas deberán utilizar los servicios de sus cooperativistas en los trabajos, "}, {"num": "Art. 54", "ley": "LCH", "texto": "ARTÍCULO 54.- En las condiciones que disponga el Reglamento, las cooperativas\npodrán operar con no cooperativistas.", "resumen": "- En las condiciones que disponga el Reglamento, las cooperativas podrán operar con no coo"}, {"num": "Art. 55", "ley": "LCH", "texto": "ARTÍCULO 55.- Las cooperativas serán patronos cuando para el desarrollo de\nsus actividades utilicen trabajo asalariado de sus cooperativistas o terceros. Se\nexceptúan aquellas cooperativas en las que la calidad de cooperativista, requiera\nla aportación de trabajo.\nSECCION SEXTA\nREGIMEN TRIBUTARIO, PROHIBICIONES Y SANCIONES\n“", "resumen": "- Las cooperativas serán patronos cuando para el desarrollo de sus actividades utilicen tr"}, {"num": "Art. 56", "ley": "LCH", "texto": "ARTÍCULO 56.- Derogado\n“", "resumen": "- Derogado “"}, {"num": "Art. 57", "ley": "LCH", "texto": "ARTÍCULO 57.- Derogado\nARTICULO 58.- Las exoneraciones establecidas en esta Ley se entienden\npara las cooperativas de cualquier grado y sus entidades auxiliares.\nARTICULO 59.- Los cooperativistas gozaran de un crédito contra el Impuesto\nSobre La Renta que deberán pagar individualmente, en un cinco por ciento (5%)\ndel promedio anual de los ahorros y aportaciones que hubieren mantenido en las\ncooperativas, Este crédito en ningún caso excederá del límite establecido por la\nLey del Impuesto Sobre La Renta para cuentas de ahorros en bancos hondu\u0002reños.\nARTICULO 60.- Los patronos estarán obligados a deducir de los salarios de\nsus trabajadores y empleados, previa su autorización por escrito, las sumas que\npor cuotas, aportaciones o cualquier otro concepto, deban hacer efectivas como\nafiliados a sus cooperativas.", "resumen": "- Derogado ARTICULO 58.- Las exoneraciones establecidas en esta Ley se entienden para las "}, {"num": "Art. 61", "ley": "LCH", "texto": "ARTÍCULO 61.- A ninguna cooperativa le será permitido:\na) Funcionar o convertirse en sociedad mercantil o en sociedad civil;\nb) Conceder ventajas y privilegios a los iniciadores, fundadores, administradores\no dirigentes, sobre parte alguna de los recursos económicos; y,\nc) Hacer participar a personas jurídicas y de otra índole del sector comercial,\nindustrial y/o de servicio, directa o indirectamente, de los derechos y\nexenciones que esta Ley otorga a las organizaciones cooperativas de\ncualquier grado.”\nARTICULO 62.- Es prohibido el uso de emblemas, símbolos, distintivos,\nmembretes, denominaciones o vocablos como cooperativa, cooperativistas u\notros, cuando tal uso puede inducir o suponer que los usuarios de los mismos\nestán constituidos conforme a esta Ley sin estarlo.\nLa contravención de esta prohibición hará incurrir en responsabilidad civil y\ncriminal a las personas naturales o individualmente culpables, así como a los\nsocios o asociados de las personas colectivas transgresoras, como personalidad\njurídica o sin ella.\n“", "resumen": "- A ninguna cooperativa le será permitido: a) Funcionar o convertirse en sociedad mercanti"}, {"num": "Art. 63", "ley": "LCH", "texto": "ARTÍCULO 63.- Cuando en una cooperativa el Organismo Supervisor del\nSector Cooperativo determine de oficio o por denuncia comprobada, deficiencias\nadministrativas, financieras o bien que sus activos no son suficientes para\nproteger los ahorros de sus afiliados (as) y el patrimonio de la cooperativa, éste\npuede adoptar indistintamente una o más de las acciones preventivas siguientes:\na) Limitar, prohibir u ordenar el cese de actividades que hayan dado origen a la deficiencia;\nb) Ordenar la adopción y ejecución de un plan de regularización, que contenga las acciones, procedimientos, responsabilidades, metas e indicadores de medición, fechas de ejecución para solventar las deficiencias administrativas o financieras determinadas;\nc) Requerir la inmediata suspensión de uno o más miembros de la Junta Directiva,\nch) Junta de Vigilancia y empleados que sean considerados responsables de actos contrarios a los objetivos de la cooperativa; y,\nNombrar un representante del Organismo Supervisor del Sector Cooperativo\nante la Junta Directiva quien está facultado para vetar las decisiones que\nadopten los mismos. “", "resumen": "- Cuando en una cooperativa el Organismo Supervisor del Sector Cooperativo determine de of"}, {"num": "Art. 63-A", "ley": "LCH", "texto": "ARTÍCULO 63-A. A los infractores de esta Ley, de su Reglamento y normativas,\nse les aplicará por parte del Organismo Supervisor del Sector Cooperativo,\ncualquiera de las sanciones siguientes:\n1. Llamada de atención por escrito;\n2. Multas cuyo monto, se debe calcular de manera prudencial según la gravedad\nde la falta y de forma proporcional o volumen de los activos de la Cooperativa\nla que tomaran en cuenta los parámetros establecidos en este Artículo puede\nser desde un séptimo (1/7) a veinte (20) salarios mínimos;\n3. Suspensión de derechos;\n4. Inhabilitación temporal o permanente, en el caso de cooperativistas directivos\npertenecientes a la Junta Directiva, Junta de Vigilancia, Gerente General y\nAuditor Interno;\n5. Intervención temporal de la cooperativa por un período no mayor de doce (12)\nmeses; pudiendo ser ampliado por la Junta Directiva del Organismo Supervisor\ndel Sector Cooperativo;\n6. Remoción de miembros de la Junta Directiva y Junta de Vigilancia;\n7. Disolución y liquidación de la cooperativa; y,\n\nde fecha 11 de enero del 2020\n8. Remitir el expediente al Ministerio Público, para que se les deduzcan\nresponsabilidades, en el caso de existir acciones calificadas como delito.\nPara los efectos del literal 4) de este artículo los gastos de los interventores\nserán cubiertos por dicha Cooperativa.\nEl Organismo Supervisor del Sector Cooperativo debe emitir el Reglamento\nEspecial para el cumplimiento de lo dispuesto en este Artículo, considerando\nlas faltas leves, graves y muy graves”.\n“", "resumen": "A los infractores de esta Ley, de su Reglamento y normativas, se les aplicará por parte de"}, {"num": "Art. 64", "ley": "LCH", "texto": "ARTÍCULO 64.- Para la aplicación de las sanciones establecidas en el Artículo\nanterior, se debe considerar la gravedad de la infracción, su importancia social o\neconómica y los perjuicios causados.\nLa cooperativa tiene acción de repetición contra el empleado o miembro de la\nJunta Directiva o de Vigilancia que haya cometido la infracción. En todo caso el\nsupuesto infractor goza del derecho de defensa.\nEn el caso de disolución y liquidación forzosa de una cooperativa, el Organismo\nSupervisor del Sector Cooperativo debe analizar otras alternativas para efecto de\nproteger los ahorros de sus afiliados(as).”\nSECCION SEPTIMA\nDISOLUCION Y LIQUIDACION", "resumen": "- Para la aplicación de las sanciones establecidas en el Artículo anterior, se debe consid"}, {"num": "Art. 65", "ley": "LCH", "texto": "ARTÍCULO 65.- La disolución de una cooperativa puede ser voluntaria o coactiva.", "resumen": "- La disolución de una cooperativa puede ser voluntaria o coactiva."}, {"num": "Art. 66", "ley": "LCH", "texto": "ARTÍCULO 66.- Derogado\nARTICULO 67.- Se considera coactiva la disolución cuando de oficio o a instancia\nde parte, la disponga el organismo rector del cooperativismo, fundándose en\ncualesquiera de las causales siguientes:\na) Imposibilidad de realizar el fin principal de la cooperativa;\nb) Que por un año el número de cooperativistas permanezca inferior al mínimo\nlegal;\nc) Que por un año los recursos económicos sean inferiores al monto mínimo\nfijado en el Acta de Constitución;\nd) Por haber sido declarada en quiebra conforme con la Ley; y,\ne) Violaciones reiteradas a la Ley, a su Reglamento o a los Estatutos.\nARTICULO 68.- La disolución surtirá efectos a partir de la cancelación de su\ninscripción en el Registro nacional de Cooperativas.", "resumen": "- Derogado ARTICULO 67.- Se considera coactiva la disolución cuando de oficio o a instanci"}, {"num": "Art. 69", "ley": "LCH", "texto": "ARTÍCULO 69.- Disuelta la cooperativa se pondrá en liquidación en cuyo\ncaso los recursos económicos se destinaran:\n1. A satisfacer las deudas de la cooperativa y los gastos de liquidación;\n2. A pagar a los cooperativistas el valor de sus aportaciones; y,\n3. A distribuir entre los cooperativistas el excedente social, en proporción a las\naportaciones pagadas, salvo el fondo de reserva y demás fondos sociales y\nde educación, los cuales se destinarán a la Confederación Hondureña de\nCooperativas; y\n4. Las demás disposiciones del Reglamento.\n\nde fecha 11 de enero del 2020\n\n18", "resumen": "- Disuelta la cooperativa se pondrá en liquidación en cuyo caso los recursos económicos se"}, {"num": "Art. 70", "ley": "LCH", "texto": "ARTÍCULO 70.- La liquidación se hará por medio de una Comisión liquidadora\ndesignada por la Asamblea General que acuerde la disolución o por el Organismo\nRector del Cooperativismo, si aquella fuese coactiva. En el primer caso, además\nde los designados por la Asamblea, integrará la Comisión un representante de\ndicho Organismo Rector. Los liquidadores practicaran la liquidación en la forma\nprevista por esta Ley.\nCAPITULO II\nDE LOS COOPERATIVISTAS\nARTICULO 71.- Son cooperativistas las personas naturales o jurídicas\nafiliadas a una cooperativa conforme a esta Ley.", "resumen": "- La liquidación se hará por medio de una Comisión liquidadora designada por la Asamblea G"}, {"num": "Art. 72", "ley": "LCH", "texto": "ARTÍCULO 72.- Sin perjuicio de lo establecido en elArtículo anterior, las personas\njurídicas no cooperativas pueden ser afiliadas, siempre que no persigan fines de lucro.\nLos menores de edad pueden ser afiliados(as), siempre y cuando tengan un\nrepresentante o tutor. El Reglamento de la presente Ley regulará este aspecto.\nEn las cooperativas estudiantiles no se requerirá edad mínima para ser cooperativista.”\nARTICULO 73.- La calidad de cooperativista se adquiere por suscripción del\nActa Constitutiva o por admisión hecha por la Junta Directiva.\nLa responsabilidad de los cooperativistas se limita al monto de sus aportaciones.\nARTICULO 74.- Toda persona podrá pertenecer a más de una cooperativa,\nsalvo las excepciones que establezca el Reglamento.", "resumen": "- Sin perjuicio de lo establecido en elArtículo anterior, las personas jurídicas no cooper"}, {"num": "Art. 75", "ley": "LCH", "texto": "ARTÍCULO 75.- Los cooperativistas tendrán, respecto de sus cooperativas los\ndeberes siguientes;\na) Cumplir sus obligaciones sociales y pecuniarias;\nb) Hacer uso de los servicios de la cooperativa;\nc) Aceptar y desempeñar los cargos para los que fueren electos;\nch) Acatar y cumplir las resoluciones de la Asamblea General y de la Junta Directiva; y,\nd) Los demás que dispongan los Estatutos.", "resumen": "- Los cooperativistas tendrán, respecto de sus cooperativas los deberes siguientes; a) Cum"}, {"num": "Art. 76", "ley": "LCH", "texto": "ARTÍCULO 76.- En sus cooperativas, los cooperativistas tendrán los derechos\nsiguientes;\na) Igualdad de derechos con respecto a los demás miembros de a organización;\nb) Voz y voto en las reuniones y asambleas de cooperativista;\nc) Solicitar la convocatoria de la Asamblea General conforme a los Estatutos;\nch) Estar informado de los resultados de la gestión social;\nd) Impugnar conforme a la Ley, decisiones de la Asamblea General, la Junta\nDirectiva, la Junta de Vigilancia, la Gerencia o cualquier otro órgano de la\nCooperativa.\ne) Solicitar ante la Junta Directiva del organismo rector del cooperativismo la\nnormalización jurídica de la cooperativa;\nf) Designar beneficiarios que le sucedan en sus derechos patrimoniales; y,\ng) Los demás que dispongan los Estatutos.", "resumen": "- En sus cooperativas, los cooperativistas tendrán los derechos siguientes; a) Igualdad de"}, {"num": "Art. 77", "ley": "LCH", "texto": "ARTÍCULO 77.- Cada cooperativa tendrá derecho a un voto, cualquiera que\nsea el monto de sus aportaciones.\nARTICULO 78.- Ningún cooperativista podrá imponer condiciones discriminatorias\nde naturaleza alguna para el ingreso o retiro de sus cooperativistas. Sin embargo\nen interés de la estabilidad de la cooperativa, en los Estatutos se podrá incluir de\nmodo general y no en casos individuales, exigencias específicas que sean\nnecesarias para la mejor realización de los fines que aquélla persiga.\nARTICULO 79.- La persona que adquiera la calidad de cooperativista responderá\ncomo los demás de las obligaciones contraídas por la cooperativa antes de su\ningreso a la misma. Será nula toda disposición en contrario.", "resumen": "- Cada cooperativa tendrá derecho a un voto, cualquiera que sea el monto de sus aportacion"}, {"num": "Art. 80", "ley": "LCH", "texto": "ARTÍCULO 80.- La calidad de cooperativista se pierde por:\na) Fallecimiento del cooperativista o pérdida de la personalidad jurídica de la institución afiliada;\nb) Por la liquidación de la cooperativa;\nc) Por expulsión acordada en Asamblea General por las causas establecidas en los Estatutos; y,\nch) Por renuncia escrita ante la Junta Directiva; y,\nd) Por exclusión.\nLos cooperativistas que renuncien, o sean excluidos no quedan exentos de\ncumplir con sus obligaciones contraídas.”\n“", "resumen": "- La calidad de cooperativista se pierde por: a) Fallecimiento del cooperativista o pérdid"}, {"num": "Art. 80-A", "ley": "LCH", "texto": "ARTÍCULO 80-A. La Junta Directiva debe adoptar la medida de exclusión\ncuando el afiliado(a):\na) Perdió algún requisito indispensable para seguir teniendo la calidad de tal,\nconforme con las condiciones estatutarias; o,\nb) Dejó de aportar a su cooperativa por el término de un (1) año, y no cuenta con\nel monto mínimo establecido en el Estatuto.\nEn la solicitud de afiliación a ser firmada por el afiliado(a) debe dejarse constancia\nde que ha hecho de su conocimiento lo establecido en este Artículo, el proceso\nde exclusión de la cooperativa y que está de acuerdo con este.”", "resumen": "La Junta Directiva debe adoptar la medida de exclusión cuando el afiliado(a): a) Perdió al"}, {"num": "Art. 81", "ley": "LCH", "texto": "ARTÍCULO 81.- Perdida la calidad de cooperativista, se liquidará la cuenta de\néste, acreditándosele las aportaciones, los intereses y los excedentes no\npagados; se debitarán las obligaciones a su cargo y la parte proporcional de las\npérdidas estimadas a la fecha de cierre del ejercicio anual en el cual ocurriera la\ncancelación.\nEl saldo neto resultante de la liquidación, si lo hubiere, será pagado al ex\u0002cooperativista o a sus beneficiarios o herederos, en los plazo previstos por los\nEstatutos. La entrega a los beneficiarios se hará sin sujetarse a los trámites de\ndeclaratoria de heredero. No habiendo beneficiarios, la entrega se hará a los\nherederos declarados en legal forma.\nSi el ex-cooperativista resultare deudor, la cooperativa ejercerá sus derechos con\narreglo a la Ley; en tal caso, la certificación de la liquidación del crédito lleva\naparejada ejecución.\n“", "resumen": "- Perdida la calidad de cooperativista, se liquidará la cuenta de éste, acreditándosele la"}, {"num": "Art. 81-A", "ley": "LCH", "texto": "ARTÍCULO 81-A.- Los valores originados por la exclusión, no reclamados,\npasan a formar parte en forma proporcional a las reservas de la respectiva\ncooperativa, programas de desarrollo cooperativo y Fondo de Seguro de\nDepósitos Cooperativos.”\nTITULO III\nINTEGRACION COOPERATIVISTA\nCAPITULO I\nFUSION, INCORPORACION, TRANSFORMACIÓN\n“ARTICULO 82.- Se permite la fusión, incorporación y transformación de las\ncooperativas de conformidad con esta Ley, la que debe ser aprobada por la\nAsamblea General de cada una de las cooperativas participantes y cumplir con\nlos requisitos exigidos por el Organismo Supervisor del Sector Cooperativo,\nestablecidas en la Normativa correspondiente.\nCuando el Organismo Supervisor del Sector Cooperativo, apruebe la fusión,\nincorporación o transformación de las cooperativas, debe extender certificación\ndel acto, debiendo publicarse en el Diario Oficial La Gaceta o en un (1) diario de\ncirculación nacional.”\nARTICULO 83.- Hay fusión cuando dos o más cooperativas se unen forman\u0002do otra cooperativa y extinguiéndose la personalidad jurídica de aquéllas.\nARTICULO 84.- Hay incorporación cuando una cooperativa absorbe a otra u\notras conservando la incorporante su personalidad jurídica y extinguiéndose la\nde las incorporadas.\nEn caso de incorporación si fuere necesario, podrán modificarse los Estatutos de\nla Cooperativa incorporante.", "resumen": "- Los valores originados por la exclusión, no reclamados, pasan a formar parte en forma pr"}, {"num": "Art. 85", "ley": "LCH", "texto": "ARTÍCULO 85.- Una cooperativa sólo podrá transformarse en otra cooperativa.\nARTICULO 86.- La fusión, incorporación o transformación de cooperativas, se\ninscribirá en el Registro Nacional de Cooperativas.\n“", "resumen": "- Una cooperativa sólo podrá transformarse en otra cooperativa. ARTICULO 86.- La fusión, i"}, {"num": "Art. 87", "ley": "LCH", "texto": "ARTÍCULO 87.- Contra la fusión, incorporación o transformación de cooperativas\npuede interponerse oposición dentro de diez (10) días hábiles, contados desde\nla fecha de su inscripción en el Registro Nacional de Cooperativas. El afiliado(a)\ndisconforme debe hacer constar sus disidencias en el acta de Asamblea General\npertinente.\nTranscurrido el término establecido el párrafo anterior, si no hubiere oposición, la\nfusión, incorporación o transformación, tendrá pleno efecto legal.”\nCAPITULO II\nINTEGRACION POR NIVELES\nARTICULO 88.- De acuerdo al nivel de integración la cooperativa podrá ser:\n1. De Primer Grado:\na) Cuando está formada por personas naturales solamente, o por personas\nnaturales o jurídicas sin fines de lucro, e iniciará su denominación con la\npalabra ¨ Cooperativa ¨; y,\nb) La formada por grupos u organismos locales establecidos en determinada\nregión en cuyo caso llevarán en su denominación la frase ¨ Cooperativa\nRegional ¨.\n2. De Segundo Grado: Cuando esté formada por:\na) Cooperativas de primer grado y de igual actividad principal.- Iniciará su\ndenominación social con la palabra ¨ Federación¨;\nb) Cooperativas de primer grado y de diferente actividad principal.- Su denominación\nsocial con la palabra ¨ Unión ¨;\nc) Cooperativas de primer grado y de igual o diferente actividad principal.- Iniciará su denominación social con la frase ¨ Central de Cooperativas ¨; Y,\nch) Cooperativas de primer grado del Sector Agrícola Reformado por la afiliación de estas con personas jurídicas sin fines de lucro, no cooperativas de acuerdo como se establezca en el Reglamento de esta Ley.- Iniciará su denominación social con la frase ¨ Cooperativa Agro-Industrial ¨ o ¨ Empresa Cooperativa Agro-Industrial ¨o “Empresa Cooperativa Agro-industrial”.\n3. De Tercer Grado: Cuando esté constituida por cooperativas de Segundo Grado,\niniciará su denominación social con la palabra ¨ Confederación¨; y sólo habrá una\nen el país.", "resumen": "- Contra la fusión, incorporación o transformación de cooperativas puede interponerse opos"}, {"num": "Art. 89", "ley": "LCH", "texto": "ARTÍCULO 89.- Las cooperativas de Segundo y Tercer Grado, dentro de los\nprincipios del cooperativismo establecidos en la presente Ley, podrán realizar\ncualquiera actividad de carácter técnico, económico, comercial, administrativo,\nfinanciero y social en favor de las cooperativas que formen parte de ellas y de\ncooperativas no afiliadas.\nCAPITULO III\nORGANISMOS DE INTEGRACIÓN Y AUXILIARES\n“", "resumen": "- Las cooperativas de Segundo y Tercer Grado, dentro de los principios del cooperativismo "}, {"num": "Art. 90", "ley": "LCH", "texto": "ARTÍCULO 90.- La Confederación Hondureña de Cooperativas (C.H.C.), es\nel organismo privado, superior o representativo del Movimiento Cooperativo\nHondureño.\nPara la constitución de cualquier organismo de integración cooperativista será\nnecesario cumplir con las condiciones de factibilidad; en lo administrativo, legal y\ncapacidad económica de sostenibilidad.”\n“", "resumen": "- La Confederación Hondureña de Cooperativas (C.H.C.), es el organismo privado, superior o"}, {"num": "Art. 91", "ley": "LCH", "texto": "ARTÍCULO 91.- Son funciones de la Confederación Hondureña de Cooperativas\n(C.H.C.):\na) Fomentar el desarrollo, consolidación e integración del cooperativismo y la defensa de sus instituciones;\nb) Promover el modelo cooperativo para el diseño, formulación e implementación de políticas e impulsar la capacitación de sus talentos humanos, con igualdad de oportunidades;\nc) Asesorar en coordinación con organismos auxiliares del movimiento cooperativo a las cooperativas en materia de organización técnica,\nch) administrativa, legal y desarrollo;\nd) Gestionar y desarrollar programas y proyectos para el fomento del cooperativismo;\ne) Establecer estrategias que permitan la participación efectiva del movimiento cooperativo en el combate a la reducción de la pobreza;\nf) Establecer las coordinaciones necesarias con instituciones públicas y privadas, nacionales e internacionales a efecto que los programas que desarrolle sean concordantes con la Visión de País y Plan de Nación;\nOrganizar Congresos Cooperativos Nacionales Ordinarios cada tres (3)\naños, y extraordinarios cuando fueren necesarios, con el objetivo de desarrollar\ntemas científicos, de integración o servir como órgano de consulta ante\nproblemas nacionales o específicos del movimiento cooperativo. En el\nReglamento de la presente Ley y Estatuto de la Confederación Hondureña\nde Cooperativas (C.H.C.) se deben establecer las funciones específicas del\nreferido Congreso;\ng) Representar al Movimiento Cooperativo de Honduras en organismos\npúblicos, de la sociedad civil o entes privados y organismos internacionales;\nh) Promover la organización y creación de entidades auxiliares a servicio del\nmovimiento cooperativo nacional, ya sea por propia iniciativa, de manera\nconjunta o a solicitud de las cooperativas;\ni) Contribuir al fortalecimiento y desarrollo de los servicios especializados de\nlas federaciones, uniones, asociaciones, centrales o alianzas de cooperativas;\nj) Fomentar la educación del Modelo Cooperativo Nacional, a través del\nInstituto de investigación y Formación Cooperativa (IFC), en coordinación\ncon los organismos de integración de acuerdo a su especialización; y,\nk) Cualquier otra función tendiente a cumplir con los objetivos institucionales.”.", "resumen": "- Son funciones de la Confederación Hondureña de Cooperativas (C.H.C.): a) Fomentar el des"}, {"num": "Art. 91-A", "ley": "LCH", "texto": "ARTÍCULO 91-A.- Créase el Consejo Nacional de la Mujer Cooperativista de\nHonduras (CONAMUCOOPH) como el órgano auxiliar técnico especializado, por\nmedio del cual, se velará por la equidad de género y el desarrollo de las mujeres\ncooperativistas y sus derechos.”\n“", "resumen": "- Créase el Consejo Nacional de la Mujer Cooperativista de Honduras (CONAMUCOOPH) como el "}, {"num": "Art. 91-B", "ley": "LCH", "texto": "ARTÍCULO 91-B.- Créase el Consejo Nacional de la Juventud Cooperativista,\norientado a la promoción, educación, formación y participación activa de los\njóvenes cooperativistas en los espacios del Sistema Cooperativo Hondureño.”\nARTICULO 92.- Los organismos de integración podrán actuar como órganos\nde conciliación en los conflictos que se susciten entre cooperativas y sus\ncooperativistas o entre cooperativas. En tales casos, cuando fracasare la\nconciliación, podrán las partes ejercer las acciones administrativas o judiciales\ncorrespondientes.\nTITULO IV\nCONSEJO NACIONAL SUPERVISOR DE COOPERATIVAS\nCAPITULO I\nCREACION, FINES\n“", "resumen": "- Créase el Consejo Nacional de la Juventud Cooperativista, orientado a la promoción, educ"}, {"num": "Art. 93", "ley": "LCH", "texto": "ARTÍCULO 93.- Créase el Consejo Nacional Supervisor de Cooperativas, en\nadelante denominado (CONSUCOOP), institución descentralizada del Estado,\nautónoma y con patrimonio propio, que tiene a su cargo la aplicación de la\nlegislación cooperativa y autoridad de control de los entes cooperativos, se rige\npor esta Ley y demás leyes que por su naturaleza y similitud le apliquen.\nLas relaciones del CONSUCOOP con el Poder Ejecutivo, se realizan por medio\nde la Secretaria de Estado en los Despachos de Industria y Comercio, quien\ndictará las políticas públicas del sector.\n“", "resumen": "- Créase el Consejo Nacional Supervisor de Cooperativas, en adelante denominado (CONSUCOOP"}, {"num": "Art. 93-A", "ley": "LCH", "texto": "ARTÍCULO 93-A.- El Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP), está estructurado por: una Junta Directiva, una Dirección\nEjecutiva, una Superintendencia de Cooperativas de Ahorro y Crédito y\nuna Superintendencia de Otros Subsectores de Cooperativas y cualquier otra\nsuperintendencia necesaria para su funcionamiento. Asimismo tiene a su cargo\nel Registro Nacional de Cooperativas.”\n“", "resumen": "- El Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), está estructurado por: una J"}, {"num": "Art. 93-B", "ley": "LCH", "texto": "ARTÍCULO 93-B.- El Director Ejecutivo del Consejo Nacional Supervisor de\nCooperativas (CONSUCOOP), debe ser nombrado por el Presidente de la\nRepública, de una terna de candidatos propuestos por la Junta Directiva de la\nConfederación Hondureña de Cooperativas (C.H.C.).”", "resumen": "- El Director Ejecutivo del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), debe "}, {"num": "Art. 93-C", "ley": "LCH", "texto": "ARTÍCULO 93-C.- El Director Ejecutivo tiene carácter de funcionario público,\ndura cuatro (4) años en el ejercicio de sus funciones y puede ser nombrado para\n\nde fecha 11 de enero del 2020\nnuevos períodos, debe desempeñar sus actividades a tiempo completo y no\npuede ocupar otro cargo, remunerado o ad-honorem, excepto los de carácter\ndocente, cultural y de asistencia social. El Director Ejecutivo debe rendir caución\ny la misma debe fijarse por la Junta Directiva del Consejo Nacional Supervisor de\nCooperativas (CONSUCOOP).\nNo pude ejercerse acción judicial alguna contra el Consejo Nacional Supervisor\nde Cooperativas (CONSUCOOP), por razón de las decisiones y acuerdos\nadoptados por éste, en cumplimiento de la Ley, sin que previamente se haya\npromovido la correspondiente acción contenciosa administrativa y ésta haya sido\nresuelta favorablemente a las pretensiones del actor o demandante, mediante\nsentencia judicial firme.\nSin haberse cumplido el requisito establecido en el párrafo anterior, ningún\nJuzgado o Tribunal puede dar curso a las acciones judiciales, a título personal,\ncontra los funcionarios y empleados relacionados.”\n“", "resumen": "- El Director Ejecutivo tiene carácter de funcionario público, dura cuatro (4) años en el "}, {"num": "Art. 93-D", "ley": "LCH", "texto": "ARTÍCULO 93-D.- Los empleados del Consejo Nacional Supervisor de\nCooperativas (CONSUCOOP), se rigen por las normas de personal que aquel\nemita y supletoriamente por las disposiciones del Código de Trabajo. Las normas\nde personal deben incluir al menos los requerimientos y condiciones necesarias\npara el ejercicio del cargo, las garantías, derechos adquiridos, estabilidad en\nel servicio, promoción, remoción, licencias o permisos, régimen disciplinario,\nevaluación de desempeño, política salarial y demás aspectos relacionados.”\n“", "resumen": "- Los empleados del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), se rigen por "}, {"num": "Art. 94", "ley": "LCH", "texto": "ARTÍCULO 94.- El Consejo Nacional Supervisor de Cooperativas\n(CONSUCOOP), tiene su domicilio en la ciudad de Tegucigalpa, Departamento\nde Francisco Morazán y puede establecer oficinas regionales en cualquier lugar\ndel país”.\n“", "resumen": "- El Consejo Nacional Supervisor de Cooperativas (CONSUCOOP), tiene su domicilio en la ciu"}, {"num": "Art. 95", "ley": "LCH", "texto": "ARTÍCULO 95.- El Consejo Nacional Supervisor de Cooperativas,\n(CONSUCOOP) tiene los objetivos siguientes:\na) Determinar y dirigir la supervisión del sistema cooperativo, bajo normativas\nprudenciales de control y riesgo, para la consolidación e integración del\ncooperativismo y defensa sus instituciones; y,\nb) Planificar, organizar, coordinar, dirigir y controlar las actividades y tareas de\nsupervisión de las cooperativas para darle cumplimiento a la presente Ley,\nsu reglamento y normativas.”", "resumen": "- El Consejo Nacional Supervisor de Cooperativas, (CONSUCOOP) tiene los objetivos siguient"}, {"num": "Art. 96", "ley": "LCH", "texto": "ARTÍCULO 96.- Son atribuciones del Consejo Nacional Supervisor de\nCooperativas (CONSUCOOP) las siguientes:\n1. Convocar a Asamblea General en una Cooperativa en cualquier tiempo que\nel Órgano Rector considere pertinente, para aquellos casos que haya\nirregularidades, anomalías en la falta de convocatoria, el Reglamento de\nesta Ley debe regular esta atribución;\n2. Aprobar la constitución, la disolución y la liquidación de cooperativas;\n3. Suscribir contratos o convenios con Instituciones públicas o privadas\nnacionales o extranjeras;\n4. Llevar el Registro Nacional de Cooperativas;\n5. Representar al Estado en reuniones nacionales e internacionales sobre\ncooperativismo;\n6. Acordar nulidades de asambleas o puntos de agenda cuando no se realice\nel procedimiento establecido por la misma Ley;\n7. Apoyar a los organismos del Movimiento Cooperativo en la captación de\nplanes y recursos y desarrollo de programas;\n8. Llevar y mantener actualizada la información estadística del Movimiento\nCooperativo;\n9. Al menos anualmente, ejercer la fiscalización, control, y supervisión\nadministrativa, económico-financiera, social, legal y los servicios de las\ncooperativas en todos sus niveles; así como cuando lo considere necesario\ny sin previo aviso;\n10. Imponer las sanciones y multas dispuestas en el marco legal vigente;\n11. Dictar normas que aseguren el cumplimiento y práctica de los principios del\nbuen Gobierno Cooperativo, con el fin de que las cooperativas logren sus\nobjetivos estratégicos y se garantice la confianza de sus afiliados y del\npúblico en general;\n12. Dictar resoluciones de carácter general y particular, y establecer normas\nprudenciales con arreglo a la legislación vigente, con el fin de hacer efectiva\nla supervisión basada en riesgo de las cooperativas;\n13. Dictar las normas que aseguren una adecuada coordinación entre las\nlabores de supervisión, con las que realizan las auditorías internas y\nexternas a las instituciones supervisadas;\n14. Dictar resoluciones que autoricen abrir filiales, ventanillas u otros medios de\nprestación de servicios de cooperativas nacionales o internacionales;\n15. Rubricar los libros exigidos por las normas legales y reglamentarias en su\ncaso;\n16. Realizar vigilancias localizadas de las operaciones y actividades de las\ncooperativas, por sí o a través de delegación con un organismo de segundo\ngrado;\n17. Disponer, mediante resolución fundada, la intervención de las cooperativas,\nde conformidad con el procedimiento establecido en la presente Ley y su\nreglamento;\n18. Disponer mediante resolución fundada la cancelación de la personería\njurídica de cooperativas, previo sumario administrativo;\n19. Autorizar la disolución y liquidación voluntaria y coactiva de las cooperativas;\n20. Calificar y registrar conforme a la normativa correspondiente, a las personas\ny entidades consultoras o firmas de auditoría externa, a fin de habilitarlas\npara realizar tareas específicas o especiales en las cooperativas;\n21. Autorizar a las cooperativas para suscribir contratos o convenios de\nadministración de fondos, entre las Cooperativas de cualquier grado, con\nentes públicos o privados nacionales o extranjeros y dirigidos al desarrollo\ncualitativo y cuantitativo del sector social de la economía;\n22. Llevar un registro informativo de las fundaciones que organicen las Cooperativas;\n23. Supervisar el destino y uso de los fondos trasladados por las Cooperativas a\nlas fundaciones que estas organicen; y,\n24. Realizar cualesquier otros actos y operaciones compatibles con su naturaleza\ny finalidad, que aseguren cumplir y hacer cumplir las disposiciones de la\npresente Ley, su reglamento, las resoluciones y demás normas vigentes.\n\nCooperativas (CONSUCOOP), como órgano de supervisión cooperativa debe\nrevisar, verificar, controlar, vigilar, fiscalizar a las Cooperativas, asimismo\n\nde fecha 11 de enero del 2020\n\nde fecha 11 de enero del 2020\ncorresponde a este órgano de supervisión aplicar las sanciones en lo que proceda\nincluyendo lo relativo al cumplimiento de la Ley Especial Contra el Lavado de\nActivos, para lo cual debe emitir lineamientos especiales, de acuerdo al tamaño\nde la organización, estructura, recursos y complejidad de las operaciones de las\nCooperativas.\nPara cumplir con dichas funciones el CONSUCOOP debe utilizar una\nmetodología de supervisión con enfoque basado en riesgo y emitir la normativa\nrespectiva o directrices necesarias para garantizar el cumplimiento de las\npolíticas antilavado y anti financiamiento del terrorismo, contempladas en las\nleyes aplicables”.", "resumen": "- Son atribuciones del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) las siguien"}, {"num": "Art. 97-A", "ley": "LCH", "texto": "ARTÍCULO 97-A.- DE LAS SANCIONES A LAS COOPERATIVAS\nINFRACTORAS. Sin perjuicio de la responsabilidad penal, que de acuerdo con\nel marco legal pudieran incurrir por el delito regulado en la Ley especial contra el\nlavado de activos y normas administrativas relacionadas, las cooperativas que\nno cumplan con las disposiciones impuestas en éstas, deben ser sancionados\ncon una multa de diez (10) a cien (100) salarios mínimos mensuales de su valor\nmás alto de la zona donde ocurrió el incumplimiento, según la gravedad del\nmismo y calculada por cada inobservancia o incumplimiento.\nEn caso de reincidencia, la sanción debe ser el doble de la multa señalada. Las\nsanciones establecidas en el presente Artículo deben ser reguladas he impuestas\npor el Consejo Nacional Supervisor de Cooperativas (CONSUCOOP). La multa\nse hará efectiva en la Oficina Administradora de Bienes Incautados (OABI) para\nsu depósito en fondo especial. Una vez firme la sanción impuesta, la distribución\ndel producto de la misma debe ser del ochenta (80%) para la El Consejo Nacion\u0002al Supervisor de Cooperativas (CONSUCOOP), y el veinte por ciento (20%) para\nla Oficina Administradora de Bienes Incautados (OABI). Los recursos generados\npor sanciones firmes y que sean asignados, deben ser utilizados con la finalidad\nexclusiva de fortalecer los procesos de prevención, detección y supervisión de\nlos delitos tipificados en la Ley especial contra el lavado de activos y en la Ley\nContra Financiamiento del Terrorismo.\nLas sanciones estipuladas en el presente Artículo deben comunicarse a los\ninfractores y al Ministerio Público cuando corresponda y a la Unidad de Inteligencia\nFinanciera (UIF) de la Comisión Nacional de Bancos y Seguros (CNBS)”.", "resumen": "- DE LAS SANCIONES A LAS COOPERATIVAS INFRACTORAS. Sin perjuicio de la responsabilidad pen"}, {"num": "Art. 98", "ley": "LCH", "texto": "ARTÍCULO 98.- DEL REGISTRO Y NOTIFICACIÓN DE TRANSACCIONES.\nLas Cooperativas deben registrar y reportar a la Unidad de Inteligencia\nFinanciera (UIF) de la Comisión Nacional de Bancos y Seguros, bajo los conceptos\nde Transacciones en Efectivo, Múltiples en Efectivo y Financieras, todas las\ntransacciones relacionadas con los clientes y usuarios, que igualen o superen\nel monto que establezca el Banco Central de Honduras (BCH), excepto las\ntransacciones en cuentas generadas para el pago de servicios públicos. Dichos\nreportes deben ser llevados en forma diligente y precisa por Las Cooperativas.\nLos registros correspondientes al mes anterior, deben ser remitidos por las\nCooperativas a la (UIF), dentro de los primeros diez (10) días de cada mes\nsiguiente, conservando una copia magnética, fotostática, fotográfica, micro\nfílmica o cualquier otro medio de reproducción de los mismos, por el término de\nal menos de cinco (5) años.\nLos registros de las transacciones, deben estar a disposición de los Órganos\nJurisdiccionales Competente, del Ministerio Público y de la Unidad de Inteligencia\nFinanciera (UIF) para su uso en investigaciones y procesos penales, civiles o\nadministrativos, según corresponda, con respecto a la comisión de actos tipificados\ncomo delitos”.\n\n26", "resumen": "- DEL REGISTRO Y NOTIFICACIÓN DE TRANSACCIONES. Las Cooperativas deben registrar y reporta"}, {"num": "Art. 98-A", "ley": "LCH", "texto": "ARTÍCULO 98-A.- DE LOS REPORTES DE OPERACIONES SOSPECHOSAS.\nLas Cooperativas que detecten que las transacciones, operaciones o relaciones\ncomerciales descritas en el numeral 21) del Artículo 2 de la Ley Especial Contra\nel Lavado de Activos, independientemente que se hayan efectuado o no y\npuedan constituir o estar relacionadas con actividades ilícitas, deben comunicarlo\nde inmediato a la Unidad de Inteligencia Financiera (UIF) de la Comisión Nacional\nde Bancos y Seguros, en el formulario de Reporte de Operaciones Sospechosas\nque para tal efecto se proporcione”.\nCAPITULO II\nADMINISTRACION\n“", "resumen": "- DE LOS REPORTES DE OPERACIONES SOSPECHOSAS. Las Cooperativas que detecten que las transa"}, {"num": "Art. 99", "ley": "LCH", "texto": "ARTÍCULO 99.- El órgano de dirección del Consejo Nacional Supervisor de\nCooperativas (CONSUCOOP) es la Junta Directiva, quien tiene las atribuciones\nsiguientes:\na) Cumplir y hacer cumplir la legislación cooperativa y las demás normas legales pertinentes;\nb) Aprobar anualmente el Plan Operativo y el Presupuesto;\nc) Revisar y aprobar cada cinco (5) años el aporte anual a cobrar a las cooperativas;\nch) Autorizar la adquisición de bienes y servicios conforme a las normas presupuestarias vigentes;\nd) Aceptar herencias, legados y donaciones;\ne) Establecer y reglamentar la organización interna del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP) dentro del marco de la presente Ley;\nf) Establecer, aprobar y vigilar el cumplimiento del Código de Conducta y Ética de los empleados;\ng) Autorizar licencias al Director Ejecutivo del Consejo Nacional Supervisor de Cooperativas (CONSUCOOP);\nh) Proponer al Poder Ejecutivo, por medio de la Secretaría de Estado en los Despachos de Industria y Comercio, reformas a la presente Ley y su Reglame
